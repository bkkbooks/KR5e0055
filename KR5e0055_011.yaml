front:
  text: 重陽全真集卷之十一交一
  hash: sha256:22f93313c6078be296349a1769fd83f2ee2c155d8915554ca5c4a86052864756
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_011-001a, image: hfl/0795/0795-004.png}
body:
  text: 終南山重陽子王嚞譔詞酴醿香自在隨緣信脚而無思没筭召清飈邀皓月同爲侣伴步長路成歡樂唇歌舌彈忽經過洞府嘉山堪一翫正逢著祥瑞頻讚異果名花滋味美馨香撒散對良辰雖好景難爲惹絆任水雲前程至天涯海畔便遭遇清浄神舟超彼岸這迴做真害風漢鶴沖天迷祛惑去正好修行做清静是根源真門户切莫他尋恐遺遺望仙路閑閑更閑處靈根元明轉轉愈爲開悟功圓行滿唯有紅霞聚往昔得遭逢親師父此則專來教長生訣頻頻顧方知今得度便許相隨永永共携雲步望遠行晴空日照逢澄夜月吐銀輝星瑩運三光處五彩騰明做作静中瞻聽察見真修真鍊氣神攢聚便許密遊良逕這盈盈功行於斯已定端正應是細搜細刷現出箇本來元性葉葉皆靈枝枝總秀精瑩永成清浄雲外青童持詔傳言授取天皇宣命謝十洲三島神仙來聘又詠雪祥敷瑞布瓊瑶妥片片風刀裁下密抛虚外徧撒空中頃刻粉鋪簷瓦鎖綴園林粧點往來樵逕真箇最宜圖畫報豊登珠寶應難比價清雅鮮潔盡成滉瀁更爽氣愈增惺灑萬壑都平千山一色遐邇不分原野恰似予家仙景澄徹瑩瑩蓬萊亭榭現自然光耀長明無夜滿庭芳選子奇瑰依時耨種自然生發靈苗風滋雨潤漸漸引枝條長就方能釤刈池隍漚日變青梢令人羡新鮮浄潔款款起皮臕須教軔作線織成密布一任槌敲待伊家熟軟裁剪縫繚做就仙袍甚穩誰能掛唯我堪消成功行六銖衣换方顯爾功超又吕先生作醮託請涇陽道友平昔開懷今朝闡醮就中别有清歡風朋霞友皆至竝擎丹唯許涇陽舊契俱澄浄眼界敷寬專邀請諸公上士總願赴仙壇同攢崇大道不須箋乳何用沉檀把心香爇起衆聖來觀察得功圓行滿還應是齊在雲端修真事兹宵竝喜一一盡乘鸞又戰公求問逸志清虚放心坦蕩莫令煩冗縈牽修身養性隨分樂因緣便是崇真奉道甲丹内長爇靈煙通閑趣恬應得味定許處長年如然須了了免除苦苦煅煉流傳便優游自在做作新鮮直待元根漸瑩恁時節功行完全還知否蓬萊路到見且是人仙又贈友人問題院落荒蕪庭樹瀟灑就中墻璧頽踈自云妻喪父子柰何如王喆聞言大哂天分付獨樂清虚公還悟火坑裏面休更覓紅爐縈紆須剪斷攀緣愛念截割如無作風鄰月伴正是吾徒前趁蓬萊穩路超生滅不入三塗真端的白雲深處别有洞天居又贈姪非樂英材都緣業重柰何學父相陵暗思揣己亘昔竝無能最苦於身學淺生徒擁戰戰兢兢來咨問心中諕得恰似履薄冰寧曾爲模範果然當死偏得人憎又番成羈絆早晩超昇拂袖崇真向道前程訪霞友雲朋真消息蓬萊路穩相從去須登黄河清根固源澄冥鎖户清清堅守深洞轉加温暖悉屏嚴凝寒凍别是風流雅致頓知得超昇管中自然開悟長生遇玉花正好拈弄元初本有真靈明明處這迴搜見鉛汞便令結成一粒金丹堪貢顯現祥光瑞耀更來往隨鸞引鳳十洲三島神仙喜慶迎共羾又按一百八數九鞠黄河分九轉洪波大浪清浄九江共同合就俱來歸正九鼎中間顯現九宫闡端流一定玉翻金潑盈盈處倒侵九耀開影九霄翠碧相齊九臯有鶴鳴迎接精瑩九光洞明返照靈暉堪竝九曲神珠跳躍九仙至如然游泳湛殫澄徹成功行九天通聖漢宫春正好修行得深深幽密玄玄微妙樞機是兹仗此便成關要惺惺了了更做就風流真俏顔内少元從亘昔圓聚那般輝耀三光起初朗照却於今認見當本聲調清音洽浹響喨轉動七竅崑崙出去爲一箇青童來召金線釣靈明授取天書紫詔夏雲峯做修持應不在端坐子午雙時鉛汞自然要結只用真慈捷中玄逕誰會得獨我怡怡密妙放閑閑坦蕩微細推移漸令靈曜吐奇變霞彩光艶還照相隨蓋緣昔堪宜白雲深處元正是地肺明師便許共丹霄直上同處無爲守株林無作用空外獨卧高岑石枕草衣偃仰極目觀臨水桃山杏隨分喫且盗陽陰款款脱塵軀俗狀三疊琴心舞胎仙論淺深自然見不須重恁搜尋已通玄妙得步瓊林玉花叢裏從此便養透真金瑩静與清風皓月長做知音瑶臺月閑閑景致真閑悟清清方可分付元來那箇本有須令堅固便結作一粒金丹五色明霞敷布同相守能相聚迴光射返光顧遭遇圓成决得真師舉度此則助正鮮素更永永綿綿嚮慕應知道還處亘初存住逐瑩瑩瑞彩祥輝珍寶珞玦璉襯步胎仙舞神仙路金童引玉童諭堪赴瑶臺月照瓊筵雅聚聲聲慢金關叩户玉鎖扃門閑裏不做脩持杳默昏冥誰會舞弄嬰兒睡則擒猿捉馬醒來後復採瓊芝每依時這功夫百日只許心知自在逍遥做就唯舒展紅霞光彩敷披罩定靈明方見本有真慈一粒神丹結正三重焰緊緊相隨過瑶池透青霄頂上無爲絳都春天然省悟此一遇轉增清凉尤憬定裏鉛汞結就都緣壬逢丙元初面目成瓊頸返照長生安静速令歸去前程已許久通堅永好景光傳焕炳見空外萬道銀霞齊整漸漸近來相接相迎須臾頃蓬萊路闡神仙境有箇金童邀請謹持玉詔親教害風受領二郎神觀塵境盡總把浮名修整此假合形骸皆不悟猶然待巧粧馳騁百歳韶華能有幾到七十難逃逝景隳裏面真真罪業愈重無由祛屏如省當初一點瑩清明炳速認他從來呼甚麽元是圓成光影又唤金丹仍燦燦好做主重令永永願凡世人人箇箇迴頭澆淳休逞上平西向終南成遭遇做風狂便遊歷海上嘉祥閑閑得得任從詞曲作詩章自然神炁共交結認正心香真清静唯清湛還清徹處清凉赤青黑白又兼黄五般彩色近來圍罩寶珠光這迴應許碧霄上明耀無方齊天樂做修行要知捷逕如何置爐安竈便把丹田寶貝萬象森羅總齊祈禱都歸此處向蘂珠宫前盡教開導擁出靈明一顆神珠衮顛倒得得晴空上面玉皇宣詔青童謹捧金誥此則緣功與行兩兩雙全瑞祥敷燾綿綿永永在大羅天中執携芝草了了真玄頓覺無爲越三島登仙門歸也歸也本元歸也兩郡人没觀瞻也被清風白雲全日常招也王害風此翻去也勸諸公尋玄妙更休思也看假軀不如無也到今方超彼岸我咱知也要重見這迴難也醉蓬萊整六十三歲三月良辰十一日賀瑞氣祥雲香煙重鎖此際高穹選降星郞又天花亂妥冰玉形容神仙標格有誰知那謹吿賢兄今爲見在名利榮華石中明火猛出凡籠頓悉除人我自在逍遥全真真樂把無趖埵摘蟠桃蓬萊舊路同行則箇雨中花金菊初開銀蟾漸顯新蘂皓色爲儔綻清若空外素魄深秋便謹按中央雅致又應當望夜圓周稱予家賞翫正許邀枝迎照瓊樓堪餐秀色細艷好鋪明卧影兩兩相酬頓省悟靈英玉兔因由馥郁盈盈噴噴嬋娟瑩瑩悠遇重陽七八香傳三島光滿十洲轉調鬭鵪鶉一箇靈明作仙子材響徹瑶宫蘂金自開爲忒玲瓏出蓬萊降下來謫在凡間托生俗胎只恐身便酒色氣財混一迴風流此心便灰復悟前真免輪迴没甚灾看看却得重上玉臺滿路花元初由大道遇理做生涯卜居風月伴捨榮華盈盈白氣旋旋結紅霞五般真彩艶射透圓成裏頭徧吐黄芽三千同八百數滿更無差路中添雅致放金花枝枝秀麗朵朵聚奇葩杳默昏冥外一撞晴空異香擁上丹砂驀山溪觀公形貎俊爽偏清秀慷慨又雄豪你肯把清閑拯救只知名利前路做榮華論文章説佳吉衣紫金章綬肯來隨我聞早植休咎切慮逐波流但肯還迷情戀酒稍知玄妙略得悟逍遥明月裏弄清風蓬島同携手人人不省日日光陰急嶮路是輪迴前途事暗中似漆觀公風貌俊格最青春多清浄少貪求善事休交失虚情嬌態恰似蜂便蜜曉夜採花忙合和成誰人啖汁若還悟此目下便回頭蓬萊路彩雲端有分相隨入一靈真性二物包囊定三寸主人翁四方遊各來邀請五情六慾七竅總相連八山聳九宫深十地如何證十分修鍊九轉通賢聖八道湧瓊漿七門開洞通清浄六街五彩四象盡歸依三光照二夜從一顆明珠瑩修仙慕道爲甚都擔閣妄想太虚高皆由騁外緣歡樂内中珍寶未曉是無爲只誇强又誇能誇裏還銷鑠非知下手怎會重安脚每謾度饑寒争似把陰陽做作白純紅赫光艶燦然殊一方圓十方明方現真丹藥公尋做作認取烏隨兔上下要沖和更左右交加龍虎搬傳大藥須是入紅爐成煅煉變銀霜一朵金花聚清香遠遠透過崑崙去裊裊上青霄結雯光輝輝堪覩玉堂裏面參從大羅仙自怡喜得長春正處逍遥路筆兼紙墨硯子同爲事甲乙緊相隨缺一物難能作使閑來静坐屈指細尋思要爲書不時思須用清泉水恰如四季春夏秋冬是温熱與凉寒相結就年何擬議元來就上别有妙玄微按真玄合天機閏月方成歲凝神遐想始固鉛中雪滋長是黄芽使金烏相攀朗月黃婆匹配别是一家風龍吟嘯虎咆哮此箇誰分别人還去慾酸辣飡須節滋味要堪嘗任清虚五神暢悦元陽守定育養得神靈功成就去朝元住世無休歇凡軀四假正好堪論討有限是因緣却何不修行早早塵勞不染别顯一家風没牽縈無繫絆於己除煩惱稍能悟曉財色難相撓養就本元神這真理真靈倚靠崑崙山上一點處逍遥對紅霞成自在鶴引携芝草解紅嘆嗟浮世被榮華驅策名和利人人鬭作機心起百般姦計嫉妬愈增僥巧重生俱相效皆貪愛何曾停住常若是各衒女誇男孫奉侍更酒迷歌惑望長遂還知七十應難值便百年限來無有推避早早悟前途不如意急回頭便許脱了生死投玄訪妙搜微密察幽祕管取自然神氣雙全分明見元初箇真真圓性誠恁似玉貌瓊顔奇又異瑩寶光瑶彩吐祥瑞金丹結就虚空萃處清静大羅天上仙位凍雲凝住積瓊瑶祥瑞唯同遇輕抛細舞風刀剪旋旋敷布頃刻徧鋪原野山川并溪渚兼溝隰長橋孤渡皆一覩對此景暮江堪畫處見三兩漁人笑相覷披簑荷笠歌聲響指酒旗招颭投飲歡聚廣鎖綴園林與樵路更能迷迥邈點點鷗鷺鮮勝皓鶴宜奪白鷴素晩霽霧開微顯斜陽銀霞著門迎照渾如仙趣羅玉户自有箇祝融來吐耀射虚外崑崙列璉璐方當夜静清霄瑩放一輪明月光彩交互尾犯舉世總癡愚貪戀財色無不迷錯一箇丹誠趁輕肥爲作三耀照寧曾畏慎四時長追歡取樂越頻頻做恰似飛蛾見火常投托光中方省悟體爛怎追却悔恨遲遲已遭逢燒烙能遠害焉今禍患會全身那經灼爍請於身看只被利名榮華縳解愁堪嘆世間迷悮轉轉增隆怎得趖難被他同等一例相讚每每攢頭聚復散總做作百端繚亂這鬼使暗裏常常把你細筭待臨頭看癡漢越騁惺惺伶俐高强欺慢無憚大遇尤罔聖昧神厮翫此則看看業限貫怎生趓避也難逃竄見追帖箇箇添煩惱共𢬵儘陰司斷緑頭鴨嘆平生景光奔走尤遄利名牽休空勞攘不須頻苦孜煎這榮耀趁時顯現似風燭終勿牢堅走玉常催飛金每促更兼愁惱緊纏綿覩浮世推來暫處四序换流年齊捐捨争如善根結取良緣慧刀開劈迴猛烈智鋒舉刺轉英賢自家聲能調雅趣舊奇韻堪應斯絃認取元初搜尋本有幽微密妙總投玄得歸一長春景致還也任如然無來去蓬萊島中作箇神仙惜黄花大仙師父常來救苦且作凡間人説些宗祖地下一聲雷震動山頭雨怎知道鐵牛耕上坎離并子午擒龍捉虎這般事無一箇與心爲主越鬭巧機關大限數來取看你得那箇門户人須猛省人須猛悟獨不省獨不悟巧機越做有日閻王知差著箇特俏措嶮巇底赶我來去行到半路淚珠無數告鬼使這裏且暫停住小鬼喝一聲莫要埋冤苦對判官你儘分訴主人居屋絳宫長住日行持常關鎖閉門封户裏面種金錢箇箇堪分付好緣顧即時覺悟行到清凉處並無思慮妙中妙機密目通玄語來時復還來去後復還去再休迴入蓬萊路又重九日萬紅憔悴秋光獨銳别有番顔色按中央殊麗時分惜黄花九日同天意冒濃霜放開金蘂籬畔淵明喜白衣來至忽然間走出箇重陽小子應手攬清香認得頭間瑞插三枝蓬萊一醉這重陽子今來生此是非去煩惱退逍遥自遂擺脫一爐香何用三叩齒又不用那道家活計暗笑俏措的暗笑伶俐暗笑他將相并工商農士唯我靜中清唯我閑中肆要到處跨雲便至花心動漸漸東方漸沖和鮮明秀靈相接漸次轉遷南陸陽晶熾赫暑炎光曄漸令西境金華聚漸輪在北相凝浹漸成悟漸見四時怎生拈捻漸漸須臾歲業漸别作仙家景堪招攝漸把氣神鍊變真丹就上愈加調燮漸知行入前程路漸分朗足開雲躡漸無做漸高道成德獵迎春樂春日兹晨瑞氣陽和早泥牛示古農曹風流綵杖輕輕考誰似我重耕道賞宴懷中珍和寶滋味廣餐芝草便許結金丹復歸去蓬萊島雪梅春覩塵世人人盡總鬥芳容衒珠珍金玉綾羅錦繡情悰兒女妻孥共團聚管弦歌舞趁時從没休歇昨夜今宵來晩重重顒顒日常做怎得迴頭省悟深灑直待陰公取來恁則方忡千狀悲顔釘心劍百端愁思歛眉峰見追帖兹番悔恨難已藏蹤鳳棲梧禀性清閑歸寂寂占得風程雲水長遊歷搜出明珠頻洗滌更將霞彩重開剔任坐任行還在覿靜裏親知有箇相尋覓每每遭逢金露滴蓬萊穩路投端的茶瓶兒孝順先知金母更無能背爹尋父朝朝供養排簋簠便認得自家宗祖呼兒女騎龍虎正好與神爲主惺惺奉侍歸紫府也管録姓名仙簿柳梢青天然米精麥髓誰得悟予知奥旨保養沖和增添靈慧更兼神水三光秀氣通傳應助正真陽本始結作金丹明明歸去亘初家裏解珮令金郎察察玉娘揠揠堪同壽方年二八住在何方一居水一居山北入離門坎户皆劼時時相拉頻頻搜刮九條街坊坊俱達尋得靈珠取瓊漿神水澆抹放光明萬道旋斡害風王三前時割稅爲酒愛飲中沉醉往往來來眼前事全然不記與仁人當街打睡腋袋頭巾盡皆遺棄有經文裏面訣祕深謝明公發善心與予拈起解珮令報賢好意山亭柳能置田庄買得浮桑蓬萊路做清凉漸漸成作用崑崙上别有嘉祥每島各開三户殊名號九般房漸見初𨵙寂生祖次通長聚見元陽流轉過明堂好看炎炎景這毗鄰現出毫光處此安居已定住瀛洲是仙鄉春景精研花草新鮮夏日赫綻紅蓮忽然秋早至見山亭柳上鳴蟬飈地朔風來到飄白雪徧山川百歲光陰如撚指一靈真性好搜玄得後總周全養就神和氣結成丹燦燦團圓五道耀明齊聚簇擁上大羅天性本慈悲要覓玄機妙理上欲尋思一身無可脫被家縁火院驅馳愛欲猛捐樣下怎奈向那妻兒此箇丹成分兩處若教行坐總相隨但恐不由伊雙全全舉得人人盡學取無爲清靜到頭各就只龐居士同知耍蛾兒不會修行空養肚腎肺心肝脾祖五團臭肉怎爲主先把黄婆咄去赶退青龍兼白虎不用嬰兒姹女諸公要覓長生路别有一般門户如會修行尋捷路開闡全真門户汞知鉛見作宗祖管取性停命住便是陰陽顛倒數今日分明說諭只依四箇字兒做指日得歸仙去七騎子真箇重陽子得箇好因緣因緣待做做做神仙神仙惺惺誠了了了了金丹一粒圓圓圓祥雲送上天上天明師更與白花蓮花蓮瑩最最最新鮮新鮮輝輝清灑灑清香馥郁妙玄玄玄上長生玉帝前縱步閑閑遊翫出郊西見骷髏卧卧卧沙堤問你因緣由恁似爲戀兒孫女與妻致得如今受苦恓眼内生痧口裏更填泥氣氣應難吐吐吐虹蜺雨灑風吹渾可可大抵孩童任蹈躋悔不生前善事稽重陽金真集卷之十一
