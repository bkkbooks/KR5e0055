front:
  text: 重陽全眞集卷之八枝八
  hash: sha256:66ee4c32cb9c7989aecac3fa91b652b5fb233aaefc0833f1db35c3aa4dd6e338
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_008-001a, image: hfl/0794/0794-084.png}
body:
  text: 終南山重陽子王嘉譔詞如夢令如知九九妙中談明月分明照碧潭會得雙關眞箇理前三三與後三三九九明詞要正修整亘初元性須是返陽陰决作清吟雅詠賢聖腎聖容許陳如夢令九一初寒有自朔氣任從開肆是處蠻嚴凝正遇中冬節至藏異藏異内隱新陽欲施九二玄陰凛凛白雪徧鋪緣甚還許潤靈根接引黄芽悉審如恁如恁北海神龜暢飲九三隅維積洚水面盡爲凌凍奇性最堅貞任放明光出衆遥送遥送返照天涯螮蝀九四寒風似箭威勢徧行方便射追這群魔言慶嘉祥得見堪羡堪羡隱顯晴光一片九五天池盡泮淑景漸令堪翫識看嶺頭梅衝暖已成爛熳香案香案獨占真陽一半九六舒張瑩氣上下沖和溉濟週匝普流通正顯道尊德貴經緯經緯欲放瓊苞寶卉九七門開八脉洞達永無相隔渾似吐氤氲運轉週迴素白難測難測一點當中堪赫九八般般洽協普徧盡歸調燮處處見光輝燦燦尤增煒燁相接相接長出瑶枝玉葉九九八方端鎖團聚光明如火焰焰做紅霞裏面天花徧妥成裹成裹瑩瑩明珠一顆九九榮詞已徹誰做姓王名嘉雅字稱知明道號重陽子别懽悦懽悦一粒金丹永結西江月四假堪歎火風地水爲伊合造成形教人受苦日常經撲入味香視聽獨我揺頭不管朝朝居止黄庭自然閴寂聚真靈五色霞光覆定又四民堪歎工商農士各誇本業多能就中機巧日翻騰限至依然鬥勝獨我揺頭不管唯將淡素常憑清如澄水結如冰自有圓明果證又四害堪歎酒色財氣塵寰被此長迷人人慕帶似醯雞亂性昏神喪慧獨我揺頭不管介然甘守孤恓粗衣糲食淡黄虀養就胎仙既濟又四方堪歎東西南北迷途役損行人任來任往走紅塵只爲名牽利引獨我揺頭不管静中精固形貞陶陶團結氣和神永樂天真有準又四時堪歎春冬秋夏奇葩異卉争開流年不覺暗相催事到頭來怎悔獨我揺頭不管唯將内彩追陪青紅黄白黑純皚覆燾真金鼎鼐又四寶堪歎筆硯紙墨結繩制度規模尋常寫染永成書偏稱文房注䟽獨我揺頭不管教大記録元初靈光一點便開舒復把真如返覷又四物堪歎琴棋書畫虚中悦目怡情内將靈物愈相輕怎了從來性命獨我揺頭不管有縁淘出無名長生路上證圓成空外靈光隱映又四景堪歎風花雪月世間愛戀偏酬追歡賞翫幾恃休不悟陰公等候獨我揺頭不管内將玄妙尋搜瑩然顯出那因由正是余家本秀又四瀆堪歎江河淮濟長長運渡迷愚洪波急浪接天衢只是西來東注獨我揺頭不管輪流玉液瓊酥三田澆灌結成珠七寶山頭便住又四苦堪歡生老病死世間大病洪痾傷嗟戇鹵强添和怎免輸迴這箇獨我揺頭不管時臨還與他麽玉花叢裏睹瓊科五色雲中穩坐又六首贈友修鍊米麵隨時加減汞鉛依此抽添三光真秀轉甘甜不請生情起念七子便鋪金簟九門各看銀蟾香煙盤繞玉峰尖方得長生證驗常把内真頻看休教外景長侵尖竿尖上細搜尋正見嬰兒弄影雅詠高吟叫笑清風皓月吹臨分開轉作紫芒金艷迸千花萬錦酒飲清光滑辣果餐軟美香甜兩般每日做抽添八味依時給贍信步六街走徧須尋七寶粧嚴三田九轉似銀蟾一性孤靈有驗人要修行猛做我心除盡堪爲不將筋力謾胡施閑裏真清漸自白雪變成姹女黄芽養就嬰兒雨般消息有誰知悟徹分明便是酒飲清光滑辣肉餐軟美香甜世間迷誤總無厭箇箇臨頭路險獨我悟來口遠唯余省後心嫌十分戒行愈精嚴没分酆都赴點悟徹兒孫偉貌奪衣曰奪飱肴笑欣悲怨類咆哮正是材狼虎豹不與同居打鬧回頭便載青包任隨雲步訪三茅同話清虛道教行香子一鼓纔鳴水德行香看烏龜波上呈祥鼻全喘息眼眩昭彰會戲澄濤遊澄浪隱然江黑霧凝凝充滿皮囊牢封繫信任飄颺沖和上下流轉邊旁便變成雯結成蓋積成霜二鼓纔交金德行香虎兒上坐箇嬰郞腰懸白刃手執青鋼把百魔驅千魔勦萬魔亡廣現林羅徧吐銀芒斗辰端拱正魁罡西南的位指出芬芳得善因開良因闡吉因昌三鼓纔分火德行香月初端正照心王紅紅赫赫煒煒煌煌見本真生靈真慧太真匡三處均匀一路平康覩青天瑞靄舒張縱橫攢聚能罩圓方早弄珪環持珪璧執珪璋四鼓纔平木德行香青龍上坐箇嬌娘口噴赤氣身挂朱裳更戴瓊花餐瓊蘂飲瓊漿往來諧歡交媾相當欣然用顛倒陰陽衝開卯甲日放晶暘衮大明珠通明焰過明堂五鼓纔成土德行香偏能將四象包藏如今盡顯聚在中央没白歸青紅歸黑不歸黄已證空虛便出崑岡金童來祕語宣揚天皇賜詔授與風狂永處清閑常清静得清凉又自詠有箇王三風害狂顛棄榮華乞化爲先恩山愛海猛捨俱捐也不栽花不料藥不耕田落魄婪躭到處成眠覺清凉境界無邊蓬萊穩路步步雲天得樂中真真中趣趣中玄又贈弟子再索新詞不寫藏頭分明處説箇因由諸公不省尚自相求被風流事常汩没幾時休悟取玄機認取持修丹成後神氣精收前程穩路三島十洲你早回頭應與我共同遊如要修持依恁相當出真慈真慧無方上從父母下順兒娘待放瓊花飄瓊屑飲瓊漿做就金園建起瑶房這朱郞常爇心香命聲響喨性韻玎璫便得清泠成清浄處清凉要飲香津唾盡稠黏將華池神水相兼東西澆溉上下抽添便景星呈明月正太陽暹漸入亨通方識甘甜器珍成不用鎚鈐閑中轉寂静裏加恬得住晴空居物外出山尖得道陽得道陽來得道陽自然碧洞隱雲房玉訣靈符清氣爽金丹大藥勝衣裝豈似人間輕薄郞徒誇黄白滿箱筐我寶三田常運轉吾家一性没驚惶正月寒威漸漸回靈花九葉向東開玉液流時專益氣寶芝採處物生荄養就重陽現兩臉蟠桃嫩臉笑瓊釵七魄三尸隨臘去五方九轉逐春來二月還知水氣和風生木德自然歌兀兀轉生離内女怡怡笑殺月中蛾耿耿分明天下河我今回首出高坡三萬六千神曜聚重樓十二液津多三月清明滅盡煙百花堪綻艷陽天姹女聚柴新焰畔嬰兒弄水舊池邊寶鑑當胸只自懸翁婆媒合好因緣朱雀騰雲方出衆青龍駕霧得高遷四月朱明和氣清心花七寶愈分明教你會時獨自語請公休慕百禽聲火焰纖長漸漸生從兹萬木得嘉名十干位中吾獨走五行宫裏我先行五月炎蒸陽氣嘉正堪端坐問南華這箇不能誇肝木那人偏愛放心花煩惱俱無遠歎嗟日當卓午不教斜玉兔過來添白雪金烏顯處吐黄芽六月純陽盡入莊陰魔赳退出街坊壬癸北方添腎水丙丁南嶽爇真香鬼魅妖邪盡總忙群魔難聚没隄防子後看時知日短午前坐處覺宵長七月庚辛海水深一輪明月運天心飯熟須知薪趁火衣成不離線因針修就無爲七寶身還令當日到如今白虎吼時頻擒捉黑龜行處轉思尋八月清凉白露句萬民安樂養真身窈窈冥冥雲外客昏昏默默月中人雖是居塵不染塵也無喜怒亦無瞋既處逍遥生瑩滑自然聚散去皮皴九月蒼天爽氣高重樓復降雨瀟瀟攪海赤龍真自在迎風木馬肯無寥每向廛中作繫腰六銖衣挂勝紅綃醉後恣眠青蘇塌醒來頻採玉芝苗十月紅霜又更清黄婆得半入深溟乾盡水銀唯我健復生神氣更誰聽有緯須知先有經織成紈綺便堪行離火便生紅芍藥坎泉傾下雨霖零十一月嚴風作威月中玉走日金飛結就三三三處寶得披六六六銖衣乘鳳携鸞跨霧歸上天降勑不相違功滿三千緣業盡行成八百落塵稀十三月圓成錦綉四時枝葉不乾枯看取火中頻取水自然水裏却安鑪龍虎龜蛇認吸呼百骸俱滿立須臾一顆明珠三下有三般惡物一齊無已得靈符萬事休百寃退盡任他愁好把瓊漿添滿腹更將金髓灌盈頭都爲十因得此由翁婆嬰姹住綢繆教我携將三直柄請公認取一彎鉤紅窗迥五千言二百字兩般經祕隱神仙好事靈中省悟徹玄機結金丹有自得一惺惺通不二處逍遥景致超然永遂共紅霞同彩雲歸罩籠住祥瑞五更令一更初鼓聲傻槌槌要敲著心猿意馬細細而擊動錚錚使俱齊擒下萬象森羅空裏挂潑焰焰神輝惺惺灑灑明光射入寶瓶宫早兒嬌女姹二更分鼓聲按匀匀打自然虎龍交换精氣神各住丹房也竝無錯亂撞透重樓知片段這玉液瓊漿往來澆灌便須教溉出黄芽漸生來好看三更端鼓聲正鼕鼕響韻音轉令鳴瑩其中便聒現靈根會通賢道聖慢慢來迴遊捷徑傳銀箭這番穿成雅令用親鏑鏑上紅心現清清静静四更高鼓聲鋭忽然間振動天花徧墜前面却有箇真人戴星冠月帔得此妙玄成吉利望北斗杓星西南正指看看底剔綻瓊花做祥祥瑞瑞五更終鼓聲閑被那人攂動做成顛倒金盤内托出神珠放霞光萬道窈窈冥冥真箇好從此復通他當初至寶如今却歸去何方住十洲三島雨霖鈴東方甲乙見青芽吐早應時律南陽正現紅焰初將熾炎炎濃密西動金風颯颯致清爽往來飄逸北氣候祁寒嚴凝聚結成冰瑞中吉肝心肺腎勿令失四門開瑩徹都歸一金丹轅在空外明耀顯五光齊出上透青霄唯占逍遥自在寧謐到此際還得無爲永永綿綿畢重陽全真集卷之八
