front:
  text: 重陽全真集卷之十枝十
  hash: sha256:83641adfe73df2d53bcad7f1d6fe71a1b2ed1e1ef6433481aa9d8ca2ce5abc7a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_SJB_010-250741b, image: sjb/25/250741b.png}
body:
  text: 終南山重陽子王嚞譔詩贈王俊害風故故謁華宗三教唯公道話同此際遇逢齊上下中間會聚各西東須知冬至青和白認取春分緑間紅急急三光如可悟忙忙四假盡成空圓明一點皆能有物裏千般總被蒙覺性自然通水湛達心那入百花叢般般打破仍歸妙箇箇還迴便見終飯食充饑機兩妙面前相對玉玲瓏贈道衆盡知長與道爲鄰搜得玄玄便結親悟理莫忘三教語全真修取四時春養成元氣常充滿結住靈神没漏津十九圓光如我願敢邀相伴樂天真詠雪得其真趣絶搜尋物物般般總不侵碧落湛澄非有意白雲來往本無心盈盈明月增佳致細細清風送好音舉目慵觀潘岳賦怡顔懶撫伯牙琴外除花卉游人静内藴芝苗只自臨决要三田歸至寶亦令一性上高岑養成幻體如光瑩舞正胎仙似嘯吟杳默昏冥長作伴寂虚永保水中金問多夢捉住心猿治住神自無夢惱内中真尾閭不動全精氣腎海長添乾水銀内則愈能增覺性外來應是養生身廣行法籙頻施救便是逍遥得岸人于公求詩無思無慮是真修養氣全神物物休亘劫容顔須要見元初光彩决重收莫將外景心中藴好把靈丹性上求依此自然超彼岸都緣清浄大神舟諸散人求問修行須藉色身修莫殢凡軀做本求假合四般終是壞真靈一性要開收聚成無相成無漏結作丹丸作備周五道光明同是伴能超清浄大神舟贈王哥修行學道並無師只要心中自己知浄處常常生智慧閑居每每起慈悲搬柴運水唯聞做觀相存思各自爲減食忘情爲慷慨任歡取樂是修持救人設藥功尤大戒酒除葷行最宜直待開門觀宿性宿緣堪可便相隨問内事修行事理説叮嚀只要心中静裏明眼界不生龍自住鼻門無閉虎長停舌根退味心神悦耳内除聲腎水清南北沖和同一體東西交媾滅三彭木金厮仗盤桓處嬰姹相隨自在行結就金丹出頂上五光射道綵雲棚喫酒賭錢心遊閑散樂浮華放肆開懷是産涯飲酒莫教離孝順賭錢休要壞居家道門好入時時重王法須遵可可奢平等能行方便事也教隨我伴煙霞學士勸學宰予晝寢不堪看惜取光陰倦睡餐甕牖勤勞非取辱茅堂修進敢求安隔窗映雪心常樂閉户懸頭性自懽大志不須持一寶孫公正好學倪寬問曉達搜開本有自分明放出真光滅盡情三寶决然攢正覺一靈何慮不圓成得通妙用須澄湛會認玄微貴浄清堪做無爲雲外客長生路上步前程自述殷紅瑪瑙閴中懸清静玄中在眼前便把瑠璃安甲室更將琥珀頓庚田四般珍寶牢收取三耀光中謹密傳此法得時空外去彩霞深處步金蓮問生死常常知足善縱横莫要深深戀火坑性上分明開兩路午前認取打三更一真自顯靈光結七竅皆通瑞氣盈正合慈悲超法界清凉路上得長生友人獻酒登途上路不由吾雲霧相招本性甦萬里清風常作伴一輪明月每爲徒山青水緑程程送酒白粱黄旋旋沽今夜一盃如有意放開紅焰照冰壼友求清静黑雲散盡月偏明照耀塵寰滅有情煩惱不生全妙理是非去徹出深坑山頭别有微風至心下重將小雪迎面壁散人知此味逍遥路上證圓成榮華不著是良因遠遠非非眼界新八識精研通不夜五門光顯照長春由斯更許超三界依此應靈出六塵一朵金蓮歸上界圓成永不墮迷津贈友人大道無言不可聞禪宗坦蕩乃同群兩般打坐誰能悟一炷香煙孰會分奪得三光真秀氣便消四大敢紛紜團圓耀彩投空外方得逍遥似白雲友人求問自然消息自恬然不論金丹不論仙一氣養成神愈浄萬金難買日高眠紅紅火焰三峰透白白蓮花五葉鮮勘破行功無作用于斯堪可認玄玄詠眼如日光明似水晶燭人鑑物愈惺惺只觀粉貌空虚景肯覽黄庭内外經眸子正安難見道童兒端坐不瞻形教公若遇金篦子刮盡塵晴慧目明自悟齒落髮華現老軀本靈猶自戀癡愚市中來往干人禄山上清虚負月孤擺徹水泉團火氣撥開煙焰指冰湖從兹舒展紅霞脚踏碎純陰這轆轤詠劍惺惺寶劍最分明越礪磨礱對我呈高舉劈開新道眼一揮斬斷舊心情朝生瑩浄渾無染夜吐光芒更有聲戰退妖魔邪氣力盡投空外化成形仲正宅今日清明賞水廳堪爲住宅總康寧兒孫女婦渾家慶德行荷蓮一道馨退己進人唯仲正休心積善勝看經時來同處青山外萬頃白雲作畫屏昨宵夢請八神仙便付鸞衣降玉編數幅蠻牋鋪錦繡一枝象管走雲煙廣留教法開心地善寫詞詩種福田祕密天機誰得悟害風風害獨能傳聞鶯啼今朝三月二十八耳邊忽聽鶯聲發驚開道眼一觀瞻羽翎新用黃金刷見予轉轉弄清吟他意還應會我心恰似琴聲初調品無情風月是知音初春世網擘開肯染塵名園恰似洞中春問公還識逍遥客顧我堪爲自在人坐上詩篇俱濟濟醉中醁醑任頻頻四時不老花芳别唯有清香一蓋均凡籠跳出竝無塵此日誰知物外春對景肯從搢紳者將身已作散閑人詩緣毛穎傳來速酒泛芳巵轉得頻認取祖宗真實地黄芽澆灌滿園均留題友人樓深羡孩兒樂使牛不須裝裹急梳頭清閑自是親香火勞役誰知遠佚優咫尺蓬萊人不見逍遥紫府我先酬愛河猛捨尤清浄别駕輕軻泛十洲贈友詠雪密布彤雲慘白沙舞空亂目閉天涯嘉祥自是封盈尺應瑞依然結六花景外畫圖歸釣叟瑩中清浄屬仙家晩來皓月開濃霧一派流光射素霞贈姪一首新詩贈七哥予言切記莫蹉跎遵隆國法行思義謹守軍門護甲戈飲膳共爲通揖讓言談歌出用謙和先人後己唯長策竚看歸來唱凱歌上兄壽祥雲瑞靄生賢哲五百時臻遇三月十一日辰尤最奇三千年見蟠桃結莫辭金斝酒頻添好把玉爐香滿爇仰祝遐齡無可比有弟今朝細分説若比金玉均可缺若比江海亦不竭若比鐵石俱可裂若比松栢皆可折未若兄之愈眉壽永永綿綿不可絶日中已過艶陽天嫩緑微紅是禁煙恰到清明真火得不迷濁酒道心堅自知一性通長壽何恥凡軀掛舊氈燕語呢喃全姹妙鶯啼睍睆覷嬰賢三田誰識虚中寶四假予知嶺上看但把五行顛倒使便教他日遇神仙述懷閑閑閑得染章篇顯出文房内四賢烏帽嬰兒添硯水朱衣姹女運陳玄白顔公子傳銀筦緑鬢佳人鋪錦牋九轉鋪排真玉漾一揮寫就寶珠圓明光粲粲千般瑩彩艷團團五色鮮親自擎將空外去十分堪獻大羅仙害風王喆遠山隈信脚同雲近海垓八百行成雙樹果三千功滿一聲雷更無意馬遊情色那有心猿探世財財色兩能長滅絶色財盡許不追陪永除失脚黄泉去久得回頭道眼開任處碧霞光熠耀朗隨風月過瑶臺贈李道友見公逸樂樂無涯道在真全去世華雅句分明謫仙子遺風正是老君家須知文苑高韓愈壘作琴堂感伯牙有箇王喬還識否同歸蓬島跨雲霞又繼韻雲根上起任天涯到處臨風弄月華對水雙鶴由我跨輞川一景屬吾家清虚益氣憑師教恬淡通津愧易牙占得逍遥真自在何須服藥與餐霞詠赤目耳中何事轉加聰兩目如盲爛爛紅恰似禪僧初入定正如大道始行功内思不出澄神住外想俱無忘閉空意馬心猿重捉住頂門玉路自然通詠磑磨磑大驢微力不勝喝驢人早便生嗔一心發恨嫌行慢兩手扶鞭打得頻只爲不知輕與重更交轉受苦中辛伊能見麽無仁德只此分明後世因師父鎖庵化馬鈺有治平寺無名和尚將為守静有頌曰開閉深藏有甚因無言静坐去貪嗔高樓畫角如春夢釋海波清見本真了了了時心便了微微微處水澄清為觀俗事愚癡子故守襌堂不出門師父每句復酬三句完之為八絶按八識開閉深藏有甚因都緣眼界絶紅塵白駒點點難相染野馬紛紛任自申無言静坐去貪嗔耳内繁華勿我親不鼓聲音唯作伴無弦曲調自爲鄰高樓畫角如春夢鼻息沖和言不用此别分明善果生這迴只把良因種釋海波清見本真舌中五味不登唇三時恬淡唯清浄一味甘甜没價珍了了了時心便了身中一點圓光小從兹默默與昏昏又更冥冥還杳杳微微微處水澄清意盡心忘滅盡情無漏無爲登正覺不增不減證圓成爲觀俗事愚癡子妄想難除生與死迴光返照這裏來識心見性投玄旨故守禪堂不出門並無煩惱性中昏未酬救徹衆生願好把玄談細闡論贈釋友號無名法師今已得清凉一性昭然顯瑞祥却把無名爲雅號釋迦元住在何方友人求問青春應是好看書義理昭然覺自如若赴選場須决勝榮家顯已掛金魚閻學士寫上四句續和十二句輪迴生死如何免認取亘初真正面三珍五彩一齊攢長生路上霞光現欲愛貪財甚法離真清真浄是精持般般物物俱無著一箇圓光上玉池過隙光陰能久矣人人總悟非行使閑中等取真箇真得後逍遥共歡喜衰顔寧再去年時裏面真人本不衰莫戀外容著假合嬰兒相貌示無移贈釣翁這箇魚兒耍更顛錦鱗潑潑躍清泉金鉤三擲吞香餌一掣神仙几案前贈童子修行白袍青包宿世因有緣遇我脱迷津雖然未達玄中妙已作蓬萊小道人贈修行友跳出陰陽造化關一心向道莫迴還浄清便是神仙路只要閑中養内顔紙旗上書占得風來便有緣朝朝贏得日高眠飢時街上來求乞只要人間自肯錢和道友韻奪得真容不問年滿爐香火五千言翛然燕坐通恬淡獨哂明靈出玉軒贈劉四友常把鏡中人别辨莫教珠上起塵埃有緣體貌捐新業無相身軀産舊孩夢裏逢予睡没言須知正訪害風虔公還要得頻談論認取冰中冷處喧命中福淺少因緣只爲勞生日業牽若是要居閑散地長令清浄没憂煎稍留片語輕提耳直待一身無一事此時方可共逍遥路遇仙人談不二一指長生路上遷待公性分有因緣亘初那箇分明見何患將來不作仙一想前言是没緣在公只要志牢堅推心朴實無偏黨未作神仙已做賢尋思遭遇幸然間怎會閑中那箇閑人不堪憂方是樂恁時與我共躋攀勝如不見先生面只要公心長作善臧吉嘉祥不離身明珠一顆分明現夢裏逢師是睡仙從公知道這因緣若教足下還如此也没驚憂自在眠佳時三月此花開檀作斯心玉作腮折得一枝冠上插也應隨我到蓬萊畫骷體警馬鈺堪歎人人憂裏愁我今須畫一骷髏生前只會貪冤業不到如斯不肯休爲人須悟塵勞汩清浄真心真寶物奪得驪龍口内珠便教走入崑崙窟詠月上弦金月下弦銀上下金銀各半斤被我合爲十六兩内中星分怎生均詠矮槐無極真人種矮槐清陰覆地有誰陪今朝對此成歡悦記得當時是我栽遊白鹿觀觀有清凉號集仙臺名白鹿昔昇天我來到此君休笑已在白雲洞裏眠無何霍氏太言深昨日天晴今日陰天意若教人數得不高不廣似人心不寒不暑好風吹金餅團團照我衣武曲星臨文曲位上元節比下元時題友人池塘孫氏池塘似渼陂前瞻波面静無聲轉頭却見潺湲處流落輪迴爲不平六月聞蟬皂衣脱了覺身輕便作金蟬樹上鳴已得清風真伴侣誰人此日悟新聲退下烏軀體便輕高槐美蔭喜長鳴逍遥枝上亭亭坐自在風前款款聲詠中秋月怪來天氣逼人寒湧出金盤宿霧殘不比尋常三五夜勸君休作等閑看剔燈杖輕微纖細燼爲鄰長在油中汙本真愛把燈光頻剔撥怎知紅焰返燒身詠竹夜月照時金瑣碎清風拂處玉玲瓏歲寒别有非常操不比尋常草木同詠茶昔時曾見趙州來今日盧仝七椀猜烹罷還知何處去清風送我到蓬萊以扇贈姪洗麈是人洗拂酒兼羊我有霜紈與七郞除垢招風開道眼教兒永遠得清凉和十五夜月日暮雲收爽氣寒冰輪輝映向更殘清光此夜分明别休與凡常一例看題茶坊已喫蟠桃勝買瓜此般風味屬予家真須换假全真性指路蓬萊跨彩霞歎世堪歎世間名與利朝貪暮愛没休時悟來恰似觀棋者迷後渾如敗者急急修行急急修我今題寫此骷髏從來世上争名利不到而今未肯休欲東行被友偷了引相留脚引誰留慢慢收元來不用這憑由今朝已得前程路便是逍遥達岸舟脚引伊將誠見察扶風真行成搜刷足知王喆得因緣會要修持遵國法閑意一輪明月一清風内外交馳西復東滚出崑崙山頂上照吹明爽自然雄對鏡誰知將鏡異中觀分出南山與北山我把靈臺頻自照不須别辨好容顔自詠從此擘開真鐵網今朝跳出冗塵籠便將明月堪拏弄撥斷閑雲好害風詠岀籠鸚鵡畫成鸚鵡不嚶嚶跳出牢籠離死生告你蚫蝶休弄侮如今不向此中行離親詠心浄神清鬢不華水雲便是我生涯休交死後渾家送贏取生前出離家五月一日奉白金蓮社裏人蕤賓月一起良因諸公若悟靈山食暗换長生不老身五月十五日闔家安樂吉祥先次後心頭用火然燒見本來真面目望中觀喜看團圓玉花金蓮社勸君莫戀有中無無無休失無中有有有養出玉花頭頭頭結取金蓮首贈釣叟釣罷將歸又見鼇亦知有分列仙曹鳴榔相唤知予意躍出洪波萬丈高崔千户求聰明以詩贈之秀氣要清清於中性用貞自然開智慧應是出聰明爲教同其閔延年共比彭並通三教理遠遠得期程郝昇化餘打破罐因贈二絶撲破真灰罐却得害風觀真待悟殘餘有箇人人唤欲要心不亂般般都打斷子午卯酉時須作骷髏觀閑吟自哂這風狂因何喜和光隨緣消舊業無復造新殃意馬須牢繫心猿切緊防道修如急急日日得馨香歎骷體此是這王喆前生心性劣脱了你骷髏現出中秋月詠清凉清凉何所似不與苦寒同半夜臨潭月初秋過雨風贈范才甫有姪唤作王五郞其妻唤作我姪女二人做取好因緣兩箇休遭破疾苦若便尋思這汞鉛便令調養真龍虎真龍虎人不識赤鳳山傍各一隻守定巢窠共結成東西换過成交易成交易正好行丹田界上殺三彭無人會得雙關義有箇靈童打五更打五更傳消息一派甘泉正好契便是醍醐灌頂來此中惟我知端的知端的休休休姪女姪兒急急修若還不肯聽予言荒郊定作兩骷髏金蓮社開眀䟽竊以慧燈永照須憑玉蘂之光性燭長明决得金蓮之耀内沐三光之秀外消四假之名步虚躡空探玄搜妙洗來瑩浄之鄉出入芳馨之路各懷珠璧共捧瓊瑶顯要全神須令養氣稍通斯訣請掛芳銜玉花社疏竊以玉化乃氣之宗金蓮乃神之祖氣神相結謂之神仙陰符經註云神是氣之子氣是神之母子母相見得做神仙起置玉花金蓮社在于兩州務要諸公得認真性不曉真源盡學傍門小術此是作福養身之法並不干修仙之道性命之事稍爲失錯轉乖人道諸公如要真修行飢來喫飯睡來合眼也莫打坐也莫學道只要塵冗事屏除只要心中清浄兩箇字其餘都不是修行諸公各懷聰慧每日齋場中細細省悟庶幾不流落于他門行功乃别有真功真行晋真人云若要真功者須是澄心定意打疊神情無動無作真清真浄抱元守一存神固氣乃是真功也若要真行者須是修仁藴德濟貧拔苦見人患難常行拯救之心或化誘善人入道修行所行之事先人後己與萬物無私乃真行也伏願諸公早垂照鑒重陽全真集卷之十
