front:
  text: 重陽全真集卷之九枝九
  hash: sha256:273a46d8d080ed162d2d6b4c504a5a6c981813eaa2e288ce36cb5fddec29cf72
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_SJB_009-250736a, image: sjb/25/250736a.png}
body:
  text: 終南山重陽子王嚞譔歌詞詩了了歌漢正陽兮爲的祖唐純陽兮做師父燕國海蟾兮是叔主終南重陽兮弟子聚爲弟子便歸依侍奉三師合聖機動則四靈神彩結静來萬道玉光輝得逍遥真自在清虚消息常交泰元初此處有因緣無始劫來無罣礙將這箇唤神仙窈窈冥冥默默前不把此般爲妙妙却憑甚麽做玄玄稟精通成了徹非修非鍊非談説惺惺何用論幽科達達寧須搜祕訣也無減也無增不生不滅没昇騰長作風鄰並月伴永隨霞友與雲朋竹杖歌一條竹杖名無著節節生輝輝灼灼偉矣虚心直又端裏頭都是靈丹藥不揺不動自閑閑應物隨機能做作海上專尋知友來有誰堪可教依託昨宵夢裏見諸虬内有四虬能跳躍杖一引移一脚頂中迸斷銀絲索攢眉露目震精神吐岀靈珠光閃灼明艶挑來固樂然白雲不負紅霞約窈窈歌人人只要生害風只要死生則無著摸死則有居止不戀皮肉脂不戀骨筋髓藉甚髮眉鬚藉甚舌牙齒安用脚手頭安用眼鼻耳小腸能成水大腸能成米水米太茫然晝夜何時已認破醜機關須當分彼此别般二物合和真元來一道分明是這箇在何處這箇在那裏教公會得時也飲清凉水直待正純陽方稱重陽子元元歌父雖父母雖母論著親兮没説語只爲當時鑄我身至令今日常懷古兒非兒女非女妻室恩清安可取總是冤家敵面讎争如勿結前頭苦我咱悟我咱補唤出從來清静主要見玲瓏好洞庭須開端的真門户便知宗便知祖了了惺惺歸紫府離鳳空陪北海龜甲龍枉伴西山虎仗靈刀擎慧斧劈破崑崙將寶數萬顆明珠戴玉冠無窮彩艶衣金縷這元元迴光覩五五不離二十五依此行持依此修姓名預録長生簿得得歌陰變爲陽只自審冰鑽結火能唯恁有緣搜見古今真無始却來呼箇甚呼箇甚唤神仙窈窈冥冥不記年撞著良因五劫祖相隨直入大羅天大羅天通妙景放開明耀須臾頃盈盈一粒任綿綿寂寂圓光傳永永傳永永做靈靈處此清凉絶視聽何用醍醐香馥郁不誇環珮響璫玎響璫玎聲滅歇别生彩艶重超越自然瑩瑩寶中珠返照輝輝天外月天外月走蟾輪怎此如如没價珍正一悉除生滅相端嚴堅固妙玄因妙玄因誠祕訣那曾瞋怒并歡悦虚空空上達晴空言説説前非有説非有説愈昭彰得得歌中現道場曠劫未分新雅致從今傳出這名方惺惺歌謂何四大復牽纏汩汩當時那箇仙好把圓成從雅正莫將假合做因緣殷紅再結雙關寶潔白重開五葉蓮得得先須修九轉盈盈首上養三田養三田爲定壽金毛獅子頻哮吼日端午上看玄陰夜半子時分瑩晝常食休窮萬物機運神奪取三光秀外容焉用顯光華内貌多方頻整救頻整救是元初此事今應信有諸遊歷先逢太赤祖歸來還見黍中珠七般珠户通開闡六道銀光任展舒百寶臺頭唯仰覷這迴親現這真如這真如實不錯逍遥服餌靈丹藥輝輝燦燦甚分明了了惺惺尤灑落迎日堪誇翠霧身臨風透出紅霞脚崑崙頂上玉峰前一朵瓊花爲誓約勸道歌修行便發好枝條不會修行枉折腰經教豈曾窮義理香煙只會謾焚燒苦心苦力多憂慮勞體勞神愈悴憔没智强搜無漏果未通閑想有緣橋他人公案長傳説自己家風敢擺揺静裏邪生神鬼位執中迷入散凡包謹持符水唯端正却被衣餐做諭要誇詫清虚干淡薄尊隆高大眩彰昭風花雪月爲愁景酒色氣財是業苗煩惱門開談覺悟是非路闡説逍遥晨昏嗽嚥增空耗子午功夫謾颯飄已上般般皆勿用從今字字最堪消自然清静真功著信任慈悲實行超寂閴恬淡宣潔白杳冥昏默受和調虎龍莫放遊三界嬰姹休教舞六么壯矣根源能應拍孤然靈物善吹簫二儀交泰同泥捏五欲捐除類木雕捉住空中真響喨咄迴性上假咆哮一雙女子投金礦兩箇童兒入玉瓢折取木梢重煅鍊次開泉水再淋澆亭亭顔色難裝點簇簇形容怎采描貌態玲瓏通眼目光輝燦燦射瓊瑶放歸仙館稱嘉號只許吾門唤阿嬌得得得中長得得任詩任曲任歌謡自歎歌嗟余幼年父母惜長思孝養當竭力情知難報罔極恩區區眷巒惟多積如今不肯自焦勞一味貧閑肯賣高喜得逍遥真自在日中打睡恣陶陶愚迷不識余家意曉夜忙忙空鬥智四般拘執盡貪婪酒色更兼財與氣争如風害便抽頭無慮無愁更遠憂雲水青山待樂遊願歸三島赴十洲出凡籠入碧洞假合身軀休戲弄恁時猿馬總歸空一輪明月唯余用祕祕歌刀圭刀圭好刀圭幾箇能通盡執迷便做悟來知去處怎生安羈怎生携這刀圭又能飲洗滌中間十樣錦萬葉千花轉轉新五方顔色皆分品這刀圭亦團團透出靈光只自攢潑艶艶兮無可比也知賽過紫金丹這刀圭刃子快歷劫已來不曾壞智者見時放慧輝愚人昧了愈疑怪這刀圭真是鋼空中自在吐光芒唯有害風敢拈弄便令分出本清凉這刀圭緣亘古不是陰陽不是土只是一般哩㖫囉哩㖫囉上開宗祖定定歌修行便發好枝條不逐輕飈信任飄翠緑常蒙雨露潤軟柔寧懼雪霜凋由斯活樂津方大似此滋榮氣漸調休倚散丸求德行莫憑符水望昇超古人公案須通透自己家風好擺揺外景勿侵外事絶内容搜出内香燒娉婷女子投金礦俊俏郞君入玉瓢一則礦中栽寶樹一唯瓢裏種芝苗雙頭厮見歸三秀兩體相逢舞六么十指纖纖能擊鼓七門闡闡喜吹簫炎炎猛焰波中迸泛泛洪波焰上漂正覺途新除垢膩圓成路瑩出塵囂紅霞覆燾凝青漢翠霧盤旋住碧霄妙妙玄玄無罣礙惺惺了了永逍遥逍遥歌簡聲頻簡聲快休妻别子斷恩愛往昔親情總休怪害風不把三光昧酆都鬼使已迴頭黑府除名無追對口能言心能行蓬萊穩路是長生玄玄歌崷崒峰安萬丈杆杆尖有箇嬰嬰走清風裏面騁狂顛明月前頭誇好手旋旋拈拏碼碯丸頻頻趯弄珊瑚斗丸與斗兮失落無等閑失落費功夫撥開銀浪觀瓊浦正見金鼇在玉壼氣艶氤氲噴琥珀眼光燦爛射明珠孩兒方是下杆來奪得明珠言誓約不教驪龍頷下藏様入雲霞投碧落杳杳冥冥不記年從兹頓覺無爲作達達歌修持便要發佳謨會做搜尋廣擺鋪二八佳人安手脚六分公予下功夫娉婷朱貎知金礦俊俏烏顔看玉壺自飲自沽醒復醉任歌任舞笑還愉撞開陽路傳珍寶通過陰關出轆轤漸上崑山呈片玉復歸巨海弄明珠般般拈捻齊玄旨處處遊行見坦途瓊萼滿頭藏妙有瑶花盈足趁虚無能教面目長來往養就根源是吸呼周正元初真等覺的端豆始大惺甦孤然朗照何曾異五道光輝總不殊緣喆黄花成一得如喬赤舄化雙鳧清清三島應同去瑩瑩十洲合共趨寂間雲衢唯洞達逍遥永永列仙途贈友歌海之秀氣誰能討寧海軍中鄒正道金浪銀濤洽本源來迎復看蓬萊島蓬萊島在何方杳杳冥冥接上蒼自在逍遥孰同處唯公與我住清凉住清凉真箇有青童捧出長生酒便令傳透四時春明珠一顆光如吼光如吼吐紅霞覆燾晴空顯異華直下靈波澄不動騰高霄漢邈無涯邈無涯誠可見妙妙玄玄容顯現再闡雲車入碧虚大羅天上成修鍊成修鍊得元根便是無爲大道門唯願回頭通此著果登無漏絶談論鐵罐歌鐵罐歌鐵罐歌一從打造按金科腹内空虚成妙果這般消息孰知麽鐵罐成鐵罐成頻添玉液滿盈盈火煅鍊時抛雪浪水澄清處賀昇平鐵罐携鐵罐携響聲敲動振愚迷若要響聲人會得不分南北與東西鐵罐新鐵罐新内光外耀自相親添鼎須憑津液水調和全藉氣精神鐵罐寬鐵罐寬氣騰騰處雪漫漫方遣虎龍蟠遶定便將鉛汞裏頭安鐵罐深鐵罐深凡塵俗垢不能侵作用焚燒木上火行持煎煮水中金鐵罐光鐵罐光三光照耀瑞中祥每到用時能造化欲將歇處便清凉鐵罐燒鐵罐燒昨宵今日與來朝按節安鑪全藉地依時養就玉芝苗鐵罐能鐵罐能能中兀兀與騰騰杳杳冥冥風作友昏昏默默月爲朋鐵罐堅鐵罐堅虚心大肚貯幽玄内外鍊成金玉體一衝直上大羅天西江月堪歎西南地順燒柴都是真銀火中焰迸兩般身一半金花綻盡認得斤星有準即時分付良因西江月裏弄精神顯出靈童真印堪歎水流一道須憑添鼎千遭海心萬丈裊竿牢定後尖生芝草會得功夫早早自然快樂陶陶西江月裏採芝苗携去十洲三島堪歎離門坎户須鄰甲地庚途暗中拍手笑相呼款款合和一處既把金關鎖住白羊隊隊成珠西江月裏玉蟾孤朗照長生穩路堪歎雲生頂上騰空别有嘉祥幽微玄妙總生光鼎内煎成銀浪漸漸鍊成金相瑶花朵朵飛颺西江月裏飲瓊漿萬道紅霞分朗堪歎木金相間甲夫庚婦開顔笑聲美處水潺潺一派清流出澗滋潤黄芽無限便教白雪循環西江月裏我躋攀步步銀蟾顧盻堪歎日時更改頻頻拂拭靈臺明光一點絶塵埃瑩徹那分内外占得逍遥自在笛聲散盡寒梅西江月裏桂花開香引清風一會堪歎白蓮吐秀三車齊駕金牛自然紅艷覆山頭不在勤勞做就全藉精光護祐丹成照耀神舟西江月裏看瀛洲一派仙歌共奏堪歎這般曲調感他石女吹蕭山頭謾説水頻澆海底虚言火燎遭逢圓明正照真風廣布清飈西江月裏喫芝苗味味將來了了堪歎一靈真性得來笑殺惺惺不燒香火不看經走入這條捷逕便把那人喝定今朝説與叮嚀西江月裏最分明堪用家風清瑩堪歎青霄碧漢高空景致尤寬今朝清爽有餘懽拈出我家公案方顯平生手段騰身便入雲端西江月裏跨祥鸞直上虚無仙館悟真歌余當九歲方省事祖父享年八十二二十三上榮華日伯父享年七十七三十三上覺婪躭慈父享年七十三古今百歲七旬少觀此遞減怎當甘三十六上寐中寐便要分他兄活計豪氣衝天恣意情朝朝日日長波醉壓幼欺人度歲時誣兄駡嫂慢天地不修家業不修身只恁望他空富貴浮雲之財隨手過妻男怨恨天來大産業賣得三分錢二分喫著一酒課他每衣飲全不知余還酒錢説灾禍四十八上尚争强争奈渾身做察詳忽爾一朝便心破變成風害任風狂不懼人人長恥笑一心恐昧三光照静慮澄思省己身悟來便把妻兒掉好洗面兮好理頭從人尚道騁風流家財蕩盡愈無愁怕與兒孫作馬牛五十二上光陰急活到七十有幾日前頭路險是輪迴舊業難消等閑失一失人身萬劫休如何能得此中脩須知未老聞强健棄穴趖墳雲水遊雲水遊兮别有樂無慮無思無做作一枕清風宿世因一輪明月前生約贈弟子頌譚仙入道慧刀能舉棄妻割愛捨了男女却要隨余余應便許羡公决烈羡公顯露我吐真誠却有少訴入道非難亦非易做苦中尋閑閑中没苦休覓嬰姹莫搜龍虎只要真清要識真趣絶盡人我絶盡思慮或饑或飽或寒或暑便戴青巾便衣紙布决要上街覓錢乞去些小絹帛些小綿絮遮藏微體長令淡素三人同行三人同處常用一心不得二慕只是兄弟並無師父惟談惟笑共歌共舞落絶清閑任詩任句如在庖厨大家管顧不可獨勞也無獨措自有金烏自有玉兔認得真閑長生門户自在亭頌自在自在真自在不論高低及内外照見五藴即皆空咄了八方無罣礙維摩笑我因何退我笑維摩尚禮拜教公認得這害風大家總赴龍華會四果頌果來海角天涯果應師指希夷果得前生知友果然會我心機指迷頌無無有有有無端有有無無有有攢無有有無無有相有無無有有無看劍頌這口劍真有力無始劫來人不識今朝撞箸害風兒吐出光芒顛倒織兩道眀輝只自知三峰頂上呈紅赩到斯不肯落凡來樣入晴空端又直傳神頌靈昏性昧著凡體自畫自描自傳起借他俗狀做形軀攢聚火風並地水陽作骨骸陰作膚眼耳鼻前安箇觜四般迷執各誇强渾身便用肉山壘我今省悟達玄微却認初真不用你若還只恁累我神撲人坈中教見底來自何方去由何路一脚不移回頭即悟假合形軀誠是假何勞更恁重描畫諸公莫使達人知惹得一場大笑話贈道友自然消息自然恬不論金丹不論仙一氣養成神愈静萬金難買日高眠紅紅火焰三峯秀白白蓮花五葉鮮勘破行功無作用於斯便可認玄玄四時睡頌子時睡子時睡玉繩抨下端嚴遂一輪明月過天庭照破中宵暗味事卯時睡卯時睡緣空直看真嘉致當中一點皎然靈瑩裏光明精又鋭午時睡午時睡香煙正撞於炎位自然馥郁任拈拏透入晴空傳不二酉時睡酉時睡恬然飲盡西江水便令澆溉出風流一朵瓊花呈玉蘂贈友入道頌若是要隨余去絶盡平生思慮心中物物不著塵事般般休序饑後麤細皆餐寒來只消紙布常睡莫起憂愁如行休生恐怖不得言是談非不得辭辛道苦長懷平等之心人痾須要救護長把假身搜獲永將内真正顧直待消盡舊業萬事般般勿做行功堪可證明有箇真師來度四不得頌不得受人欽重不得教人戲弄不得意馬外遊不得心猿内動四得頌得汞陰消盡得鉛陽自團得命顛倒至得性見金丹玉花會疏切以能全呼吸定喘息實非難會養氣神調沖和應甚易性憑三曜命變五行出陰陽造化之端在清静虚無之上要開金蘂須種玉花馨香吐而透入晴空明艶顯而朗舒碧漢得自然而輕九轉得自然而没七還自結大丹自通玄妙既爲脱殻便是登仙願露赤心請題芳號金蓮會詩諸公須是助金蓮願出長生分定錢逐月四文十六字好於二八結良緣長生永結金蓮社有始有終無諂詐諸公不可半途止直待王風去則罷勸君莫戀有中無無無休失無中有有有養出玉花頭頭頭結取金蓮首辭世頌地肺重陽子呼爲王害風來時長日月去後任西東作伴雲和水爲鄰虚與空一靈真性在不與衆心同重陽全真集卷之九
