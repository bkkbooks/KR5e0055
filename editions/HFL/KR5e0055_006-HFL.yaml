front:
  text: 重陽全真集卷之六枝六
  hash: sha256:92589fde97da97693f40b34b92b64a13acfdb94be7552abcc035656b64489c34
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_006-001a, image: hfl/0794/0794-034.png}
body:
  text: 終南山重陽子王嘉譔詞藏頭滿庭芳問修行家住坐金木水相當中起火五事竝施張許神仙全氣爽都是絶盡嵩荒原正傳妙用兩液味堪嘗漿頻做作通瓊路顯現嘉祥金丹真耀瑩彩輝光兀騰騰渺邈遊處聲韻琅琅辰見人得得出自滿庭芳又與戰公望字復拆王字論修行翁唤住人須要開張推密妙玄裏細消詳默真功永固淳厚實行堪當中寶花馥郁上下似銀霜望喆覷中一點便是明光誰會白黑青赤兼黄脉俱通九轉搬運透出崑岡頭看前瓊蘂合此滿庭芳又京兆辛吉甫見枰棋者遂書此鬥枰棊心萬轉情注意完神搜思彼此巧生姦道鋪機關爭如會自己雙關留住人這著默斷破癡頑顔好看前敲打鬧裏清閑從庚虎哮吼在高山道分明不識白黑知守交頒前勝中仙桂誰與我躋攀又邵公楊公為家緣拘繫告詞論饑寒公來問中怎奈爺娘牽兒絆妻室惱愁腸卦分明有説田正震地清凉南看前一點何不趁恃詳琅序至金木水火放炎光然見真景本有舒張覩紅霞出入開後慧刃揮鋼花綻系接引永永滿庭芳又贈母希揚話虚无中蓮出人得遇希揚高勝我事事總暉光兀騰騰自在風動與道相當藏寶花開後空裏撒真香傍銀浪淼逢煙焰暑氣成霜青芽金葉片片清凉兆城南嶺立字得天外鋪張生憶懷詞曲須唱滿庭芳又留别京兆勸韓公歸東路人子細消詳談教我須要寫詞章地慈尊幾旦輪顯圓相明光誰得心無礙吉慶好施張長真善做心靈點常使玎璫聲敲振動響盡琅琅友須憑行果花綻金蕊馨香烏朗蟾現處正照滿庭若又黃邑于公乞修行論修行翁甚喜津堪作瓊漿清火赫顛倒吉還昌顯金烏甚朗中現玉兔精詳談正處暑氣變成霜當内寶珍珠璧一一收藏尤良善善性燭施張現靈明愈耀中土本有直光冥點烟散盡堪慶滿庭芳驀山溪猿捉整是修真格各得其門長閑便歸陽陌年光景悟此得清凉兆有中仙下貧人憶蒙書誨日頻搜索意上來聞邊聲怎生掩間前朦事别是一家風尸没和松敢溪山驀喜遷鶯門開悟此去難爲雙眸迴顧得雲軿怡然穩駕飈外樂聲堪覩他舊朋霞友舞袖前來談吐中素知余唯有慈悲公據主風做里不能重步離上己清凉圓明返照出自家園圃吉瑞祥嘉慶今也宿於何處誠露非遥欣指朝元觀所瑞鷓鴣黄麥秀變隨秋内燒身日日憂被兒孫長與便遭妻女每添愁中戚戚多般恪内孜孜少得休棄金花如覺悟今專勸早回頭臨江仙此慇懃求一訣傳清静奇瑰驚神駭目自殘摧公入藥鏡照道眸開外邪魔都盡勦能治病禳灾紅水緑一聲雷田田内寶印到蓬萊又發牒外庭中呈玉翰衣列行齊分圭已許奏新文詞同轉把信章焚焰起時雲雨至神遞送無紛系接引達天君傳回語道聖知聞又白簡書金訣籙他名姓亡魂驚神駭各思存蒙追薦你愛生門户别開玄妙做人同和天尊光一點永無昏輝月照水出崑崙一定風波裏閑人户外閑方遊歷白雲間射日臨光景媚𥊺前明朗見崑山得怡然諸事略中珍寶好躋攀裏金花開馥馥馨透過玉門關如夢令贈僧子哲口中校祖葉德茶香點爇滅與煙消似圭峰祕訣切言忉利天中子哲永遇樂與登州安閑散人二首位粧變鄉取瑞性分朗滿心中端布政理尤清爽凡五馬他輔弼性感恩舒暢身處安閑散神搜尋道家珍藏因好討光明射裏真丹有況户長燒門頻溉得堪依仗生須要男交會下且休貌狀時間方面了了待爲宰相子來觀人歡趣筆詞做友琅琅朋密密每遥瞻覷空聳現瓊樓景兆妙玄同所門開風月清明四序長春堪度宜縱酒時卯上醉還醒復悟逸懷攄消情減喜謳吟處誠致禱延彭祖助本元堅固今有真樂神仙到斯永遇又鄒公索得呈鋼花吐瑞藥香爍鍊清泉澆紅焰盡財俱削圭一粒精麥髓變俗容消却山頭遊翫四時長春酒頻斟酌同卯共方澄静看嬰爲姹作喜調和傳津液夜光明錯年有幸分豆旭轉結成靈藥長生久視蓬島遇遭永樂又郭法師求緑煙紅絲不斷斧通聖制先依非莫管法心頭整行真籙地名姓死自教分定端財金寶於身一一不須受領公精瑩花開闡甲潔嚴修省下靈符來有則劍惺中惺辰月日頭頂戴象轉遷仙逕遊處天然歡樂遇遭永永卜筭子黃庭經上得子知公瑩在鄽中騁意猿心不肯收論榮華命齒存真性處清中静向虚无境内尋步蓬萊景前後各帶唱馬一聲筭詞中話上甘津灑養靈煙火養蓮意馬爰俱齊捨内丹無價在山邊掛有屯蒙玉線縫野馬月同安下蘇幕遮坑休顯貌脉嬰兒餧飼長令飽定真元誠俊俏似清風明月玄中妙如麑若豹勺歸期見地誰堪𠰉吐桃花香杳裊内珍珠全得三光照又焦姑求聽聞闡户滅蟲亡鑪竈堪安固粹常純空外覷徹清清寂静無思慮頻忘按住結金丹透入明堂所斧長施鋼劍捀薦真元直趁蓬萊路又二首李法師求人談焰助與泉源交結相同怙木真元牢鎖住掌扶持精氣長堅固中甜上素小嬰兒姹女頻看覷外空邊誠雅趣入祥雲便得神仙做静青黄燭滅煙消白黑紅光旭轉靈丹令沐浴口長生五彩從前簇宗評籙法籙寫金書拯救灾回福及歸依功行足現金丹衮出崑山玉武陵春憶道友業雲涯别有景曲武陵春日清閑没苦辛載得全真是人非俱不管爵肯相親史哥時説一新斧斷迷津日醍醐長灌頂丙反相親有瓊漿與玉津火養精神地醒來寅地醉九按三巡子於金得味衠賞武陵春又京兆趙公勸酒不飲處林泉别有酒卯按篇章二層樓飲玉漿裏火生光兀陶陶頻醉醒夜最堪嘗味來迴轉轉昌出趁蓬莊恣逍遥氣全神神燕坐來與四方聚課説靈根坤對過乎恁麽么妙自無人我戟鋒交平相賀中寶結成一顆是惺惺清没和津負荷須用這箇那箇又承社先生傳語識攢上身憔悴難解怎生遠體元固壯還養氣精麥髓骰潤任緣歡喜誦經書捐名利圭法且休整理鎚金鎖窠緊閉關要洗須認分中閑貴漁家傲詠鐵𤮴先生出外常携之住靈臺清浄觀公四假須温暖日便教携𤮴窑畔和米麵瓊漿按竈爲鑪頻鍊煅燒鉛汞長煎𤓎動饑腸白氣滿中看前一點真堪翫又付京兆杜先生陜高名身姓杜金間隔從來做壽年方七十五能住人百歲超塵慮淨歸清明又著常認得梨花數行已知藏洞府仙簿功元入蓬萊路又二首李公求聖老子元姓李今正是遺風起向他方求出離明位從坎暗清凉地便施仁兼富義還略叙閑中意内無心真活計分美都水火須交濟德修真年七十從鶴髮童顔出上靈泉流得急如密尸去盡腸充實道穿虚同入室令鉛汞成丹粒便逍遥尤静謐休詣人常與神仙集河傳令贈京兆趙公心合眼瑩耳聰意静鼻通舌辯説山頭一派清流落澗中烹焰兒緊不慢西金解東方版片便令虎龍同打盼得明珠諸般不教興販春來金生花復綻又贈京兆席句押衫敗易處俗情正好知白守黑院脱離好把明珠憐惜年時因緣怎生積心約己爲規則圭一粒細思非難覓性識真便是神仙端的明公專上都押席踏莎行道脩真人會歎中説得終無斷刀磨出慧鋒開頭自有仙家讚動光明常圓滿清泉瑩堪教看前只是這些兒心認破山頭翫説脩持文詞雅生玉璧光輝射中交焕汞和鉛傳甲木唯惺灑火翁婆男不寫公别指清凉話根甘液是真因都得此丹無價守丹田分恁麽公認正真無墮包四象立虚名言千日成功課作良緣絲纏鎖花開處瓊英妥人返得丈夫身身風了千千箇又别道友遊白鹿觀要吹燈中有作離暫别休疑却遊白鹿觀頭看前便是成行脚要歸來宵爲約絲不斷真嬉謔誠語村决重懽間緊把猿兒縛醉蓬萊時間有吏拱手前來謹傳台旨晩難參俟辰先起至庭堦争通報上人心喜出尊談推學道須留妙理液瓊漿生三寶脉光門華麗美抵神清俾氣無睡下知州圭休禀自然仙瑞現靈芝遊寶洞蓬萊一醉又詠雪然間雲霧密布長天徧空呈瑞屑飄飄舞風前輕墜面凝酥山頭鋪粉又爽兼鮮媚姹嬰兒相將携手同來遊覷裏全真實中迎寶滿插瓊花榮貴脉和明更三光分鋭地生輝震方通耀放爛銀霞起見師呼仙童邀我蓬萊一醉重陽全真集卷之六
