front:
  text: 重刊道藏輯要終南山重陽子王喆撰
  hash: sha256:277aa1de37d9bc8380791bf0805b87404c56e722328e9d0ddf14f59e6d1ea432
  markers:
  - {type: head, offset: 6, content: '重陽全眞集¶¶¶¶¶¶<md:KR5e0055_HFL_005-001a>', id: KR5e0055_CK-KZ-jye_005-h1, level: 1}
body:
  text: 要知端的默默細想須憑因果至今喜悅投歸玄妙便把門兒鎖惺惺了了眞堪可有自然香火靜中寂閴分明一箇師父來看我美醪奇饌信任恣飲豐餐最好醉經飽德唯歌自舞喜樂論道頻頻拈弄靈芝草使異香來到雲霞覆燾鶴鸞前引卻赴蓬萊島自問王三你因緣害風心下何處怡顏獨哂爲死生生死最分明據轉令神性悟更慵羨人誇五袴愈覺清凉地皮毛無用那更憶絲絮渾身要顯之時這巾衫青白總是麻布葫蘆貯藥又腋袋經文拯救人苦竹擕常杖柱侍自在逍遙鍾吕道余歸去路煙霞侣驀然撞著阮郞公無何兩目紅盈盈翳瞙礙非通如何見寶瞳眞妙藥便修崇良醫顯行功金篦一刮直緣空三光本秀同又詠紙衣蔡倫助造阮郎歸於身顯紙衣新鮮潔淨世間稀隔塵勞是非瓊表瑩玉光輝霜風力轉微寒威戰退達天機白雲自在飛問公爲善這大道無言如何迴轉猛捨浮華搜尋玄妙閑裏做成修鍊認取起初眞性捉住根源方便本來面看怎生模樣須令呈現親見堪相戀請向絳綃宫裏開瓊宴會上明明霞輝萬道射透玉絲瑤霰一粒寶珠晶瑩衮出光同飛電徹中央大羅天歸去永除遷變天地初分何處寄父母無生名甚字須將這箇要分明推窮此理甯論是細細傳不二一能仍究從前自往來頻不知迷迷甚日得言賜忽爾眞靈前面至認得元形歡喜示惺惺覷著甚端嚴輝輝返照通容易見時唯密祕妙玄微雅中深遽出圓光五般顏彩復本總祥瑞凡軀四假便做長年終不藉水葬魚收教你人咱業骨骰這迴去也一顆明珠無有價正是眞修穩駕逍遙得岸舟又自詠小名十八讀到孝經章句匝爲慶清朝愛向樽前舞六么呼盧總會六隻骰兒三沒賽傻得唯新刮鼓叢中第一人七年風害悟徹心經無罣礙信任西東南北休分上下同龍華三會默識逍遥觀自在要見眞空元始虛无是祖宗時當五九道用謫仙三盞酒綵仗風流爲示農耕擊土牛東君德厚放盡山梅并岸柳得得眞修一顆明珠出玉樓青山緑水自與今朝長是醉緑水青山得道之人本要閑清風明月占得逍遙無可說明月清風共是三人我便同心低大小細細搜尋玄裏妙大小心低酉上爲東卯作西心高火出走了三田餳與蜜火出心高轉轂輪迴又一遭神清氣爽樂處清閑堪一唱氣爽神清鼓出從來自己聲清神爽氣長就黃芽緣溉濟爽氣清神認得前程這箇眞又贈王家飲店凉淘要結妙手輕團如握雪要結凉淘瓊蘂紛紛入寶槽挨刀細切椀內銀筋挑玉屑細切挨刀又分隨余採碧桃又化破帛長居海畔非帛衣身應不暖海畔長居温燠凡軀性自如於公願管轉化多人爲首讚願管公於養就仙胎得展舒氣色做交加四序無差上凝下出兩相磨暖律欺寒寒逼暖易位難趖恰似這浮華人做生涯得時温燠失來邪貧富熱寒應不定浪裏淘沙和氣欲超昇寒色沈凝清涼內爽亦能騰卻被外炎相伏定春冷秋蒸陰照復陽登陽喜陰增人當衰處轉誇能天欲明而仍暫暗禍福交承又歎虛飄飄石火不相饒電裏光燒百年恰似水中泡一滅一生何太速風燭時燒公等在浮囂悟取虛韶福油好把慧燈挑光焰長生明又朗返照芝苖人要悟黃芽忽戀榮華俗家出了做仙家物物拈來都打破藉甚嬰娃蓬島現光華翠霧紅霞長春園裏看靈葩覆燾清光仍自許得得休誇玉堂三老唯識王三操復許辨三台更能潤三田倚靠自然三耀攢聚氣精神運三車依三教永沒沈三道須通三寶方見三清好眞性照三峰陡免了三焦做造休論三世諸佛現前來得三乘遊三昧瑩瑩歸三島修行學道切莫憑嬰姹只是這些兒把塵俗般般不惹自然蕭索寂寞與他依餐殘飯著麤衣飽暖休相捨常從坦蕩守養身軀假閑裏得眞閑覺清涼惺惺灑灑暗中功行直待兩盈盈靈明顯做逍遙師父看來也水中漚起來往相隨走旋旋被風吹便生滅暫無還有忽亡忽聚遄速沒人知如浮世不堅牢名利難長久諸公早悟休要迷花酒養聚氣和神更認取三光靈秀朝昏調攝保護結金丹添眞瑩放明光永得逍遙壽又贈劉哥會剃頭面公能力鑷將彼姿顏接刮削與提撏甚停當心洽意愜如描似畫眉秀鬢鬚齊添嫩貌減衰容又更增言捷內靈和協無質無腮頰妙手有何述敢把此分明拈捻若還會得慧劍便磨礱呈白刃顯青鋼剃出圓成曄這箇修行理最深水裏淘金見清淨處細搜尋唯風月是知音綿綿永永無令歇如撈得稱嘉吟一從携去上高岑方能顯道人心好池亭華麗於中瑩善修外景裝成內景這兩事誰能省謹按黃庭緝整表裏通賢聖水心炎炎火焰猛勁溉鍊出眞清靜撲入塵凡世俗這思牢更兼愛獄被玉杻金枷緊束受無窮不足百嵗光陰迅速更朝磨夜磨催促早離了家緣孤宿結神仙眷屬無事閑行郊野過見棺函板破裏頭白白一骷髏獨瀟灑愁愁爲甚因緣當路臥往來人誹謗在生昧昧了眞修這迴卻休休萬萬人中這箇人忽然自悟說良因恰似白蓮花一朵尖新泥沙脫了出迷津邀住清明開嫩臉朗竅明月作毗鄰住向空中騰馥郁靈眞此回占得四時春空裏追聲枉了賢水中捉月事同然隔靴抓癢越孜煎紐石作弦何日撫鑽木待火幾時然恰如撅地覓尋天耕熟晶陽一段田九還七返五光全清清淨淨顯新鮮物外閑人雲外客虛中眞性洞中仙晴空來往步金蓮浮世都憐假合身勸人認取裏頭人本來面目好相親返照迴光知去處逍遙自在樂天眞銳然穎脫出囂塵凌晨靜至樂倍倚欄隈覩奇材正是蟾宫餘影世間來遂得睛空甘露力潤根荄發修條偉又瑰能綻粉苞加紅艷按周天四序開蘂撒黃金騰馥郁道眼堪猜豈許姿陸地混塵埃呼取好風同引去上瑤臺復靈根月裏栽社結金蓮都不曉金盤獻七珠明了金陵河裏知多少要現金光須得金匙攪牽過般密妙金風內好香籠罩金枝玉葉同成俏喚出金翁便做金雞叫又警劉公識得希夷方見妙自然是無煩無惱妻男孫女長繚繞愛獄恩山把身軀緊縛抓若要玲瓏於已俏把慧刀快磨頻挑萬斤鐵索都碎了奉報劉公省悟我金雞叫百日鎖庵門擒顛縛傻閑閑澄中靜養眞假箇人歎問直恁如斯瀟灑我咱知得也誠清雅别有一般分明好畫頻頻親擎出暫懸掛那滿要看萬斛珍珠酬價恁時傳說下些兒話長春景致等長年不夜鄉中永不眠自在從容除我想逍遙來往有誰權唯知物外渾無物獨看天中别有天五彩霞光長作伴金花圍繞大羅天修行莫鍊外容紅只要當中起赤心從此能生木上火自然養就水中金瑤芳寶樹同相守玉葉瓊枝共厮侵休去他方尋伴侣箇中眞箇是知音修行孰是鍊金丹鍊就方知兩事全七返不容開四戸九還應是轉三田氣神交結爲珍寶靈性分明作大仙今日卻歸元本路自然清淨永恬然昨朝酒醉被人縛肘橋兒上撲到一場漏逗任呌沒人扶妻兒總不救猛省也我咱自呪兒也空垂柳女空花秀我家妻假作一枚花狗我謹切隄防恐怕著一口這王三難爲閑走奉報英賢早些出路卜靈景清涼恬淡好住開闡長生那門戸便下手修持眞功眞行眞性昭著姹女騎龍嬰兒跨虎把珠玉瓊瑤顛倒換取正是逍遙自在處結一粒明明金丹金鏡金耀攢聚這一葫蘆兒有神靈會會做惺惺占得逍遙眞自在頭邊口裏長是誦仙經把善因緣卻腹中盛淨淨轉清清玉杖挑將何處去緊隨師父雲水是前程深憎憎愈甚深愛愛尤多兩般都在意看如何他歡如自喜他病似身痾心中成一體各消磨日放銀霞甘雨滴成珠露召清風氣神同助便致令相守鎮相隨更寶種三田九轉靈丹聚碧虛前徧生玉芝金樹綻瑤花滿空無數爛熳開瓊蘂吐馨香正馥郁當中一點光明住自在逍遙清靜恣閑行走拄靈杖慢垂寬袖任彩霞繚繞緊相隨更遠遠香風翠霧同來誘忽昂頭驀觀瑩景添秀見青衣半空招手便喚余休更别追尋指白雲深處這裏神仙有性亂因醪誤精枯緣色妬眼神傷敗被財役住鼻濁如何只爲氣使馨清去浮世人難悟殢四事相牽淪落苦處達士怡然殊不顧上淨眞心於下元陽堅固左養取青龍右邊白虎咆哮做都總來攢聚便成結金丹大羅歸去氣財色酒相調引迷惑人爭忍因斯染患請郞中鬼使言你且儘不須把脈休頻診死病今番準這迴須去沒推辭復勾追交帖緊進來陰府心寒懔對判官詳審高呼鬼使急挐拏不凌遲更待甚鑊湯浴過鐵牀寢銅汁頻頻飲哀聲禱吿且饒些後番兒不敢恁論修行鍛鍊只元是這些兒也勿取翁婆姹女嬰子相隨休言木龍金虎更何須黑赤坎和離奉報諸公入道莫令形苦神疲堪宜正好搜尋時坦蕩准希夷放落魄清閑任雲任水眞靜眞慈靈然養成內寶聚玄機密妙不難知開闡當中一點瑩然明照無爲德夫知縣坐上將余便索河傳令堂下落花你咱分明親見稍知空這攀緣都不戀爭如修取來生善早悟光陰急急同飛箭足愛前親好心長行方便若回頭隨我訪神仙面害風飲水知多少因此通玄妙白麻衲襖布青巾好模好樣眞箇好精神不須鏡子前來照事事心頭了夢中識破夢中身便是逍遙達彼岸頭人又戰公索修行安爐燒出清凉景捉住風飈影輕中盈滿得逍遥自然心月空外顯彰照當初元約惺尤省天詔應邀請仙音一派瑩聲招此時還許返本上丹霄若要修行須搜子細把金關玉門牢閉上下沖和位交溉濟得來後惺惺又同猜談衮入虛空卻投根蔕毫光在爛銀霞際玉色新鮮眞靈瑩膩分明徹淨清閴然細細擺脫濁醪憑傳清水這滋味香甜眞美過得重樓全無滓穢五門開澆淋就中忒銳七寶滋榮三田溉濟十分用刀圭和祕結作眞晶明明殊麗山峯上風月共邀出世每日行持都不是今朝頓覺舒寬和交媾聚成團嬰兒投姹女虎繞與龍蟠四象同房搓玉線一穿透過金丹自然光豔出泥丸有言言不盡無說說非難又大葫蘆先生出常背此貯酒也每向街頭來往走誰人識此葫蘆長盛美酒豈須沽時時眞暢飲日日不曾無自是於身唯了事相隨肯暫離余杖頭挑起趁江湖一船風月好千古水雲舒終南山頂重陽子眞自在最逍遙清風明月長爲伴響靈呶空外愈韻偏饒蓬萊穩路頻頻往只能訪古王喬丹霞翠霧常攢簇弄輕飈繫雲腰上青霄做修持須搜索眞清眞靜眞心獲這邊青那邊白一頭烏色上面殷紅赫共同居瑠璃宅瓊苞瓊蘂瓊花折玉童歌金童拍皇天選中山正是仙客這曲破先入破迎仙客處休言破勘得破識得破看看把我肚皮都鼈破會做麽是恁麽奈何子午貪眠麽說甚麽道甚麽自家暗裏獨自行持麽這害風心已破咄了是非常持課也無災亦無禍不求不覓不肯做墨大大仙唱眞人和全眞堂裏無煙火無憂子共三箇
