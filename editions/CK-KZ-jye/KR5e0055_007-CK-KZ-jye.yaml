seq: 7
front:
  text: 中迎寶滿插瓊花榮貴脈和明更三光分銳地生輝震方通耀放爛銀霞起見師呼仙童邀我蓬萊一醉
  hash: sha256:3e7db82898073581c5fe7a87ca8d16737e269aa207da3fdd2f28cfbdf2ec207d
body:
  text: 庵中住坐塵勞越大貪米麵看待經過赶杖按刀磁碗五瓦盆箇匙筯杓甑沒堆垛掃田刷釜點燈遏火入門關出門安鎖本要清閑被許多日常殃我難爲駕五色雲朶苦苦勸愚人被財色投損精神利韁名鎖休貪戀韶華迅速如流箭不可因循早早出迷津樂清閑養就天眞性圓丹結方知道蓬萊異景元來此處别有長春又贈馬鈺扶風宜甫聽余教旨你從前入道未是終有洪禧舊交朋陸山復至一一須聽他玄理山頭休去此中居止兼乞覓庵糧便利直待盈盈恁時節同將師禮住十洲大家歡喜如論性命須搜夕晝光明照有甚肥瘦日月西遊當中斡樞機北斗天花綻異香無漏空空皆出虛虛盡透清涼處逍遙交媾自在躋眞輕飆外任飄精秀聚雲朋更兼霞友又茶肆茶無絕品至眞茶無絕品至眞爲上相邀命貴賓來往盞熱瓶煎水沸時雲翻雪浪輕輕吸氣清神爽盧仝七椀喫來豁暢知滋味趙州和尚解佩新詞王害風新成同唱月明中四人分朗又愛看柳詞遂成平生顛傻心猿輕忽樂章集看無休歇逸性攄靈返認過修行超越仙格調自然開發四旬七上慧光崇兀詞中味與道相謁一句分明便悟徹耆卿言曰楊柳岸曉風殘月此藥神功别有懽專醫性命完全名喚紫金丹服之一粒永保康安寶結三田搬運過明珠透出泥丸五彩九霞光共至並攢捧入仙壇又風此藥神功别有華專醫徧體頑麻下事是三家不拘温酒選甚鹽茶服了便令筋骨換亦教結就丹砂頓覺神清氣爽最嘉最嘉步步雲霞又眼此藥神功别有名專醫兩目多情一點變澄清自然仰面認得前程更用金篦輕掠刮便教換了塵睛觀俗緣空朗照至精至精三輝騰明又嗽此藥神功别有情專醫肺裏謳吟治正水中金教公免了分外聲音傷重寒風并熱冷五般無復重侵節色減財攝養古今古今性命來尋又食此藥神功别有方專醫五臟膏肓一服下隨湯卽時傳透便得安康更使眞玄推妙訣諸公子細消詳養氣全神保固壽長壽長永處清凉妙覺證慈悲便入菩提路日日常開方便門慧照生靈炷坐雪釋迦尊面壁達摩悟觀此在緣行果成兜率天堂住信任水雲遊欣放靈猿傻要去隨霞恣害風乘良馬穩坐香羅帕南北與東西選甚高和下處處來迴得自如呈弓馬會把明珠射一疋好驊騮精彩渾如畫卻被銀鞍縛了身著絆馬怎得逍遙也不若騁顛狂掣斷無挂擺尾搖頭廐櫪違做野馬自在遊冶此箇眞眞也瑩徹靈靈也出入虛無縹緲間騎風馬信任飄颻也占得惺惺也光輝明明也來往晴空碧落中乘雲馬自在逍遙也趕退日中烏捉取月中兔便著晶光覆了身金馬住方是重陽做交位顯眞功換質成眞趣到此還知自在遊玉馬去走入雲霞路有箇害風兒海上尋良价只爲心頭忒緊圖意馬隘惹出渾身疥款款細搜求日月年時賽遂得中央四寶珠祿馬快走入關西界你待堅心走我待堅心守百日扃門化出來方是余開口開取四時花綻取三春柳認取元初這箇人共飲長生酒卜筭詞中筭卦象分爻彖海島專尋知友來堪把扶風喚莫恠頻磨難只要分明燦決定堅心沒惱愁永結長生伴又雪中作誰識這風狂誰識斯三嚞恰遇炎蒸得清涼正寒也成温熱因仰至人言遂獲眞仙訣九九嚴凝花正開三伏中卻下雪又歎世迷堪歎世間人誰肯望天覷北斗南辰日夜移飛走烏和兔恁地被煎催尚自生貪妬忽日酆都勾你來著甚詞因訴脩鍊不須忙自有人來遇已與白雲結伴儔常作詞和賦靜裏轉恬然歡喜迴光覷一箇青童立面前捧出長生簿跳出凡籠尋性命人心常許依清靜便是修行眞捷徑親禪定虛中轉轉觀空迥認得祖宗醒復醒紅紅赫赫如金定漸漸圓明光又瑩通賢聖無生路上長端正又兄去後贈姪元弼元佐元弼前來并兄佐尊親遞儹還知麽昨日笑兄心轉破休摧挫後番決定安排我這箇傳來唯這箇輪迴生死如何趓棄墓趖墳離枷鎖除災禍無生路上成因果誰識王三能買賣道心堅處難爲退每把三光頻頂戴頻頂戴擘開世網居塵外害得風來風得㬠今朝錢覓人休怪占得逍遙眞自在眞自在携雲卻赴蓬萊會又贈道友這箇王風重拜見珍珠水飯誠堪羨盈腹充腸白氣顯白氣顯今朝專問梨花片有說之時開一徧無言對後馨香善滿樹高高眞玉現眞玉現月明正照清涼院又贈甯生夫喚三郞妻九姐兩椽合得一間舍骨作檣梁皮做瓦休誇詫父娘成就伊居也兒願室家女願嫁舅姑修葺何時罷日日功錢難答謝聽余話長行孝順酬斯價又京兆道友得得中間尋得得王三默訣惟王六若要清靜如白玉獨自宿余自須要除情欲這箇靈童明似燭惺惺能唱無生曲日住公家公不識休尋覓心澄便是眞消息又崑崙山石門庵入得石門山上住弟兄手腳無安措一日三時長厮覷厨裏去搬柴運水投鍋釜若勸同流疾作做心頭一點休教誤我待分明說一句從開悟天機不敢輕彰露反會做他出舍郞便風狂成功行到蓬莊奉報那人如惺悟好商量五更裏細消詳一更哩囉出舍郞離家鄉前程路穩排行便把黑飈先捉定入皮囊牢封繫任飄颺二更哩囉出舍郎變銀霜湯燒火火燒湯夫婦二人齊下拜住丹房同眠宿臥牙牀三更哩囉出舍郞最相當神丹就養兒娘一對陰陽眞箇好坐車厢金牛子載搬忙四更哩囉出舍郞得清凉重樓上飲瓊漿任舞任歌醒復醉愈堪嘗眞滋味萬般香五更哩囉出舍郞沒隄防無遮礙過明堂一顆明珠顛倒衮瑞中祥崑崙上放霞光認得五般出舍郎黑白彰當中赤間青黃哩囉囉㖫哩囉哩妙玄良玲瓏了便玎璫兩人鬥勝俱誇會路路相違子細挨依劫盡方知解了圍愚迷不曉雙關意各自藏機孰是孰非卻被傍觀冷笑微又述懷鄽中有箇修行子火院難離只被推辭恁不回頭候幾時今朝不保來朝事大限誰知可㬠愚癡直待荒郊咬齒兒昨宵獨臥冰淩道三耀常觀自在心安愈覺清涼不覺寒尾閭過來夾脊上轆轆長搬透入泥丸返老長生别有歡曹溪一路人難悟怎捨妍妻難受孤悽獨自眠時越越迷分明有箇長生路孰是能躋說甚東西誰肯抽身出汙泥凡人若會通三耀便結良緣搜見眞玄方信虛空出大仙金丹一粒無爲漏得恁精妍明瑩光圓萬道霞光簇上天甯海人人省悟此别何時再遇唯願重金蓮好把良因作做歸路歸路滿目白雲翠霧又贈縣令日日此中開宴食肉諸公總善唯有害風王莫怪頻來見面知縣知縣正好與人方便又蒙友惠詞明月古今長有怎奈華宗海口黑窟裏頭居黯暗不分夜晝吾友吾友問你如何下手夢悟青霄月正高射蟠桃一枝白筆得逢遭更兼刀應手詩詞隨寫染運風騷玉牋上面起雲濤任陶陶一息來時袞氣毬騁風流不來一息破胞抽這回休若要依前常建販復從頭胞兒裏面氣重收再儸僂誰識天邊一井金紫光侵朝朝日日眼前臨沒人尋惟我靜中知去處自堪任盡斤盡兩入珠林出高岑猿騎馬呈顛傻難擒難捉怎生捨哩囉㖫哩囉㖫慧刀開齊下殺教君認得根源也哩囉㖫哩囉㖫水兼火坎和離兩般消息怎生知哩囉㖫哩囉㖫休燒鍊莫修持元來只是這些兒哩囉㖫哩囉㖫搗練子害風哥一身躍出死生波哩囉㖫哩囉㖫便是逍遙眞自在沒人拘管信吟哦哩囉㖫哩囉㖫用刀圭剖昏迷合和一處怎生携哩囉㖫哩囉㖫人頭落現虹霓白蓮花朵出青泥哩囉㖫哩囉㖫名利海是非河王風出了上高坡哩囉㖫哩囉㖫纔候十年功行滿白雲深處笑呵呵哩囉㖫哩囉㖫三丹寶難分剖昏昏默默怎生保哩囉㖫哩囉㖫在虛空長懷抱緋衫裹子新烏帽哩囉㖫哩囉㖫莫騁兒群休誇女隊與公便是爲身害脂膏刮削苦他人只還兒女從前債悅目亭堂哀心念愛直饒鐵打堅牢㬠多多罪業自家躭一朝合眼如何戴又别家眷妻女休嗟兒孫莫怨我咱别有雲朋願脫離枷鎖自心知清涼境界唯余見步步雲深灣灣水淺香風隨處噴頭面崑崙山上樂逍遙煙霞洞裏成修鍊又自詠人被錢迷錢由人使一來一去何時已頑銅尚自有消磨凡軀著甚逃生死聞早回頭疾搜妙旨細推休道無師指腹中兩路顯然開心頭一點分明是汞裏泉清鉛中火赫倒顛澆溉傳甘澤虎聲震動甲方青龍吟喚出庚方白認正田原分門阡陌金桃親種親收摘玉童掌內任擎來瓊筵會上堪分擘大道無名害風有作踏莎行裏成歡樂因緣腳腳修鍊成蓮花步步相隨著透出清泉上衝碧落成雯結蓋須磅礴外馨接引好輝光內明照耀眞丹藥不識慚惶要人津送情生念起般般動心神指引乞爲緣三餐飽後休胡用豈許醫看莫交人重行符呪水良因種哩㖫哩囉囉哩㖫長隨走蓬萊玉洞又奉酬人惠氈襪余留木盔分納微誠用表相酬答百般茶飯任經營千般滋味堪嗚咂恬淡眞人朴純菩薩都緣此物成超達好將鉛汞裏頭收須教盈滿休抛撒又贈友生前歲麻收去年麥覓一麻一麥傳消息左邊金餅一陽生右傍銀器純陰匿偏黨無私倒顛有則心燈朗徹緣挑剔終南街裏不遊行京東路上知端的又詠燒香身是香爐心同香子香煙一性分明是依時焚爇透崑崙緣空香裊呈祥瑞上徹雲霄高分眞異成雯作蓋包玄旨金花院裏得逍遙玉皇几畔常叅侍又贈友人一點靈明兩條坦路怎生下手如何做好教稽首上天堂莫令失腳遊陰府日轉金烏月生玉兔森羅萬象同躔度勸君休要泥長生時時牢把金精固又崑崙山團庵做就圈模且休蓋椽諸公怎曉余方便水符不向此中行因緣已到文登縣各謹持修速歸煅鍊內容顯現親頭面如今款款漸投玄恁時得得頻相見
