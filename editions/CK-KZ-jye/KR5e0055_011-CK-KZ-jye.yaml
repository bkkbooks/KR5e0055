canonical_identifier: bkk:krp/KR5e0055/CK-KZ-jye/v1/juan/11
seq: 11
front:
  text: 眞功也若要眞行者須是修仁藴德濟貧拔苦見人患難常行拯救之心或化誘善人入道修行所行之事先人後己與萬物無私乃眞行也伏願諸公早垂照鑒
  hash: sha256:30638ed2dea2e87de5677c7edee8cd694bda1c734f1f8eddb8358ab584d045e5
body:
  text: 自在隨緣信腳而無思沒筭召清飈邀皓月同爲侣伴步長路成歡樂唇歌舌彈忽經過洞府嘉山堪一翫正逢著祥瑞頻讚異果名花滋味美馨香撒散對良辰雖好景難爲惹絆任水雲前程至天涯海畔便遭遇清淨神舟超彼岸這迴做眞害風漢迷祛惑去正好修行做清靜是根源眞門戶切莫他尋恐遺遺望仙路閑閑更閑處靈根元明轉轉愈爲開悟功圓行滿唯有紅霞聚往昔得遭逢親師父此則專來教長生訣頻頻顧方知今得度便許相隨永永共擕雲步晴空日照逢澄夜月吐銀輝星瑩運三光處五彩騰明做作靜中瞻聽察見眞修眞鍊氣神攢聚便許密遊良逕這盈盈功行於斯已定端正應是細搜細刷現出箇本來元性葉葉皆靈枝枝總秀精瑩永成清浄雲外青童持詔傳言授取天皇宣命謝十洲三島神仙來聘又詠雪祥敷瑞布瓊瑤妥片片風刀裁下密抛虛外徧撒空中頃刻粉鋪簷瓦鎖綴園林粧點往來樵逕眞箇最宜圖畫報豐登珠寶應難比價清雅鮮潔盡成滉瀁更爽氣愈增惺灑萬壑都平千山一色遐邇不分原野恰似予家仙景澄徹瑩瑩蓬萊亭榭現自然光耀長明無夜選子奇瑰依時耨種自然生發靈苗風滋雨潤漸漸引枝條長就方能釤刈池隍漚日變青梢令人羨新鮮淨潔款款起皮臕須教軔作線織成密布一任槌敲待伊家熟軟裁剪縫繚做就仙袍甚穩誰能掛唯我堪消成功行六銖衣換方顯爾功超又吕先生作醮託請涇陽道友平昔開懷今朝闡醮就中别有清歡風朋霞友皆至並擎丹唯許涇陽舊契俱澄淨眼界敷寬專邀請諸公上士總願赴仙壇同攢崇大道不須箋乳何用沉檀把心香爇起眾聖來觀察得功圓行滿還應是齊在雲端修眞事兹宵竝喜一一盡乘鸞又戰公求問逸志清虛放心坦蕩莫令煩冗縈牽修身養性隨分樂因緣便是崇眞奉道甲丹內長爇靈煙通閑趣恬應得味定許處長年如然須了了免除苦苦煅煉流傳便優游自在做作新鮮直待元根漸瑩恁時節功行完全還知否蓬萊路到見且是人仙又贈友人問題院落荒蕪庭樹瀟灑就中墻壁頽疎自云妻喪父子奈何如王喆聞言大哂天分付獨樂清虛公還悟火坑裏面休更覓紅爐縈紆須剪斷攀緣愛念截割如無作風鄰月伴正是吾徒前趂蓬萊穩路超生滅不入三塗眞端的白雲深處别有洞天居又贈姪非樂英材都緣業重奈何學父相陵暗思揣己亘昔竝無能最苦於身學淺生徒擁戰戰兢兢來咨問心中諕得恰似履薄冰寍曾爲模範果然當死偏得人憎又番成羈絆早晚超昇拂袖崇眞向道前程訪霞友雲朋眞消息蓬萊路穩相從去須登根固源澄冥鎖戶清清堅守深洞轉加温暖悉屏嚴凝寒凍别是風流雅致頓知得超昇管中自然開悟長生遇玉花正好拈弄元初本有眞靈明明處這迴搜見鉛汞便令結成一粒金丹堪貢顯現祥光瑞耀更來往隨鸞引鳳十洲三島神仙喜慶迎共羾又按一百八數九曲黃河分九轉洪波大浪清淨九江共同合就俱來歸正九鼎中間顯現九宫闡端流一定玉翻金潑盈盈處倒侵九耀開影九霄翠碧相齊九臯有鶴鳴迎接精瑩九光洞明返照靈暉堪竝九曲神珠跳躍九仙至如然游泳湛殫澄徹成功行九天通聖正好修行得深深幽密玄玄微妙樞機是兹仗此便成關要惺惺了了更做就風流眞俏顏內少元從亘昔圓聚那般輝耀三光起初朗照卻於今認見當本聲調清音洽浹響喨轉動七竅崑崙出去爲一箇青童來召金線釣靈明授取天書紫詔做修持應不在端坐子午雙時鉛汞自然要結只用眞慈捷中玄逕誰會得獨我怡怡密妙放閑閑坦蕩微細推移漸令靈曜吐奇變霞彩光艷還照相隨蓋緣昔堪宜白雲深處元正是地肺明師便許共丹霄直上同處無爲守株林無作用空外獨臥高岑石枕草衣偃仰極目觀臨水桃山杏隨分喫且盗陽陰款款脫塵軀俗狀三疊琴心舞胎仙論淺深自然見不須重恁搜尋已通玄妙得步瓊林玉花叢裏從此便養透眞金瑩靜與清風皓月長做知音閑閑景致眞閑悟清清方可分付元來那箇本有須令堅固便結作一粒金丹五色明霞敷布同相守能相聚迴光射返光顧遭遇圓成決得眞師舉度此則助正鮮素更永永綿綿嚮慕應知道還處亘初存住逐瑩瑩瑞彩祥輝珍寶珞玦璉襯步胎仙舞神仙路金童引玉童諭堪赴瑤臺月照瓊筵雅聚金關叩戶玉鎖扃門閑裏不做脩持杳默昏冥誰會舞弄嬰兒睡則擒猿捉馬醒來後復採瓊芝每依時這功夫百日只許心知自在逍遙做就唯舒展紅霞光彩敷披罩定靈明方見本有眞慈一粒神丹結正三重焰緊緊相隨過瑤池透青霄頂上無爲天然省悟此一遇轉增清涼尤憬定裏鉛汞結就都緣壬逢丙元初面目成瓊頸返照長生安靜速令歸去前程已許久通堅永好景光傳煥炳見空外萬道銀霞齊整漸漸近來相接相迎須臾頃蓬萊路闡神仙境有箇金童邀請謹持玉詔親教害風受領觀塵境盡總把浮名修整此假合形骸皆不悟猶然待巧粧馳騁百嵗韶華能有幾到七十難逃逝景隳裏面眞眞罪業愈重無由祛屏如省當初一點瑩清明炳速認他從來呼甚麽元是圓成光影又喚金丹仍燦燦好做主重令永永願凡世人人箇箇迴頭澆淳休逞向終南成遭遇做風狂便遊厯海上嘉祥閑閑得得任從詞曲作詩章自然神炁共交結認正心香眞清靜唯清湛還清徹處清涼赤青黑白又兼黃五般彩色近來圍罩寶珠光這迴應許碧霄上明耀無方做修行要知捷逕如何置爐安竈便把丹田寶貝萬象森羅總齊祈禱都歸此處向蘂珠宫前盡教開導擁出靈明一顆神珠衮顛倒得得晴空上面玉皇宣詔青童謹捧金誥此則緣功與行兩兩雙全瑞祥敷燾綿綿永永在大羅天中執携芝草了了眞玄頓覺無爲越三島歸也歸也本元歸也兩郡人沒觀瞻也被清風白雲全日常招也王害風此翻去也勸諸公尋玄妙更休思也看假軀不如無也到今方超彼岸我咱知也要重見這迴難也整六十三歲三月良辰十一日賀瑞氣祥雲香煙重鎖此際高穹選降星郎又天花亂妥冰玉形容神仙標格有誰知那謹吿賢兄今爲見在名利榮華石中明火猛出凡籠頓悉除人我自在逍遙全眞眞樂把無尚死趖埵摘蟠桃蓬萊舊路同行則箇金菊初開銀蟾漸顯新蕋皓色爲儔綻清芳空外素魄深秋便謹按中央雅致又應當望夜圓周稱予家賞翫正許邀枝迎照瓊樓堪餐秀色細艷好鋪明臥影兩兩相酬頓省悟靈英玉兔因由馥郁盈盈噴噴嬋娟瑩瑩悠悠遇重陽七八香傳三島光滿十洲一箇靈明作仙子材響徹瑤宮蘂金自開爲忒玲瓏出蓬萊降下來謫在凡間托生俗胎只恐身便酒色氣財混一迴風流此心便灰復悟前眞免輪迴沒甚災看看卻得重上玉臺元初由大道遇理做生涯卜居風月伴捨榮華盈盈白氣旋旋結紅霞五般眞彩艷射透圓成裏頭徧吐黃芽三千同八百數滿更無差路中添雅致放金花枝枝秀麗朶朶聚奇葩杳默昏冥外一撞晴空異香擁上丹砂觀公形貌俊爽偏清秀慷慨又雄豪你肯把清閑拯救只知名利前路做榮華論文章說佳吉衣紫金章綬肯來隨我聞早植休咎切慮逐波流但肯還迷情戀酒稍知玄妙略得悟逍遙明月裏弄清風蓬島同擕手人人不省日日光陰急嶮路是輪迴前途事暗中似漆觀公風貌俊格最青春多清淨少貪求善事休交失虛情嬌態恰似蜂便蜜曉夜採花忙合和成誰人啖汁若還悟此目下便回頭蓬萊路彩雲端有分相隨入一靈眞性二物包囊定三寸主人翁四方遊各來邀請五情六慾七竅總相連八山聳九宫深十地如何證十分修鍊九轉通賢聖八道湧瓊漿七門開洞通清淨六街五彩四象盡歸依三光照二夜從一顆明珠瑩修仙慕道爲甚都擔閣妄想太虛高皆由騁外緣歡樂內中珍寶未曉是無爲只誇强又誇能誇裏還銷鑠非知下手怎會重安腳每謾度饑寒爭似把陰陽做作白純紅赫光艷燦然殊一方圓十方明方現眞丹藥公尋做作認取烏隨兔上下要沖和更左右交加龍虎搬傳大藥須是入紅爐成煅煉變銀霜一朵金花聚清香遠遠透過崑崙去裊裊上青霄結雯光輝輝堪覩玉堂裏面參從大羅仙自怡喜得長春正處逍遙路筆兼紙墨硯子同爲事甲乙緊相隨缺一物難能作使閑來靜坐屈指細尋思要爲書不時思須用清泉水恰如四季春夏秋冬是温熱與涼寒相結就年何擬議元來就上别有妙玄微按眞玄合天機閏月方成歲凝神遐想始固鉛中雪滋長是黃芽使金烏相攀朗月黃婆匹配别是一家風龍吟嘯虎咆哮此箇誰分别人還去慾酸辣飡須節滋味要堪嘗任清虛五神暢悅元陽守定育養得神靈功成就去朝元住世無休歇凡軀四假正好堪論討有限是因緣卻何不修行早早塵勞不染别顯一家風沒牽縈無繫絆於己除煩惱稍能悟曉財色難相撓養就本元神這眞理眞靈倚靠崑崙山上一點處逍遙對紅霞成自在鶴引携芝草嘆嗟浮世被榮華驅策名和利人人鬭作機心起百般姦計嫉妬愈增僥巧重生俱相效皆貪愛何曾停住常若是各衒女誇男孫奉侍更酒迷歌惑望長遂還知七十應難值便百年限來無有推避早早悟前途不如意急回頭便許脫了生死投玄訪妙搜微密察幽祕管取自然神氣雙全分明見元初箇眞眞圓性誠恁似玉貌瓊顏奇又異瑩寶光瑤彩吐祥瑞金丹結就虛空萃處清靜大羅天上仙位凍雲凝住積瓊瑤祥瑞唯同遇輕抛細舞風刀剪旋旋敷布頃刻鋪原野山川并溪渚兼溝隰長橋孤渡皆一覩對此景暮江堪畫處見三兩漁人笑相覷披簑荷笠歌聲響指酒旗招颭投飲歡聚廣鎖綴園林與樵路更能迷迥邈點點鷗鷺鮮勝皓鶴宜奪白鷴素晩霽霧開微顯斜陽銀霞著門迎照渾如仙趣羅玉戶自有箇祝融來吐耀射虛外崑崙列璉璐方當夜靜清霄瑩放一輪明月光彩交互舉世總癡愚貪戀財色無不迷錯一箇丹誠趁輕肥爲作三耀照寍曾畏慎四時長追歡取樂越頻頻做恰似飛蛾見火常投托光中方省悟體爛怎追卻悔恨遲遲已遭逢燒烙能遠害焉今禍患會全身那經灼爍請於身看只被利名榮華縛堪嘆世間迷誤轉轉增隆怎得趖難被他同等一例相讚每每攢頭聚復散總做作百端繚亂這鬼使暗裏常常把你細筭待臨頭看癡漢越騁惺惺伶俐高强欺慢無憚大遇尤罔聖昧神厮翫此則看看業限貫怎生趓避也難逃竄見追帖箇箇添煩惱共𢬵儘陰司斷嘆平生景光奔走尤遄利名牽休空勞攘不須頻苦孜煎這榮耀趂時顯現似風燭終勿牢堅走玉常催飛金每促更兼愁惱緊纏綿覩浮世推來暫處四序換流年齊捐捨爭如善根結取良緣慧刀開劈迴猛烈智鋒舉刺轉英賢自家聲能調雅趣舊奇韻堪應斯絃認取元初搜尋本有幽微密妙總投玄得歸一長春景致還也任如然無來去蓬萊島中作箇神仙大仙師父常來救苦且作凡間人說些宗祖地下一聲雷震動山頭雨怎知道鐵牛耕土坎離并子午擒龍捉虎這般事無一箇與心爲主越鬬巧機關大限數來取看你得那箇門戶人須猛省人須猛悟獨不省獨不悟巧機越做有日閻王知差著箇特俏措嶮巇底赶我來去行到半路淚珠無數告鬼使這裏且暫停住小鬼喝一聲莫要埋冤苦對判官你儘分訴主人居屋絳宫常住日行持常關鎖閉門封戶裏面種金錢箇箇堪分付好緣顧卽時覺悟行到清涼處並無思慮妙中妙機密目通玄語來時復還來去後復還去再休迴入蓬萊路又重九日萬紅憔悴秋光獨銳别有番顏色按中央殊麗時分惜黃花九日同天意冒濃霜放開金蘂籬畔淵明喜白衣來至忽然間走出箇重陽小子應手攬清香認得頭間瑞插三枝蓬萊一醉這重陽子今來生此是非去煩惱退逍遙自遂擺脫一爐香何用三叩齒又不用那道家活計暗笑俏措的暗笑伶俐暗笑他將相并工商農士唯我靜中清唯我閑中肆要到處跨雲便至漸漸東方漸沖和鮮明秀靈相接漸次轉遷南陸陽晶熾赫暑炎光曄漸令西境金華聚漸輪在北相凝浹漸成悟漸見四時怎生拈捻漸漸須臾歲業漸别作仙家景堪招攝漸把氣神鍊變眞丹就上愈加調燮漸知行入前程路漸分朗足開雲躡漸無做漸高道成德獵兹晨瑞氣陽和早泥牛示古農曹風流綵杖輕輕考誰似我重耕道賞宴懷中珍和寶滋味廣餐芝草便許結金丹復歸去蓬萊島覩塵世人人盡總鬥芳容衒珠珍金玉綾羅錦繡情悰兒女妻孥共團聚管弦歌舞趁時從沒休歇昨夜今宵來晩重重顒顒日常做怎得迴頭省悟深灑直待陰公取來恁則方忡千狀悲顏釘心劍百端愁思歛眉峰見追帖兹番悔恨難已藏蹤禀性清閑歸寂寂占得風程雲水長遊厯搜出明珠頻洗滌更將霞彩重開剔任坐任行還在覿靜裏親知有箇相尋覓每每遭逢金露滴蓬萊穩路投端的孝順先知金母更無能背爹尋父朝朝供養排簋簠便認得自家宗祖呼兒女騎龍虎正好與神爲主惺惺奉侍歸紫府也管錄姓名仙簿天然米精麥髓誰得悟予知奧旨保養沖和增添靈慧更兼神水三光秀氣通傳應助正眞陽本始結作金丹明明歸去亘初家裏金郎察察玉娘揠揠堪同壽方年二八住在何方一居水一居山北入離門坎戶皆劼時時相拉頻頻搜刮九條街坊坊俱達尋得靈珠取瓊漿神水澆抹放光明萬道旋斡害風王三前時割稅爲酒愛飲中沉醉往往來來眼前事全然不記與仁人當街打睡腋袋頭巾盡皆遺棄有經文裏面訣祕深謝明公發善心與予拈起解珮令報賢好意能置田庄買得浮桑蓬萊路做清涼漸漸成作用崑崙上别有嘉祥每島各開三戶殊名號九般房漸見初閴寂生祖次通長聚見元陽流轉過明堂好看炎炎景這毗鄰現出毫光處此安居已定住瀛洲是仙鄉春景精研花草新鮮夏日赫綻紅蓮忽然秋早至見山亭柳上鳴蟬飈地朔風來到飄白雪徧山川百歲光陰如撚指一靈眞性好搜玄得後總周全養就神和氣結成丹燦燦團圓五道耀明齊聚簇擁上大羅天性本慈悲要覓玄機妙理欲尋思一身無可脫被家緣火院驅馳愛欲猛捐樣下怎奈向那妻兒此箇丹成分兩處若教行坐總相隨但恐不由伊雙全全舉得人人盡學取無爲清靜到頭各就只龐居士同知不會修行空養肚腎肺心肝脾祖五團臭肉怎爲主先把黃婆咄去赶退青龍兼白虎不用嬰兒姹女諸公要覓長生路别有一般門戶如會修行尋捷路開闡全眞門戶汞知鉛見作宗祖管取性停命住便是陰陽顛倒數今日分明說諭只依四箇字兒做指日得歸仙去眞箇重陽子得箇好因緣因緣待做做做神仙神仙惺惺誠了了了了金丹一粒圓圓圓祥雲送上天上天明師更與白花蓮花蓮瑩最最最新鮮新鮮輝輝清灑灑清香馥郁妙玄玄玄上長生玉帝前
