seq: 12
front:
  text: 縱步閑閑遊翫出郊西見骷髏臥臥臥沙堤問你因緣由恁似爲戀兒孫女與妻致得如今受苦恓眼內生痧口裏更填泥氣氣應難吐吐吐虹蜺雨灑風吹渾可可大抵孩童任蹈躋悔不生前善事稽
  hash: sha256:7cdad58914af279ee7685ee4fa57a6f0eb86f1f08b5d4b07ee4c9046c5346f84
body:
  text: 做修持須搜索眞清眞靜眞心獲這邊青那邊白一頭烏色上面殷紅赫共同居琉璃宅瓊苞瓊蕋瓊花坼玉童歌金童拍皇天選中正是迎仙客這曲破先入破迎仙客處休言破勘得破識得破看看把我肚皮都鱉破會做麽是恁麽奈何子午貪眠麽說甚麽道甚麽自家暗裏獨自行持麽這害風心已破咄了是非常持課也無災亦無禍不求不覓不肯做墨大大仙唱眞人和全眞堂裏無煙火無憂子共三箇頓覺清涼自在逍遙坐白光生青艷至紅輝總好騰玄耀妙黃深奧般般彩色把明珠覆燾晴空外來往仙道封成永號便受玉皇宣誥雲霞裏上眞惟到香山會聚發瓊言闡道同歸去長住三島唯會做惺惺便能誇可可淨清消息見得那正好孤眠臥這子午致使運轉精神寶瓶宮肯教放過隄防取玉戶開時把金關緊鎖把金關緊鎖永不遇淫風也非遭業火六道輪迴總趖趓自在逍遙箇上下盡是白氣沖盈一粒丹結成金顆空中早仙樂來迎感天花徧妥感天花徧妥自家聲唱出誰能測有箇頭青容白正是石娥來應拍身窈窕腰如搦偏柔軟舞婆娑金璧珠都索要皆令盡酬此功格纔聞玉蘂香正是瓊花坼兩段蘚蘚同色便使靈童令採摘相合就堪怜惜呈妙妙出玄玄超碧漢分明顧動新音永作仙客奉勸伊家去西州放散誕做雲遊恁時教你永無憂這愁煩漸漸休款款牽迴六隻牛認水草便風流渾身白徹得眞修上逍遙達岸舟又自述意馬心猿休放劣害風姓王名喆一從心破做顛厥恐怕消些舊業眞性眞靈有何說恰似曉風殘月楊柳崖頭是清徹我咱恣情攀折清閑眞道本無事小神仙謹修增些福免黃泉愚迷都不曉只愛幾文錢一朝大限至告蒼天偶暇追遊無凝礙獨望錦波青岱回頭處忽見荒林外一堆兒骷髏臥綠莎內孤慘誰爲主與排賽空衒雙眸闡土塵塞雨灑風吹日曬星光對轉業增添重重載異鄉殊域甚方客何年代牧童來頻頻打欲零碎前世貪財色從戀愛遭遇迷神引怎生奈劉悅道誠有力平等社識來不識便是道德根源爲清靜利益願公早把良因積向眞道心中尋覓誇則誇秤稈端停且莫令點滴磨著墨木硯瓦窗前竹我看眞箇瀟灑試問點茶人人得行行行者慈悲慈悲不可捨作善緣敲盞何須音啞試問自在逍遙教積善得也觀貌好堪我相空提去提來道違家向能藏薄醋菜鹽蔬干成麵醬奉報張公穩收掌切莫令失手撲在地上百雜碎片片分離恁時節掉樣七十三三十七恁時節思量王吉王吉崖畔險也兀底卻隄防腳失奉勸回頭休要執戴包巾只在來年元日若依前意馬心猿管終壽九十但爲人須仗福莫慢天欺地衣食自足今宵卻有箇王三伴父母獨宿也不往來無被褥和衣睡靜中肯教動觸覺來後愈覺清涼唯言詩曲到明年大豊熟這嶮巇心中全然不燭越越底劫劫波波貪名利逯逯地變黃金由未足因何卻不種來生好福豈知兩兩三三看五五六六把兄嫂好供養便是我見在父母誰人敢向這裏卻有箇王三更朝夕思想哥哥嫂嫂休悒怏休煩惱好把心來滌蕩爇名香三教俱看得善芽增長這王三風得賽便咄了氣財色遊三昧因何卻不斷香醪我神仙也愛獨自行來眞自在要到處掩然悉除百怪多心經記得分明無罣礙無罣礙王喆我從來有些施設道日日勤持搜祕訣地府不願瞥天堂上自然歡悅蓬仙島如歸修做徹王喆害風都不管樂清閑恣情慵懶紙襖麻衣教人說短我咱自知涼暖一炷名香經十卷三千日行成功滿穩駕祥雲獨通霄漢儘你夜行船赶平等平等復過萊州須行救拯害風兒闡化匀均化良歸善肯二儀三耀常爲正察人心恰如㪷秤若不高更沒於低也神仙有應堪嘆犢兒堪嘆牛若還省我語是同流性如燈燭命如油相滋引明熖出山光照破一齋休前程除險路沒深溝這迴與你說根由成功行蓬島永無憂世上人人做有爲榮并並富貴衒能爲錦衣肉飯鬥多爲饒君會一品又奚爲王喆不施爲麻衫兼紙襖自堪爲隨緣糲食日常爲唯長久眞外認無爲一箇麻囊一箇飄我咱三口子過清朝饑來長採玉芝苗克腸腹水向火中燒舞袖拂風飄青鸞前引路躡雲梢蓬萊須訪舊王喬重相約同共上丹霄又述夢夢見街前一隻牛偏能行得穩性温柔繩來牽拽便迴頭高峯上臥月最風流隨我任遨遊調和眞逸樂沒憂愁渾身白徹正堪留超靈岸相從入瀛洲失笑迷陰化不來愚頑心鎖硬怎生開直饒富貴沒殃災天年限終久落輪迴鬼使早相催兒孫難替得有何推恁時悔恨哭聲哀方知道學道是仙材又道友求問養性休教起怒嗔外身須認正裏頭眞日施方便做慈因清涼至只在氣精神財色莫相親自然通大道覺申申金丹結就出迷津登雲路玉洞看長春肉衒花餻酒衒油肥軀潤己那休兒女共嬉遊金銀財寶壘似山邱何不道前程將不去限終鬼使來勾方悟平生總錯點頭點頭悔恨無由苦勸伊家省自煎須知每每居鄽贏取日高眠賣花天氣别有玄玄這箇元來滋味好自然滅火消煙要入無生路上趙仙趙仙只在心田又是春來虛不空今朝鬥撮和風使我得飄蓬前遊雲水大路長通雖是心慵身莫懶但予好藥名芎服了身輕體健積功積功須上穹窿遊厯都京并府郡更兼縣鎮坊村並無術法没談論一般眞箇好六業鐵聲渾莫怪時時清韻響人人喚出家門磨伊心鏡不教昏滿輪明月瑩光射透崑崙正己修行無怠墮推心上應天機內容整肅吐光輝靈眞搜得瑩方可許瞻睎謹謹授持專一守靜中清裏歸依法憑條制不相違九玄并七祖連汝共昇飛掌法遵條常謹守饒人藴德尤先孝心自許合神天長長能後己永永瞻家緣便是修行眞實路正端無黨無偏放開心月照金蓮馨香衝碧漢堪獻大羅仙又說四象性命陰陽如可論心脾腎肺刀圭更兼南北與東西甲庚丁與癸雀武虎龍齊子午沖和連卯酉春冬秋夏相携白青赤黑吐虹蜺坎離并震兌水火木金躋又詠葫蘆一箇葫蘆眞箇好朝朝長是隨予腹中明朗瑩中虛貯瓊漿玉液滋味勝醍醐日日飲來依舊有自然不用錢沽杖頭挑起入雲衢三清前面過參從黍米珠絳帳今朝重到此榴花對景先開坐間誰悟害風來四梧知我意三耀散予災旣得相逢休酩酊洞中别有樽壘纔倒一盞免輪迴自然雲滿目舉步到蓬萊又道友問修行潔己存心歸大善常行惻隱之端慈悲清靜亦頻觀希夷玄奧旨三教共全完别子休妻爲上士悉捐財色眞餐長全五臟得康年功成兼行滿直性入仙壇太一混元眞法籙清心精銳行持先擒自己那蟲尸香煙通上界威力暗施爲救拔亡魂消舊業見存廣得洪禧鬼驚神駭懼勾追行功惟顯著指日彩雲隨吸取西江金浪水朝朝用此盤纏循環流轉復清泉肌膚偏瑩淨壽筭得遷延北斗自然拘姓籍南辰生注長年減財節色是因緣作爲依上帝棄世做神仙又目貽爲甚風狂偏愛酒非干愚意多輕此般道眼最分明頂門三路顯得伴道人行三教幽玄深遠好仍將妙理經營麒麟先悟仲尼觥青羊言尹喜舍利喚眷鶯又題贈道友杜公尋妙訣道本先求認得急持修恩愛斷便迴頭黑煙都去盡出得無愁雲友與霞儔蓬島路喆同遊翁婆成匹配跨虎擒龍結帳作三重夫婦美好相從午前并子後煉就殷紅住在絳房中雲外路到蓬宫昌時須默默清徹名澄總棄總無能軒好景便依登趙州茶味好悟曉如水雲友與霞朋分别得正昇騰每日閑遊西復東隨緣且過住塵中杳杳冥冥今古在蒙蒙害風風裏得飄蓬公且只知浮蟻動我今偏愛滿堂紅照破當年昏暗事空空靈臺一點透穹窿昔日嘉山第一程今朝臣海載清清重泛瑤池眞得得盈盈昻頭堪認自家聲玉浪銀波别景致瓊濤朱溜作高名湧出白蓮花一朶呈呈馨香直入大羅城今與重添惺惺只是那亘初元性急急修持盈盈圓滿子細剔開周正通玄傳令煉煅出自然清靜一顆明珠堪敬就上揩磨精瑩不則本師三眞共至更有虛空賢聖齊來俱慶這仙子此中前定意馬擒來莫容縱長隄備璫滴瑠玎槽頭猢猻相調弄攢蹄舉耳早臨風璫滴瑠玎樁上韁兒緊纏鞚這迴你璫滴瑠玎待馴良牽歸白雲洞逍遙自在更不肯璫滴瑠玎初見青鋼劍尸內曾加點木上安來出一絲乾馬占害後隨風颭得此修行漸日日頻頻撿暗喜歡時只自知天馬瞻與我長生驗又謁友不遇曩者見張公索寫詞中信王喆今朝故故來甚沒箇人相近回首跨清飈隨足雲霞趁卻入全眞復舊堂把一點靈明認天地人生同來相遇應將甚昭彰顯務道門開釋門闡儒門堪步識元初習元本覩元辰元陽自固日月星辰齊旋躔度唯臨蒞虛空照布精關扃氣關達神關超露禀三才立三教得三光三丹寶聚又勸世騁俏多能身呈體段把衣衫頻頻脫換穿茶坊入酒店總誇好漢驀然遇天高這精神早減了一半奉勸風流惺惺早斷保元陽休教紊亂稍迴頭開道眼金蓮長看玉花放異香來吐光明滿空炳煥雲水王三悟悟甘河鎮祖師遇遇元本靈明便惺惺也眞箇詩詞做做丹藥內中頻顧顧逍遙處三光覷覷全得當時害風風眞箇神仙去去上元佳致眞堪看更片片行雲散現出天如青玉案放開心月慧燈明照兩曜交光燦毬裝七寶玲瓏煥把性燭當中按一對金童呈手段瓊杵推轉順風歸去衮入那蓬萊觀亘初獨許能騎坐這駿駟從牽拖直走盤旋雙慶賀三山骨健力筋偏大馬輔佐萬丈紅崖過謝伊駞出深坑禍衒玉轡金纓嚲喊霧嘶風遊水火月華前面四蹄輕鎖馬負荷與我成因果元初一得從初遇便端正昭彰著轉作重陽晨彩煦晴空來往碧霄堪住瓊馬馬府引入長生步靈光不動神光聚便攢簇銀霞護滿插金花頻返顧青衣鸞鶴共同來赴瑤馬駐般在清涼路旣要修持心不曉這火院須先跳猛把家緣都不要元初一點認來眞所做箇惺惺了欲要妻男固處妙且只在紅塵罩節色微財應事俏慈悲廣施作均平也決定分分曉又緣化子弟鎖戶眞成也百朝甚惺灑冰餐非苟且玄妙就中超軃馬眸粘惹恩愛俱齊捨閑遊冶教余同幽雅仙子共成修寫馬明星下昨朝今日與來朝飲水無加只自澆醉後恁鋪金蘚甲醒時復採玉芝苗錦衣公子談三島皂帔佳人舞六么一曲合成玄妙處白雲片片恣飄颻我咱别有赤窮窮物物俱無事事通清裏清來同寂閴閑中閑至住虛空能邀迥照堪親日會捉輕飈便害風此際黑雲何處去瑩然衮出一團紅三才剖判做輝華三教分明吐甲芽三寶煉燒紅熖寶三車搬運紫河車三峯影裏觀眞宅三耀光中是本家三島十洲堪搗藥三清十極聚青霞今朝細細問朱郎因甚常眠黑鬼房得與青龍爲伴侣亦令白虎助清涼便將鉛汞堪成寶好把刀圭更入鋼斫斷烏龜四隻腳爽邀風月上崑崗堪當姹女嫁丁郎認得嬰兒住癸房幸有甲田知出入不無兌地做炎涼鉛刀起處通神妙汞劍開時仗慧鋼殺卻三尸陰鬼盡一團紅熖覆瓊崗白靈根蒂長晴空碧綠枝條裊細風葉禀月華添雅翠花憑日氣蘸殷紅四般顏色雖然異一道馨香分外濃透過丹霄歸甚處便教收在蕋珠宫石中火隱怎生昭水裏金藏要卻遭石火須憑心火取水金決得肺金淘火教煅煉眞鉛汞金要增添快劍刀二件相投成一件大羅天上列仙曹這回捉住四時春奪得温和養本眞跳出世情居異世儘教人道不凡人何須苦苦調精氣不在區區嗽液津瑩處晴空開日月銳然特放九光新東海汪洋西山詳審金鈎釣得歡無恁一頭活樂大鯨魚萬鱗燦爛鋪白錦隨我遨遊水雲信任青山緑水相過甚張公喫酒李公來李公奪了張公飲又干友打斧版斧如求那由選揀良工欲造無錢換今朝專禮我華宗慈悲爲首諸公辨若得堅鋼劈開道眼靈臺熠耀持金簡腰間柯爛決忘歸白雲路上成家產又詠钁鐵钁神靈我心有則隨身應手開端的種成大藥稱伊功栽培善果憑君力銼倒恩山打摧愛獄是非煩惱頻頻斸銳然敲碎碔砆頑便令發出崑崙玉又總詠斧钁堪擎隨緣斫斸鋼全生就令分局一司管刮水中金一司管伐山頭玉竅子方長攀兒圓促頭頭柄柄常相逐劈開金母紫芒攢判通玉祖紅光簇又詠宦途無定名路求高宦途無定一來一去緣心性稍知分守得優游能通止足參賢聖莫使偏頗須存直正花開須是依時令日輪耀處吐光輝月華朗後添清瑩北海鯤鯨人不識金風長是傳消息予把釣車寍費力堪憐憶香鈎擲下離灘側吐出神珠光焰赫化鵬展起垂雲翼日在扶搖無有極能搏陟青霄一舉應端直又詠假俏漢奸點人人常不遜外裝內喜能談論艷色衣裳香遠噴頻整頓重重結裹麤如囤眼去眉來常騁俊前攀後拽誇身分我便去前親去問休風韻遮藏臭腐并堆糞又閑題生死輪迴何太速改顏換面人難識有箇風狂常自足常自足逍遙處處孤眠宿愁煞諸公歡折哭恰如堂下三間屋屋底你咱煩惱黑煩惱黑堂中我且燃燈燭又贈友人名宦爲鹽判室內同公案閑心各一半讚分過如何斷好將雲水伴夫婦山頭看清風明月喚翫結就無涯筭竹冠頂按更竹作水瓶至今常將手盥竹杖竹籃竹笠竹車竹鑽竹林中竹笛鳴聲自喚木鞋襯腳眞熱暖木做盤兒鏡磨明圓滿木筋木匙木杓木盔木椀木陰間木牛耕田三段營軀手段這飢寒未免上街須當唱喚提箇淨清了了惺惺鐵𤮴覓殘餘聲聲叫道攝亂極承貴府人憫歎唯願諸公心懷常照管選甚冷喫將來腹中煎𤓎煉重陽方堪看害風漢害風落魄便飄蓬信任到處並無籬落遊厯水雲管甚身軀零落覓殘餘傍人家閑院落眾皆笑我貧淪落教他骨頭無福長流落看你不知將來何方下落免伊憂恁時節超碧落凡軀莫藉把惺惺了了自然明明構架行住坐臥須要清清閑暇氣神和結成珠堪教化張弓舉箭能親射紅心正中赶退周天卦垜貼中間迸出霞光無價五行違脫陰陽超造化緣重下手并安腳頓得來眞眞沒錯金鑪立起瓊花作燒煉出這般丹藥三田九轉明光爍八脈上四門開卻虛空一點成灼灼無言說自然邀約諸公學道應徒甚細細把玄機苒荏頭邊認取清涼枕當風月瑩然成寢刀圭滋味頻頻飲漸漸放千花似錦馨香如要詳還審惜芳時曲中評品又詠紫燕我觀紫燕泥巢壘便下卵朝朝抱子雛兒喂大辭窠起背父母分飛去離爲人養小還如爾明知得攀緣越熾爭如修取長生理樂清閑好遊雲水又友索說陰陽未分混沌何方有直待定天高地厚乾坤一判三光秀在身中沖和奔走水中火起頻頻鬥又白虎青龍交媾兒嬰女姹休相守王害風别有朋友扶桑祥瑞生芝草便移在蓬萊島金枝玉葉自然好崑崙上變珍寶霞光四面添玄奧明焰裏通顛倒青童捧詔添嘉號無爲處這迴到兀然眞性杳杳默默無微無大一團瑩寶光明圍繞五彩同隨那逍遙自在堪經過有玉童相賀滿空馥郁盈盈裏面來伴神仙坐百載鏡中容仰手爲祥覆手凶生死榮華今在目休逢疾速迴心認祖宗得得妙相從滅盡三尸九箇蟲一氣浩然調養正
