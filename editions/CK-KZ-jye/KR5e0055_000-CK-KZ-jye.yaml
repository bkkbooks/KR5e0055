body:
  text: 全眞之教大矣哉謂眞者至純不雜浩劫常存一元之始祖萬殊之大宗也上古之初人有純德性若嬰兒不牧而自治不化而自理其居于于自適自得莫不康甯享壽與道合其眞也降及後世人性漸殊道亡德喪樸散純離情酒慾殽蠧於中愁霜悲火魔於外性隨情動情逐物移散而不收迷而弗返天眞盡耗流浪死生逐境隨緣萬劫不復可爲長太息也重陽憫化妙行眞人博通三教洞曉百家遇至人於甘河得知友於東海化三州之善士結五社之良緣行化度人利生接物聞其風者咸敬憚之杖屨所臨人如霧集有求教言來者不拒詩章詞曲疏頌雜文得於自然應酬卽辨大率誘人還醇返樸靜息虛凝養亘初之靈物見眞如之妙性識本來之面目使復之於眞常歸之於妙道也或問眞人者曰人生天地間雖曰最靈亦萬物中一物耳孰能逃陰陽之數孰能出造化之機有始必有終有生必有死此自然之常理也不禀異氣仙不可求不契夙緣道不可學豈可苦身約己如繫影捕風鏤冰雕朽爲必不得之事求難成之效哉眞人喟然歎曰長生妙理人具仙林孰不可求有怠而弗成者顯而至多有勤而取驗者隱而甚少世人以多見爲信以不見爲疑遂以仙事茫茫爲不可期也試以物理驗之鑛之鍛鍊可以爲鐵銅之點化可以爲金魚超吕梁而爲龍雉入大水而化蜃冰之易消者也藏之可以度夏草之易衰者也覆之可以越冬人能割愛去貪守雌抱一遊心於恬淡合炁於虛无亦可以高舉遠致躡景登虛逍遙乘禦寇之風往來飛應眞之錫騎鯨而遊滄海跨鳳而上青冥千年化兮如遼東之鶴望日朝兮若葉縣之鳧與安期羨門之流洪崖洞玄之屬同列仙班不爲難矣古今得道輕舉者不可勝數子謂無徵如聾者不聞有絲竹之音瞽者不知有丹青之色彼淺見謏聞烏足以語道哉問者屏息汙顏而退眞人開方便門示慈悲海出人於炎炎火宅提人於浩浩迷津識性命之祖宗和氣神之子母有无會於一致空色泯於兩忘使入是門者如南柯夢覺由是路者似中山之酒醒返我之眞無欠無餘復入於混成歸我之宗不墜不失復同於太始眞一之性湛然圓明變化感通无所而不適也眞人羽化之後門人裒集遺文約千餘篇辭源浩博旨意弘深涵泳眞風包藏妙有實修眞之根柢度人之梯航也京兆道眾聚財發槧雖已印行而東州奉道者多以去版路遙欲購斯文不易得也長生劉公教門標的仙宗羽儀爲一代之師眞作四方之教主謂全眞之風起於西興於東徧於中外其教廣矣大矣乃命曹瑱來靈玉徐守道劉眞一梁通眞翟道清等化緣特詣吾鄉求序於懌以眞人文集分爲九卷載開版印行廣傳四方俾後人得是集者研窮其辭如鑿井見泥去水不遠鑽木見烟知火必近使人人早悟而速成實仁者之用心也噫自古修眞之士或跅足尋師而師不遇或斷臂問法而法不知至于皓首窮年莫知所措虛過一生深可惜也今全眞文集散落人間妙用玄機昭然易見學者宗之大修則大驗小求則小得士之志於道者適遇斯時何其幸也大定戊申清明一日甯海州學正范懌德裕謹序
