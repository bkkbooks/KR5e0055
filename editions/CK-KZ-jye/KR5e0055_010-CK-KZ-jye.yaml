front:
  text: 重刊道藏輯要終南山重陽子王喆撰
  hash: sha256:277aa1de37d9bc8380791bf0805b87404c56e722328e9d0ddf14f59e6d1ea432
  markers:
  - {type: head, offset: 6, content: '重陽全眞集¶<md:KR5e0055_HFL_010-001a>', id: KR5e0055_CK-KZ-jye_010-h1, level: 1}
body:
  text: 害風故故謁華宗三教唯公道話同此際遇逢齊上下中間會聚各西東須知冬至青和白認取春分綠間紅急急三光如可悟忙忙四假盡成空圓明一點皆能有物裏千般總被蒙覺性自然通水湛達心那入百花叢般般打破仍歸妙箇箇還迴便見終飯食充饑機兩妙面前相對玉玲瓏盡知長與道爲鄰搜得玄玄便結親悟理莫忘三教語全眞修取四時春養成元氣常充滿結住靈神沒漏津十九圓光如我願敢邀相伴樂天眞得其眞趣絕搜尋物物般般總不侵碧落湛澄非有意白雲來往本無心盈盈明月增佳致細細清風送好音舉目慵觀潘岳賦怡顏懶撫伯牙琴外除花卉遊人靜內藴芝苗只自臨決要三田歸至寶亦令一性上高岑養成幻體如光瑩舞正胎仙似嘯吟杳默昏冥長作伴寂虛永保水中金捉住心猿治住神自無夢惱內中眞尾閭不動全精氣腎海長添乾水銀內則愈能增覺性外來應是養生身廣行法籙頻施救便是逍遙得岸人無思無慮是眞修養氣全神物物休亘劫容顏須要見元初光彩決重收莫將外景心中藴好把靈丹性上求依此自然超彼岸都緣清淨大神舟修行須藉色身修莫殢凡軀做本求假合四般終是壞眞靈一性要開收聚成無相成無漏結作丹丸作備周五道光明同是伴能超清浄大神舟修行學道並無師只要心中自己知淨處常常生智慧閑居每每起慈悲搬柴運水唯聞做觀相存思各自爲減食忘情爲慷慨任歡取樂是修持救人設藥功尤大戒酒除葷行最宜直待開門觀宿性宿緣堪可便相隨修行事理說叮嚀只要心中靜裏明眼界不生龍自住鼻門無閉虎長停舌根退味心神悅耳內除聲腎水清南北沖和同一體東西交媾滅三彭木金厮仗盤桓處嬰姹相隨自在行結就金丹出頂上五光射道綵雲棚心遊閑散樂浮華放肆開懷是產涯飲酒莫教離孝順賭錢休要壞居家道門好入時時重王法須遵可可奢平等能行方便事也教隨我伴煙霞宰予晝寢不堪看惜取光陰倦睡餐甕牖勤勞非取辱茅堂修進敢求安隔窗映雪心常樂閉戶懸頭性自懽大志不須持一寶孫公正好學倪寬搜開本有自分明放出眞光滅盡情三寶決然攢正覺一靈何慮不圓成得通妙用須澄湛會認玄微貴淨清堪做無爲雲外客長生路上步前程殷紅瑪瑙閴中懸清靜玄中在眼前便把瑠璃安甲室更將琥珀頓庚田四般珍寶牢收取三耀光中謹密傳此法得時空外去彩霞深處步金蓮常常知足善縱橫莫要深深戀火坑性上分明開兩路午前認取打三更一眞自顯靈光結七竅皆通瑞氣盈正合慈悲超法界清涼路上得長生登途上路不由吾雲霧相招本性甦萬里清風常作伴一輪明月每爲徒山青水緑程程送酒白粱黃旋旋沽今夜一杯如有意放開紅熖照冰壺黑雲散盡月偏明照耀塵寰滅有情煩惱不生全妙理是非去徹出深坑山頭别有微風至心下重將小雪迎面壁散人知此味逍遙路上證圓成榮華不著是良因遠遠非非眼界新八識精研通不夜五門光顯照長春由斯更許超三界依此應靈出六塵一朵金蓮歸上界圓成永不墮迷津大道無言不可聞禪宗坦蕩乃同群兩般打坐誰能悟一炷香煙孰會分奪得三光眞秀氣便消四大敢紛紜團圓耀彩投空外方得逍遥似白雲自然消息自恬然不論金丹不論仙一氣養成神愈淨萬金難買日高眠紅紅火焰三峰透白白蓮花五葉鮮勘破行功無作用于斯堪可認玄玄如日光明似水晶燭人鑑物愈惺惺只觀粉貌空虛景肯覽黃庭內外經眸子正安難見道童兒端坐不瞻形教公若遇金篦子刮盡塵睛慧目明齒落髮華現老軀本靈猶自戀癡愚市中來往干人祿山上清虛負月孤擺徹水泉團火氣撥開煙焰指冰湖從兹舒展紅霞腳踏碎純陰這轆轤惺惺寶劍最分明越礪磨礱對我呈高舉劈開新道眼一揮斬斷舊心情朝生瑩淨渾無染夜吐光芒更有聲戰退妖魔邪氣力盡投空外化成形今日清明賞水廳堪爲住宅總康寍兒孫女婦渾家慶德行荷蓮一道馨退己進人唯仲正休心積善勝看經時來同處青山外萬頃白雲作畫屏昨宵夢請八神仙便付鸞衣降玉編數幅蠻牋鋪錦繡一枝象管走雲煙廣留教法開心地善寫詞詩種福田祕密天機誰得悟害風風害獨能傳今朝三月二十八耳邊忽聽鶯聲發驚開道眼一觀瞻羽翎新用黃金刷見予轉轉弄清吟他意還應會我心恰似琴聲初調品無情風月是知音世網擘開肯染塵名園恰似洞中春問公還識逍遙客顧我堪爲自在人坐上詩篇俱濟濟醉中醁醑任頻頻四時不老花芳别唯有清香一蓋均凡籠跳出並無塵此日誰知物外春對景肯從搢紳者將身已作散閑人詩緣毛穎傳來速酒泛芳巵轉得頻認取祖宗眞實地黃芽澆灌滿園均深羨孩兒樂使牛不須裝裹急梳頭清閑自是親香火勞役誰知遠佚優咫尺蓬萊人不見逍遥紫府我先酬愛河猛捨尤清淨别駕輕軻泛十洲密布彤雲慘白沙舞空亂目閉天涯嘉祥自是封盈尺應瑞依然結六花景外畫圖歸釣叟瑩中清淨屬仙家晚來皓月開濃霧一派流光射素霞一首新詩贈七哥予言切記莫蹉跎遵隆國法行思義謹守軍門護甲戈飲膳共爲通揖讓言談歌出用謙和先人後己唯長策竚看歸來唱凱歌祥雲瑞靄生賢哲五百時臻遇三月十一日辰尤最奇三千年見蟠桃結莫辭金斝酒頻添好把玉爐香滿爇仰祝遐齡無可比有弟今朝細分說若比金玉均可缺若比江海亦不竭若比鐵石俱可裂若比松柏皆可折未若兄之愈眉壽永永綿綿不可絕日中已過艷陽天嫩緑微紅是禁煙恰到清明眞火得不迷濁酒道心堅自知一性通長壽何恥凡軀掛舊氈燕語呢喃全姹妙鶯啼睍睆覷嬰賢三田誰識虛中寶四假予知嶺上看但把五行顛倒使便教他日遇神仙閑閑閑得染章篇顯出文房內四賢烏帽嬰兒添硯水朱衣姹女運陳玄白顏公子傳銀筦緑鬢佳人鋪錦牋九轉鋪排眞玉漾一揮寫就寶珠圓明光粲粲千般瑩彩艷團團五色鮮親自擎將空外去十分堪獻大羅仙害風王喆遠山隈信腳同雲近海垓八百行成雙樹果三千功滿一聲雷更無意馬遊情色那有心猿探世財財色兩能長滅絕色財盡許不追陪永除失腳黃泉去久得回頭道眼開任處碧霞光熠耀朗隨風月過瑤臺見公逸樂樂無涯道在眞全去世華雅句分明謫仙子遺風正是老君家須知文苑高韓愈壘作琴堂感伯牙有箇王喬還識否同歸蓬島跨雲霞雲根上起任天涯到處臨風弄月華對水雙鶴由我跨輞川一景屬吾家清虛益氣憑師教恬淡通津愧易牙占得逍遙眞自在何須服藥與餐霞耳中何事轉加聰兩目如盲爛爛紅恰似禪僧初入定正如大道始行功內思不出澄神住外想俱無忘閉空意馬心猿重捉住頂門玉路自然通磑大驢微力不勝喝驢人早便生嗔一心發恨嫌行慢兩手扶鞭打得頻只爲不知輕與重更交轉受苦中辛伊能見麽無仁德只此分明後世因師父鎖庵化馬鈺有治平寺無名和尚將為守靜有頌曰開閉深藏有甚因無言靜坐去貪嗔高樓畫角如春夢釋海波清見本眞了了了時心便了微微微處水澄清為觀俗事愚癡子故守禪堂不出門師父每句復酬三句完之為八絕按八識開閉深藏有甚因都緣眼界絕紅塵白駒點點難相染野馬紛紛任自申無言靜坐去貪嗔耳內繁華勿我親不鼓聲音唯作伴無弦曲調自爲鄰高樓畫角如春夢鼻息沖和言不用此别分明善果生這迴只把良因種釋海波清見本眞舌中五味不登唇三時恬淡唯清淨一味甘甜沒價珍了了了時心便了身中一點圓光小從兹默默與昏昏又更冥冥還杳杳微微微處水澄清意盡心忘滅盡情無漏無爲登正覺不增不減證圓成爲觀俗事愚癡子妄想難除生與死迴光返照這裏來識心見性投玄旨故守禪堂不出門並無煩惱性中昏未酬救徹眾生願好把玄談細闡論法師今已得清涼一性昭然顯瑞祥卻把無名爲雅號釋迦元住在何方青春應是好看書義理昭然覺自如若赴選場須決勝榮家顯已掛金魚輪迴生死如何免認取亘初眞正面三珍五彩一齊攢長生路上霞光現欲愛貪財甚法離眞清眞淨是精持般般物物俱無著一箇圓光上玉池過隙光陰能久矣人人總悟非行使閑中等取眞箇眞得後逍遙共歡喜衰顏寍再去年時裏面眞人本不衰莫戀外容著假合嬰兒相貌示無移這箇魚兒耍更顛錦鱗潑潑躍清泉金鉤三擲吞香餌一掣神仙几案前白袍青包宿世因有緣遇我脫迷津雖然未達玄中妙已作蓬萊小道人跳出陰陽造化關一心向道莫迴還淨清便是神仙路只要閑中養內顏占得風來便有緣朝朝贏得日高眠飢時街上來求乞只要人間自肯錢奪得眞容不問年滿爐香火五千言翛然燕坐通恬淡獨哂明靈出玉軒常把鏡中人别辨莫教珠上起塵埃有緣體貌捐新業無相身軀產舊孩夢裏逢予睡沒言須知正訪害風虔公還要得頻談論認取冰中冷處暄命中福淺少因緣只爲勞生日業牽若是要居閑散地長令清淨沒憂煎稍留片語輕提耳直待一身無一事此時方可共逍遙路遇仙人談不二一指長生路上遷待公性分有因緣亘初那箇分明見何患將來不作仙一想前言是沒緣在公只要志牢堅推心朴實無偏黨未作神仙已做賢尋思遭遇幸然間怎會閑中那箇閑人不堪憂方是樂恁時與我共躋攀勝如不見先生面只要公心長作善臧吉嘉祥不離身明珠一顆分明現夢裏逢師是睡仙從公知道這因緣若教足下還如此也沒驚憂自在眠佳時三月此花開檀作斯心玉作腮折得一枝冠上插也應隨我到蓬萊堪歎人人憂裏愁我今須畫一骷髏生前只會貪冤業不到如斯不肯休爲人須悟塵勞汨清淨眞心眞寶物奪得驪龍口內珠便教走入崑崙窟上弦金月下弦銀上下金銀各半斤被我合爲十六兩內中星分怎生均無極眞人種矮槐清陰覆地有誰陪今朝對此成歡悅記得當時是我栽觀有清涼號集仙臺名白鹿昔昇天我來到此君休笑已在白雲洞裏眠無何霍氏太言深昨日天晴今日陰天意若教人數得不高不廣似人心不寒不暑好風吹金餅團團照我衣武曲星臨文曲位上元節比下元時孫氏池塘似渼陂前瞻波面靜無聲轉頭卻見潺湲處流落輪迴爲不平皂衣脫了覺身輕便作金蟬樹上鳴已得清風眞伴侣誰人此日悟新聲退下烏軀體便輕高槐美蔭喜長鳴逍遥枝上亭亭坐自在風前款款聲恠來天氣逼人寒湧出金盤宿霧殘不比尋常三五夜勸君休作等閑看輕微纖細燼爲鄰長在油中汙本眞愛把燈光頻剔撥怎知紅熖返燒身夜月照時金瑣碎清風拂處玉玲瓏歲寒别有非常操不比尋常草木同昔時曾見趙州來今日盧仝七椀猜烹罷還知何處去清風送我到蓬萊是人洗拂酒兼羊我有霜紈與七郎除垢招風開道眼教兒永遠得清涼日暮雲收爽氣寒冰輪輝映向更殘清光此夜分明别休與凡常一例看已喫蟠桃勝買瓜此般風味屬予家眞須換假全眞性指路蓬萊跨彩霞堪歎世間名與利朝貪暮愛沒休時悟來恰似觀棋者迷後渾如敗者棋急急修行急急修我今題寫此骷髏從來世上爭名利不到而今未肯休腳引誰留慢慢收元來不用這憑由今朝已得前程路便是逍遙達岸舟腳引伊將誠見察扶風眞行成搜刷足知王喆得因緣會要修持遵國法一輪明月一清風內外交馳西復東滾出崑崙山頂上照吹明爽自然雄誰知將鏡異中觀分出南山與北山我把靈臺頻自照不須别辨好容顏從此擘開眞鐵網今朝跳出冗塵籠便將明月堪拏弄撥斷閑雲好害風畫成鸚鵡不嚶嚶跳出牢籠離死生告你蚫蝶休弄侮如今不向此中行心淨神清鬢不華水雲便是我生涯休交死後渾家送贏取生前出離家奉白金蓮社裏人蕤賓月一起良因諸公若悟靈山食暗換長生不老身闔家安樂吉祥先次後心頭用火然燒見本來眞面目望中觀喜看團圓勸君莫戀有中無無無休失無中有有有養出玉花頭頭頭結取金蓮首釣罷將歸又見鼇亦知有分列仙曹鳴榔相喚知予意躍出洪波萬丈高秀氣要清清於中性用貞自然開智慧應是出聰明爲教同其閔延年共比彭並通三教理遠遠得期程撲破眞灰罐卻得害風觀眞待悟殘餘有箇人人喚欲要心不亂般般都打斷子午卯酉時須作骷髏觀自哂這風狂因何喜和光隨緣消舊業無復造新殃意馬須牢繫心猿切緊防道修如急急日日得馨香此是這王喆前生心性劣脫了你骷髏現出中秋月清涼何所似不與苦寒同半夜臨潭月初秋過雨風有姪喚作王五郎其妻喚作我姪女二人做取好因緣兩箇休遭破疾苦若便尋思這汞鉛便令調養眞龍虎眞龍虎人不識赤鳳山傍各一隻守定巢窠共結成東西換過成交易成交易正好行丹田界上殺三彭無人會得雙關義有箇靈童打五更打五更傳消息一派甘泉正好契便是醍醐灌頂來此中惟我知端的知端的休休休姪女姪兒急急修若還不肯聽予言荒郊定作兩骷髏竊以慧燈永照須憑玉蘂之光性燭長明決得金蓮之耀內沐三光之秀外消四假之名步虛躡空探玄搜妙洗來瑩淨之鄉出入芳馨之路各懷珠璧共捧瓊瑤顯要全神須令養氣稍通斯訣請掛芳銜竊以玉化乃氣之宗金蓮乃神之祖氣神相結謂之神仙陰符經註云神是氣之子氣是神之母子母相見得做神仙起置玉花金蓮社在于兩州務要諸公得認眞性不曉眞源盡學傍門小術此是作福養身之法並不干修仙之道性命之事稍爲失錯轉乖人道諸公如要眞修行飢來喫飯睡來合眼也莫打坐也莫學道只要塵冗事屏除只要心中清淨兩箇字其餘都不是修行諸公各懷聰慧每日齋場中細細省悟庶幾不流落于他門行功乃别有眞功眞行晉眞人云若要眞功者須是澄心定意打疊神情無動無作眞清眞淨抱元守一存神固氣乃是
