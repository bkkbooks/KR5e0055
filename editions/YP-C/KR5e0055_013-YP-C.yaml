front:
  text: 沖融免擊精藍過世鍾
  hash: sha256:0db860aff6983230c5644228c1794e5c136e2e1d9554a2e2869f69b8ee17daf8
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_YP-C_17weiji-01-0170a, image: JY187/17weiji-01-0170a.png}
body:
  text: 望蓬萊聽我勸公莫謾風流猿馬不閑空踐野光陰虛過度春秋怎得免荒坵如省悟急急把心收對景直須抛妄想於身若是少貪求何用道人頭醴泉好風物雅幽幽須把惡緣如省悟宜將善事急持修鬧裏莫投頭予省也遂把內丹收對景攄情橫寫字有時歸去到騎牛道號號無憂又紙旗上書邊境靜乞覓得便宜戰鼓復爲韶樂鼓征旗還作化緣旗便見太平時那減捨第一莫遲遲王喆害風無憂子當三折二小錢兒伏願認眞慈又詠餺飥食店好餺飥最奇瑰玉屑無窮搏作塊瓊瑤一片細匀開須使寶刀裁呈妙手用意穩安排椀內梨花新貼樣筯頭銀線穩挑來餐了趁蓬萊又詠勸道友趙公好偉貌正青春莫把光陰虛度卻願將功行實相親與我作比鄰清閑在認得出迷津稍悟浮生除愛念如知幻化絕貪嗔便是洞中人未入道休要執中迷先且牢擒劣馬子切須縛住耍猿兒款款做修持如省悟勘破女男妻自在假身常煅煉逍遙眞性得推移應是上瑤池詞謹勸見在好持修浮名浮利何日了勞神勞氣幾時休塵世莫淹留須早悟三教理玄幽擺脫恩山祛愛海得歸蓬島赴瀛洲只在此心頭詞意悟就上好修修意馬心猿都捉住攀緣愛念一齊休善事莫遲留三教好妙理最深幽擺脫浮生并世事這迴前路赴蓬洲此箇是歸頭又題杏花春景好艷杏吐紅顋笑日仙姿眞美麗倚風嫩臉最奇瑰不羨臘前梅人豈識唯許對予開折得一枝應在手馨香滿袖任還迴携汝到蓬萊武陵春叮囑閻公歸故里傳語醴泉人可可貪求莫恨嗔贏取好精神只此堪能爲大道何必苦尋眞稍稍諸公悟此身便是出囂塵又詠别道友王喆已東遷經過甘河上眾賢性內飢寒由未免盤纏乞覓諸公自肯錢得得遞相傳慧我同爲出九蓮多少各人心意會怜怜此去如來本氣傳我已入南京甘鎮人人箇箇聽敬重三光須要認休輕五穀中間得致精此去決前程寫盡平生自己聲若是卻來重一過靈靈總看眞形一氣清富貴與身貧肯把榮華只取仁前定緣由今世用心純自是陰功福自臻休更苦中辛惡業休貪作善因奉勸愚迷須省悟休嗔萬事由天不在人蘇幕遮少煩人稀赴會我自無恩莫把他人怪廉儉温良身自在莫强追陪免得常耽債有錢時人見愛及至無錢親也全疎待且見世情如此態察盡人心暗想除非外性爲眞身是假認取圓成可可頻占惹自是康强惺復灑靜裏搜閑急急投嬰姹說良因談道話開廓靈明拯出根源也一顆神珠無有價衮上瑤臺永永長遊冶會傳盃經每醉能喫殘餘得飽長長睡眼裏清閑祥又瑞時復觀瞻白黑黃紅翠出虛空無墮墜瓊蘂玲瓏顯現眞嘉致贔屭靈神來望視移入金盤天上誇奇異女休猜兒莫識情慾偷精盜髓隳筋力奉勸迴頭尋歇息認取身中三箇眞端直姹娘親嬰子得專委黃婆鞠養成淵默暢飲刀圭通十極四句同歸隨步雲霞陟又買背籠柳條柔麻線細妙手玄功密織牢纏繫合格身兒都捏膩堪與王風背上成家計水雲遊靈性慧應用衣飡裏面深根蒂脫下凡軀猜得謎了了超昇全是伊相濟又點化道友箇人人常守鋪瓮裏合頭鐵索纏縛住怎識從來光耀處元是神仙何不開心悟覓清涼搜穩步若要飄蓬除是風狂做也肯依憑雲水去占得清閑走入逍遙路箇人人二旬八勿肯迴頭性命成搜刷撲入沉淪常墜壓鏡子前來著甚言談答是神仙何不察劈破凡心認取佛菩薩一顆明珠頻擦抹七寶宫中壘起眞金塔又贈同友這華宗能順我淨意清心認取逍遙臥日日凡塵仍便趓管取教公快樂無摧挫早回頭休漫過滅盡無明遠了尋常火一點靈光山上鎖穩駕白雲五色霞中坐又詠友人嘆身省其身鈐其口贏得清閑自在逍遙走隨分爲生應永久不義之財且縮拏雲手少追陪微飲酒節色搜身新認元初秀認正三光兼孝友不祝神祇也得長春壽又白告友人正青春紅貌聚苦肯迴頭這下分明覷願得迴頭心早悟與道爲鄰也處逍遙所善緣來惡緣去搜見眞容知向靈臺住七座門開通的祖跳出之時便入長生路又贈于道友要修行須發憤除了憂愁破盡情懷悶仗慧刀揮五蘊劈開雙關穩穩成三分沒商量休厮問只把前篇日日頻搬運好向家中搜土糞撥見明珠携入清涼郡又詠贈道友善修文能應舉九轉金丹何不搜尋取若肯回頭時暫覷兩足輕狂走入雲霞步按三光隨師父别有一條穩穩長生路自在逍遙開玉戶好與王風指日同歸去又訓徒眾弟兄懣爭下手與世相違日日長鈐口休論汞鉛並卯酉開闡絳宫自在逍遙走二儀眞三耀秀我欲親傳未肯相成就直待同流觀得透款款停騰敢把天機漏問眞修聽我斷莫著凡軀物物頻思筭打破般般常內看坐臥行住須作骷髏觀漸令成常謹按八畝瓊田别有新條段性上分明堪正翫量得無差便到清涼岸道無言禪沒說兩道白光唯許紅霞設眞玉山頭常擺拽潑灧灧兮返照靈峰雪愈玲瓏尤皎潔射透晴空瑩瑩神光别到此玄玄玄妙徹一朶金花裏面金丹結邢公分剖舉恩情割斷靈光照內蓮生眞可要姹嬰嬌和會通玄妙憂愁樂道氣收來結作成珍寶玉牢藏五彩耀透崑崙日月眞修造浣溪沙大道無名似有名達磨面壁九年清釋迦坐雪六年精奪得眞空眞妙用一通門裏出圓明大羅天上聚圓成會看虛空七寶園能開寂靜六華軒希夷微妙在坤乾理透陰符三百字搜通道德五千言害風一任害風虔緑水傍邊上雪山銳然跳出玉門關虛中空外一開顏渺邈那邊歸正路的端便是穩居間白雲難比此清關又重九日金虎咆哮金馬傳金公重九撒金錢金風過處舞金鈿金地徧成金蘂泛金童折得步金蓮金盤裏面獻金仙一箇詞兒十二金修行謹按日時尋急將猿馬緊牢擒五戶自然開闡盡玉花叢裏洞門深舊來那箇是知音又詠筆毛穎從來意最深江淹夢裏莫生心班超投處好追尋放逸眞閑攄雅致詩詞不寫自高吟這迴撈出水中金憶王孫四宵得得竝無寒深謝孫公青顧看霞袖分開拂霧端入長安迴首教賢結大丹長安爲甚便歸來使我蓮花五葉開别有清光舊鎮醅獨傾盃免了輪迴九獄災又贈馬鈺人云口是禍之門我道舌爲禍本根不語無言沒討論度朝昏便是安閑保命存離别難遊厯水雲兩郡人休起無寥看清輪認取風飈晃瓊瑤嘉氣滿丹霄玉花吐馥金蓮馨香二物誰消隨緣從覆燾紅霞繚繞翠霧不相饒時得得日昭昭準蓬萊定信頻招見空中彩鳳來往又金童前捧紫芝苗此卻要再覩吾顏除非能續弦斷重調勸汝等各各修持一去洞天遙昭君怨奉報早離火院弃了一家攀戀目在水雲前樂安然便結長生煅煉得做上仙親眷搜出碧潭玄月團圓搗練子搗練子十怎生閑來閑去好修行囉哩㖫哩囉㖫若逢迎得圓成從頭一一說前程囉哩㖫哩囉㖫一爲人做凡身四般假合怎生眞囉哩㖫哩囉㖫搜玄路出迷津靜中調養氣精神囉哩㖫哩囉㖫猿騎馬逞顛耍難擒難捉怎生捨囉哩㖫哩囉㖫慧刀開齊殺下教君認得根源也囉哩㖫哩囉㖫此圓通住虛空冥冥杳杳怎生窮囉哩㖫哩囉㖫分南北看西東悟來只在笑談中囉哩㖫哩囉㖫重陽子全眞理陰陽顛倒怎生使囉哩㖫哩囉㖫這頭行那頭止沖和上下分明是囉哩㖫哩囉㖫用刀圭剖昏迷合和一處怎生携囉哩㖫哩囉㖫人頭落現紅霓白蓮花朵出青泥囉哩㖫哩囉㖫從來性本來命無形無質怎生惺囉哩㖫哩囉㖫汞中明鉛中瑩霞光裏面通賢聖囉哩㖫哩囉㖫水中金忒幽深玄玄妙妙怎生尋囉哩㖫哩囉㖫從初得到如今西風時復送清音囉哩㖫哩囉㖫三丹寶難分剖昏昏默默怎生保囉哩㖫哩囉㖫在虛空長懷抱緋衫裹了新烏帽囉哩㖫哩囉㖫水兼火坎和離兩般消息怎生知囉哩㖫哩囉㖫休燒煉莫修持元來只是這些兒囉哩㖫哩囉㖫開心日圓皎潔人前教我怎生說囉哩㖫哩囉㖫淨清水玲瓏雪交光朗照知明喆囉哩㖫哩囉㖫搗練子眞了了閑行閑坐任歌叫囉哩㖫哩囉㖫我咱知人難曉曲中有箇三光照囉哩㖫哩囉㖫潭底月雪中霜有人會得便風狂囉哩㖫哩囉㖫泉底樚水中金尖竿尖上細搜尋囉哩㖫哩囉㖫搜芳翠哂輕盈驀然聽得賣花聲艷陽天氣候明朝雲白晩風清遮藏吹轉蘂珠精放馨香滿樹榮點絳脣可惜嬌兒惺惺伶俐聰明作靈臺廓圓明光爍我許蓬萊約斷卻麻繩正好修丹藥如今卻買條銅索縛住踏雲腳又贈友人觀公形貌青春伶俐眞惺灑偏幽雅自然嬰姹莫放猿兒耍認取清閑異日成嘉話之乎者便休書寫養就丹無價又詠拾菜人昔日人言拾菜郎根荄芽甲總盈筐春夏秋冬閑不得温炎涼冷鎮長忙今日予言截綵郎能爲斡運做經商願靜一心休作用好將四季細消詳春季裁量十四郎風流玉貌好輕狂每夜房中憐美婦常時腹內痛飢腸以此街前來背箱利多撲入綵帛行刀尺使時無作念妻兒愛處越馨香夏季裁量十四郎炎炎火焰越忙忙百巧場中誇意銳萬人叢裏用心剛絲絹羅紈鋪內藏金銀珍寶架頭光獨做辛勤心自苦渾家豐足業誰當秋季裁量十四郎憂愁思慮動悽愴陡改紅顏衰體瘦漸生白髮老容光腰曲頭低力不剛耳聾眼暗淚汪汪日往月來添疾病妻嫌女怨受恓惶冬季裁量十四郎百端尫瘁早粘床五臟受寒內結積三焦發熱外生瘡一息不來四假殭兒孫掇出臥丘荒七魄有緣歸地府三魂無分上天堂爭似休休事事忘虛無境內覓清涼若是會探潭底月便教認得雪中霜共我爲鄰住洞房憑經作伴爇心香不日修成功與行騎鸞跨鳳入仙鄉恣逍遥物物拈來般般打破惺惺用玉匙金鎖𤃉𤃉澄源炎炎熖火盈盈處上下倒顛換過妙妙神機玄玄性果清清做靜中堪可現現虛空靈靈眞箇明明衮光瑩寶珠一顆千秋歲汨汨塵寰擾苦苦尤深窈長繫絆不分曉日生還恁地夜夢魂驚杳聽分表都緣劫劫波波紹急急心開肇早早俱除勦迴首處見明瞭一般眞箇好萬道銀霞繞這番了秋潭皓月波光晶巫山一段雲對月成詞句臨風寫頌章一枝銀管瑞中祥隨手染清涼玉洞門開深淺寶樹花分篆香蓬萊仙島是吾鄉宴罷後瓊堂侍香金童大道修持物物俱盡悔莫起黑煙生靉靆雲水淨清須慷慨逸優游做成奇駭壘這功行便恰如山與海得閴裏眞閑誠自在一塊紅霞籠寶排化玉成形轉生光彩菊花新對月無何添雅致叢緑花黃偏有異正是遇重陽霜露冷宜呈祥瑞清香覆我如言志害風來且休攀視應共到蓬萊瓊筵上眾仙頒賜木蘭花令鶴兒每每常相聚點點蒼苔啄食覷青霄空外唳天時明月光中頻警露逍遙鮮潔理毛護自在遊行惟顧步怡然呼取舞風來六箇隨余蓬島去虞美人四郎須是安爐竈莫把身心鬧玲瓏便是本來眞氣精養住便得好精神鉛汞得得知顛倒方見無名道今宵飲酒是何人認取清風明月日相親又以嫂為見在父母害風王喆遵隆道自在逍遙好除眠之外總無知百花笑我不會見便宜功成行滿仍須早雲步歸蓬島好同見在赴瑤池共摘蟠桃往昔結實枝月中仙遭遇中秋近初更氣爽風定雲散虛空露降闡萬里晴天顯青玉案舉頭瞻海岸湧出金盤爛爛不特門門煥人人共喜貧富總爭看誰能曉悟清輝這銀蟾裏面深隱陽筭星稀宿罕使鵲烏飛去與離爲伴一輪圓又滿正當午恰分子半愈放光明燦庵前召我衝霄漢金蕉葉名利牽纏怎徹誰肯把善緣總結在火宅居常炙㶸尚穿聯惡業鬭巧爭如守拙早離了機心切切稍能悟三教祕訣也無生無滅楊柳枝性命須將自己觀細詳看一刀項下好疼酸最艱難不信且將針略試痛多端發心要喫覺心寒遠佳餐刮鼓社刮鼓社這刮鼓食中拍且說豌豆出來後卻勝如大小麥便接著五方顏色青紅黃黑更兼白又同那五方標格蒸炒煮燒生喫蒸妙煮燒生喫刮鼓社這刮鼓食中飽我看豌豆將來後且圌起須入窖莫收多不須收少上頭自有三光照似象棋何勞打砲有幾箇人知道有幾箇人知道西江月於己搜尋臧善慮思絕泯爲先減財節色保丹田對景須行方便老幼自然有祿且休苦苦孜煎放開一朶白花蓮管取西江月現王喆心懷好道害風意要離家攀緣悉去似團砂不怕妻兒咒罵好對清風明月寍諭海角天涯來來往往跨雲霞此箇逍遙無價養甲爭如養性修身何似修心從來做作到如今每日勞勞圖甚好把幽微搜索便將玄理思尋教君稍悟水中金不肯荒郊做恁川撥棹這修行訣便安排得有次節把清靜天機今朝分明漏泄使人人玉花結從頭一一穩鋪設向五更裏看擺拽將此脫殼神仙玲瓏玎璫做絕害風兒怎生說一更裏瞥看參羅萬象列搜出那坐正星內中位貌偏别向地方也玉花結銀素將來細得熱把烏龜牢纏紲然後四隻腳獰獰子一齊打折害風兒怎生說二更裏瞥看天河流無竭忽見耿耿洪波潑灧灧底昭徹向西方也玉花結灌出黃芽色非涅甲尖上搏白雪有此一箇靈童擺手親自去折害風兒怎生說三更裏瞥看銀蟾圓不缺吐出一輪光明滿天瑩然有别向南方也玉花結白鹿前來行得竊便銜他新皎潔將去圭峯山頭獨自口中嚙齧害風兒怎生說四更裏瞥看斗斗光如爇照遍滿空清虛放盡靈輝凛洌向東方也玉花結攢燭三山似電掣熠燿如瓊瑤屑被這惺惺了了一齊中宵盜竊害風兒怎生說五更裏瞥看魁𩲃無差缺正合天心斡運堪作上天喉舌向中央也玉花結捉得清虛這迴決便永永除生滅此箇自在逍遙唯予獨會拈捻害風兒怎生說曲中詞徹把來厯事親堪說住京兆府外縣終南方孤雲白雪自觀得玉花結活死人兮放些劣沒地埋眞懽悅道號重陽子字知明姓王名喆害風兒怎生說性問伊家命要嫁這東頭兒郎馳騁昌肌膚瑩昌肌膚瑩鉛汞合和正轉氣神定天上面急敲金鍾玉磬李眞仙省李眞仙省憨郭郎牛子卻如澆墨牽拽不迴頭向川原貪水草騁風流禁得這茫兒躁加力用鞭勾渾身都打徧變霜毬酹江月放心坦蕩樂閑閑應使蟲消尸去清靜長施憑雅正封寶瓶宮守護闡闢雙關非能運轉也得全精固三陽相見五神分朗團聚由此雖寢無眠頤顏養浩潔白盈盈數直待澄鮮方是徹愈覺眞靈開悟性結成丹圓光耀赫決遇明師度紅霞繚繞恁時迎引歸去梅花引少無福早孤獨憔悴一身無告囑日常思日常思此事分明皇天便得知見遠促見遠促侍來偏親增汝祿孝心推孝心推致感神明洪禧得共隨爲人福生中國衣飯陰公注定祿命中無少嗟噓天與之貧不得富安居尋思人似草頭露爭奈保朝不保暮莫剛求莫剛求假使强圖入手卻還休隨緣過隨分樂惡覓慳貪都是錯貴非親富非鄰矜孤恤老取捨合天眞當權勿倚欺淩弱須防運去相逢著減欺慢減斯慢不論高下平等一般看蘇莫遮荷葉盃認得之時休送碧宕深洞瑪瑙耀光希龍蟠虎繞玉花垂西江水上來往見烏飛直待青童交位恁時休去頂戴翠華冠渾身錦繡那人謾方知此處有箇永相隨巫山一段雲道友問變化堪嗟萬物陰陽內造化因功休論西東只在三光秀氣中公如會得疾安腳便做飄蓬脫了凡籠一箇眞靈入碧空又崑崙山扶桑日出分明照蓬島相鄰若要親親除是清閑只一身逍遙無事方能到俯瞰迷津煉就重繞頂上孤峰現寶珍浪淘沙事事少相侵物物無心固精養氣本源深得得先人添惻隱猿馬牢擒玉樹可先臨花綻黃金清香窈裊出高岑萬道銀霞攢簇住方得嘉音又火裏生蓮陽氣透蒼天照照綿綿地戶猛焰亦如然發出水中直覺性一朶紅蓮早早認清泉結取因緣烏龜口內吐靈煙助正丹田香馥郁業業新鮮又賣狀附口寫文附口做生涯休寫交加憑他實語莫虛譁便是於身增福祿贍己榮家見似浪淘沙若勸深嗟若還不使到廳衙兩主休和歡又喜公跨雲霞錦堂春試問修行纔登戶牖應是下手何如便先令歡樂於己開舒待款款尋來的當端正意滅情祛做嬉嬉坦蕩更認閑閑閑裏安居從前一一細想好搜玄揣妙時復親書頓省悟怡然超出苦海迷衢這番見眞眞那箇唯分明本有元初卻還舊處返光迴照獨證無餘瓦盆歌你敲著得恁響聲大無祥瑞沒災禍元誰知得那外唇有口能發課內虛有腹成因果貴賤賢愚細思量人人放一箇這風狂悟斯不肯爭人我除煩惱滅心火日日隨緣過逍遙自在任行坐功成行滿携雲朵帶殻昇騰恁時節方知不打破賀聖朝仲冬佳節靈童來報陽氣初昇黃芽齊吐玉漿澆溉榮布層層甲方瓊秀庚方金彩相間星能把明珠祥艷瑞光迎在雲外騰騰晝夜樂藏頭金相隔休教錯年間怎生作前頭說甚惺惺辰下重安手腳被蟾光晷運交平時從根摸索事有神功清强氣躍下於予尋倚托文上沒丹藥天知命惟高中談談中别著公決要覓清涼兆府城南登閣各得其宜晝歡暮樂
