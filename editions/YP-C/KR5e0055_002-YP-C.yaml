body:
  text: 七言詩藏頭別墳凡修道本如然滅煙消占得先兀騰騰慵謔戲虛寂寂懶狂顛心故别墳前土性須成物外仙上不唯余顯跡令七祖盡生天贈僧肇法師地因緣離土丘心作解得眞修分道眼高羅漢溉靈根越趙州利天宫昇局寶京山上拂雲頭皮黑去黃芽現箇青牛吼白牛贈傅太丞云傅說類桑君辯心靈過古文定膏盲别有按存性命沒差分圭善用陰陽字午能交水火紋細失無功行得非星礙便携雲述懷三一味獨馨香日閑中道眼光兀不侵除鬱悶門俱得覺清涼傳三教誰能看覷三光我細詳說世人惟好賄誰認得這風狂贈王道人來月往愈身輕是雲車穩又平目怎知雲水貴仙相聚氣神榮牛運用人難鑒虎咆哮我有聲遠是非心樂道先勝地賞清明和純陽眞人韻人到此弄清泉洗塵勞物外天是人非難汨汨生日沒往千千年修鍊方歸旦日應成自恍然裏白蓮今已見神正得大羅仙勸化失人身萬劫休人不悟百年愁懷愛海長思憶戀恩山每悵惆備般般方入道先箇箇總淹留中珍寶誰能置待荒郊臥土邱喜再到醴泉火相逢溉濟全三緣此養丹田年功行爲中士日清閑作上仙谷幽居雖滅鬧鄽大隱得眞詮神知命皇天覆喜今朝到醴泉終南劉蔣姚二官設醮談心應遇佳時下脩成大醮儀俗喜逢眞吉善今雖有最慈悲懷道德洪禧助拔先宗勝廣施謝聖賢多擁護入名姓已天知自述分修進有何憑下明珠鍊要精麥哺餐全藉蔭陽運轉莫生情無雜念除思憶不胡遊處淨清火相逢成溉濟將嬰姹賀昇平公詩債接金科米須將白麵和齒喫時滋味别圭分處往來磨頭女子分明說口嬰哥返復呵意要知顛倒法看一首沒言歌贈學正來彥中金間隔有誰猜目高朋道眼開外三光甯就覷中四假肯心灰坑跳出歸蓬島頂閑居勝殿魁語筲言今謹示人專上彥中來王德昭求學道談舌舉卻牽情印眞靈道自生性本來圓又滿儀能辯濁分清從上善歸燒鍊起中丹得去程麥要公心裏悟聞此理並無名裏無么萬事和中有口百般多昏一片靈光振顯三重白氣波肉血筋休起念肝腎肺不生疴誰能運兼能轉問先生會得麽和鄠縣楊清叟緑猗軒皮皮顯緑猗坡上青青葉葉𦝁射雲軒眞淨灑澆玉榦肯相欺中直節通三昧後虛心旺四時下和詩唯似瞎風獨過萬重陂述懷誦將來出世鄽豪乞覓且隨緣來線去成眞拙有入無任自然裏白蓮金露滴中紅焰玉繩牽兒不見芒兒去看一輪明月圓時有幸做嬰孩後須將寶劍裁下明珠人不悟中丹藥孰能猜龍木上无驚怕虎波中沒怯摧入泥丸如得得無罣礙到蓬萊贈終南主簿趙文林金相隔事無侵是人非總伏欽稅一方蒙大蔭因千行積洪音修仁德皇天眷下恩禧聖主臨位最高誰可議咱先保趙文林謝甯伯公謝前親慧道糧蔬珍饌總馨香高膳罷投新墓裏安身是故莊髓益筋顏駐艶神定氣眼生光誰似得王夫子了殘餘好並嘗心乞食謝喉糧麥須知勝異香覓三餐滋臭腐完四假處冥莊肥身體勤行善朴形軀老漸光兀騰騰功行廣婆嫁我味誰嘗開德府柬傅公送別以詩贈之著余心十里因凡送路越紅塵牛哮吼精光銳馬嘶鳴造化匀物含和功行旦靈明爽氣神眞人傅友眞惺洒出陽關有故人贈道友此幽居我屢來方取正道眸開前瓊樹風前燎裏金蓮水裏猜目人人瑤性廣芽箇箇玉靈恢中清淨長無有下交伊上寶臺道友索如何是修心定性靈慧照得眞修要心頭裏面周慶先成歸庇廕陽脫後沒淹留中瑩寶光頻出上明珠焰不休馬搬馱歸淨界然超過大神舟道友作醮篆符簡抵良辰集眾仙將玉篆遂同編絲不斷依從古口相傳各取闐字金書誰敢悟田丹訣我惟先然水木火金土一靈符便奏天天長觀王師求遇華宗理性寬公眞妙彩光完初面目分明旭轉靈根自在攢德火生紅焰銳花水湧紫芒寒般已結今先賀脈嬰兒飲大丹文登韓公索修行凡修鍊妙中玄裏通么道可傳把五行無用作將四象有新鮮能離水金鱗騁解迎風玉腕全喆詩詞須謝蔣公同處洞中天贈馬鈺名詢修鍊好追尋寸飈光寸寸金得果成無漏果分音韻有緣音輝月耀三田廕魄陽魂九轉臨位玲瓏眞性鈺花臺上倚瑤岑海方大水敢誰猜浪銀濤類大才正三鼇金體現初九曜錦紋開通瑞氣明蓬島放祥岑聳玉臺此波心無地陌川東注傲然來贈道友韓茂先兀騰騰任自然中認取水中蓮綿俗冗何時盡器塵勞每日牽子拽迴無一籠兒見處有三田分清淨公休挫上言誰韓茂先七言絕句遇師四旬八上得遭逢口訣傳來便有功一粒丹砂色愈好玉華山上現殷紅夀期害風害風舊病發壽命不過五十八兩箇先生决定來一靈眞性誠搜刷端午離上新池逢端午不知誰會伏龍虎白雲翠霧得逍遙勸公好把三光睹兄死作人人只會哭家親誰肯能哀自己身若把己身哀得慟無生路上作閑人知縣邀余拜亡靈余不從師僧鼓鈸讚亡靈唯有王風獨自醒若是骷髏從拜禮不從拜禮沒骷形和武功趙清明三百六十金骨節段段圓明有分别地雷震雨出山頭浣濯黃芽調白雪不飲酒醒來不飲塵中酒達後别傳物外杯莫衒白雲隨處有自然舉步到蓬萊金丹本來眞性喚金丹四假爲鑪鍊作團不染不思除妄想自然衮出入仙壇警知天命得勢那堪更得時得時全不畏陰司也宜積行修因果惡業隄防有滿時燒庵茅庵燒了事休休决有人人卻要修便做惺惺誠猛烈怎生學得我風流誡潘十四郞省語王喆今逢潘利賓他能綺語敢相親想君舌竅非皮肉銀裹金楞鐵口唇一輪明月絕纖埃一片靈光照玉臺一粒金丹人不識一生性命有誰猜贈四梧公七松處士絕囂塵五柳先生脫愛津知縣將來名遂後隨余堪喚四梧人四株梧樹驚還訝兩本薇花笑似瞋坐久清風來召我今宵卻與月爲鄰贈董德夫乘閑隨步復尋眞冷淡清虛作主人光遠正堪誇緑鬢德夫依舊走紅塵贈京兆杜先生休言白雪與黃芽莫說鉛銀與汞砂試問杜公修大道崑崙山屬甚人家贈劉蔣村僧定院主玉名慧定定根芽不滅無生證麥麻顛倒若能談定慧圭峯好景屬公家贈趙資深戴月桂此花誰悟四時開細細清香遠遠來不是姮娥曾下界肯留仙種世間栽贈京兆稅院馮五郎身賢認得得眞賢便是逍遙陸地仙一點清虛歸本位紅霞長鎖白雲巔山邊人立便爲仙口訣十分得寶田兌地言來震地說一中大悟便升天紙鳶放起線長牽斷了方知出世纏空外清風來駕馭一衝直上大羅天塵泥莫使汙行庵促住清風好放憨明月過來須訪我三般滋味一般甘修行須是默中言養氣無勞靜裏喧占得長春眞境界百花香裏給孤園活死人引子先生初離俗忽一日自穿一墓築塚高數尺上掛一方牌寫王公靈位字下深丈餘獨居止二年餘忽然卻填了活死人兮王喆乖水雲别是一懽諧道名喚作重陽子謔號稱爲沒地埋生來路口不忘懷行殯須是掛靈牌卽非惑眾窺圖利爲使人知遞儹排活死人墓贈甯伯功活死人兮活死人自埋四假便爲因墓中睡足偏惺灑擘碎虛空踏碎塵活死人兮活死人不談行果不談因墓中自在如吾意占得逍遙出六塵活死人兮活死人與公今日說洪因墓中獨死眞嘉話並枕同棺悉做塵活死人兮活死人火風地水要知因墓中日服眞丹藥換了凡軀一點塵活死人兮活死人活中得死是良因墓中闃寂眞虛靜隔斷凡間世上塵活死人兮活死人害風便是我前因墓中這箇眞消息出水白蓮肯惹塵活死人兮活死人須知五穀助身因墓中觀透眞如理喫土餐泥糞養塵活死人兮活死人晝眠夜寢自知因墓中有箇眞童子笑殺泥團塵裏塵活死人兮活死人空空空裏是空因墓中常有眞空景悟得空空不作塵活死人兮活死人活人珠玉問余因墓中境界眞家計不免臨頭總化塵天地高深覆載人人心姦巧不憑因只知名利爲身寶不悟身爲物裏塵尋思到岸下船人笑指白雲便是因丹橘在身無價寶自然光耀絕纖塵人人不作是非人遠此無由地獄因三界超昇靈物在仙宫那得有飛塵有箇逍遙自在人昏昏默默獨知因存神養浩全眞性骨體凡軀且渾塵人能弘道道親人人道從來最上因若把黑雲俱退盡放開心月照繁塵風月爲鄰也是人水雲作伴得眞因便携鸞鶴歸蓬島此去無由卻墮塵忽然認得岸頭人不可思量議厥因謂甚便教成一曲曲中識破隙中塵我今嗟彼世間人來路前生作甚因但恐性乖來路失歸時轉轉入灰塵胎生卵濕化生人迷惑安知四假因正是泥團爲土塊聚爲身體散爲塵酒色昏迷惱殺人用斯濁惡轉推因將來失卻輪迴去甘作沈淪泉下塵外人不識裏頭人喚出門來得此因明月清風休笑我這迴似你遠紅塵笑殺愚迷枉做人人人皆說養家因家人便是燒身火乾了泥團卻變塵我今欲勸世中人正好追尋道果因稍悟這般知這箇風前揚卻一堆塵陽人不合戀陰人都被陰人損善因鍊取純陽身七寶無生路上不生塵閑來默坐覩常人箇箇鑽尋無路因恰似水魚魚戀水只知塵體體投塵世上輪迴等等人各分神性各分因百年大限從胎死五藴都歸塵下塵穩駕青牛古聖人白牛支葉出斯因儒醫夫子成三教墾闢愚迷怕落塵生來死去萬千人善果良因間有因嫉妬慳貪誇富貴我今與你不同塵誰識鄽中這箇人無爲無作任其因白雲接引隨風月脫得塵勞出世塵往往來來人看人人心厮筭各論因三光塵外分明鑒照爾身形盡土塵述懷水雲遊厯到西方拾得眞金堅又剛放在絳宫封閉了滿宫明耀現霞光金丹頃刻刹那成不在三年九轉行同輩若能先悟此碧霞深處是前程翛然獨對正峰前瑤蘂瓊花景致全一粒金丹成大藥並无下事不須煎玄機妙理不難窮只在无言靜默中搜出從來端的事休分南北與西東會修眞藥按名方搜得玄微理漸長從此烏龜投碧海火炎山上喜朱郞一團眞寶漸生光四象方能盡屬陽五葉金蓮開爛熳萬絲瓊蘂密舒張午前子後正交鋒奪得金精顯戰功一顆人頭當下落提來歡喜獻丁公金蓮一朵自生來只許高人道眼猜吸取清香頻服餌合和二氣結成胎萬神精銳沒魔軍戰勝千邪不用賓獨顯光明輝日耀方知此處有珠珍玉峰山上採靈芝壯氣全神主本基一點光明尤燦燦五般霞彩不相離靜中勘破五行因由此能捐四假身返見本初眞面目白雲穩駕一仙神於身四假乃爲賓裏面靈眞是舊親獨住三峰誰作伴清風明月共三人能知戈戟肯輕狂虎戰龍爭獨敢當奪得光明珠一顆便令消盡九冬霜白雲堂下夜深深細雨霖鈴滴滴金好醉蓬萊須品令聲聲慢唱鳳簫吟修行先要識偏傍南北東西接四方水火木金俱不用明珠一顆出中央內觀一得見知音明月山頭自在吟萬首詩成誰會解若教會解總無心紫靈芝甲始先萌採得來時旋旋烹玉液瓊漿和合了重樓咽下便長生自從收得水中金便用刀圭剖盡陰一朵瓊花開向日晶陽返照運天心馬猿捉住是修行物物皆亡總不生肯向畫樓擊更鼓天明那用打錚錚修持如會識金丹只要眞靈本性全請看崑崙山上景碧霞光彩接秦川姓王名喆知明字道號重陽四味全一性易爲風害做千金難買日高眠從此擘開眞鐵網今朝跳出冗塵籠便將明月堪拏弄撥斷繁雲好害風玄機妙理最幽深乾了銀霜死了心駕取鐵牛耕戊己滿園盡許種黃金莫希奪舍學投胎便向瑤池下手栽生出白蓮花一朵清香直許透天台眞修得得易非難道用觀天合上天占取二山眞境界王花蘂裏結因緣瑤池裏面看黃芽瓊蘂金枝綻玉花朵朵玲瓏清氣上玎璫聲韻屬吾家一生清靜養三田今則方能論寂然光瑩明珠歸岳頂雲霞捧入大羅天便做能尋空外響直饒會捉水中泡千機百計隨心轉怎免臨頭這一交爲人不作鄉中鬼指日須歸物外仙這箇自然知去處那般消息便精研喚出元初子細看瑩然結就紫金丹明明圓妙應無比五道霞光做一攢能衣白布水中爭會戴青巾火裏行四味合和成一味綿綿永永得長生唯余會養紫金丹煅鍊成珠故不難放出光明尤燦燦萬般霞彩一時攢玉液流時無箇識瓊漿湧處有誰知今朝獨灌金花樹放盡馨香滿四維唯余會喫青鸞肉獨我能餐白馬肝兩段合和歸一處傍人遙見各心寒驀然捉住這元初幻化方知不屬余一箇光明眞了了五般彩艷自如如汞鉛相見入長途性命堅牢得永甦擺徹水泉傳火氣撥開煙熖指水湖甘水鎭留題誰識終南王害風長安街裏任西東間來矯首滄溟上釣出鯨鯢未是雄再知一輪明月一清風內外交馳西復東衮出崑崙山頂上照吹明爽自爲雄贈邱處機細密金鱗戲碧流能尋香餌會吞鉤被余緩緩收輪線拽入蓬萊永自由贈桑公之子桑公積行久深洪鑄此兒郞事事通稍悟內歡非外樂好求月上弄清風唐公求修行修行切忌順人情順著人情道不成奉報同流如省悟心間悟得是前程學道修眞非草草時時只把心田掃悟超全在絕塵情天若有情天亦老贈諸生諸公在坐盡高才俊又聰明道眼開莫爲功名牽繫住也應隨我到蓬萊甯海乞化書紙旗上害風人問有何憑術法俱無總不能每日作爲只此是上頭喫飯下頭登贈登州奉道一論明月吐光輝桂樹香傳十九枝正到中更當子午放開靈耀射瑤池贈馬鈺先生嘗於陜西作此詩及到甯海軍馬鈺初相見得姓名再書以贈之一别終南水竹村家無兒女亦無孫三千里外尋知友引入長生不死門自畫骷髏此是前生王害風因何偏愛走西東任你骷髏郊野外逍遙一性月明中贈皇哥多收慧草廣添油一點明燈在裏頭照見五門皆洞達教公拍手笑無休贈孫二姑二姑乃馬鈺室家先生兩次以梨剖割與夫妻分食之意欲俱化也鈺從化一年許孫氏亦出家奉道分梨十化是前年天與佳時主自然爲甚當時不出離元來直待結金蓮在家只是二婆呼出得家緣沒火爐跳入白雲超苦海教人永永喚仙姑馬鈺從化以此贈之擲下金鈎恰一年方吞香餌任綸牽玉京山上爲鵬化隨我扶搖入洞天無常鐘鐘不依時聽者愁定知人世此時休數聲又逐斜陽去遣客無言暗點頭馮先生求問百年光陰總不同迴頭便是出迷蒙教公對景知顛倒擘碎微塵踏碎空圓相一輪圓相自家知王嚞於中正是時衮出崑崙山頂上爽邀風月到天池織造人織造之人得也麽街前猶自騁機梭若還似我逍遙客爭肯千頭萬緒多雪六花偏與我相違飄落人間壓是非碧洞自温無四序肯教點汙六銖衣題竹人言瀟灑月明中我道清虛本意深不是害風來到此怎生引動此君吟題淨業寺月桂誰將月桂土中栽爭忍塵凡取次開折得一枝擕在手卻將仙種赴蓬萊七言絕句詩藏頭贈萊州平等會首徐守道來乞覓意何如口言公善事舒內珠珍常自守心先祖姓其徐贈仁法師講懺能消懺勸人初利天中自展舒利佛前香篆起知師父作眞如贈京兆馮五郎休棄業莫别妻姹兒嬰自有時把心香頻爇起將名姓達瑤池言可語沒人磨內深藏玉潤和納甘津公莫怪家也得喚憑哥京兆來學正覓墨中松寶號陳玄一幽微貴遠煙裏鍊成三箇字來便是大羅天贈張曲通已仁人號曲通乎者也有奇功田不悟清凉境道先生守固窮驪山常訪飲樂眞閑間金花鎮遠山自神仙來此地知身在白雲間文官花時春景好頻看覩群花不一般岸得超堪可賦官園裏見文官贈京兆杜先生要直兮行要清源澄澈稱知明中見黑銀蟾吐苦心甜顯志誠吹玉笛舞嬰哥面金花瑩不磨女唱時休占認中拍手笑呵呵因茶坊賈四郎換茶靈木德歲新芽舌甘津别有華得風生勝杖柱翁歡喜換新茶剔燈杖妙身生百草叢來折得浸油中端會把昏燈撥出靈光顯爾功邀客賞清明人王喆趁華筵壽諸公盡醴泉洗清明眞可愛逢此景會神仙警史四哥道非常道不和甜心苦把人磨中火焰誰能覓有從邪史四哥守時堂常到此並無思愛前親每作詩說街中虛六案時堂裏見安時和遲法師韻直弓彎射有爲中水湧兩相宜通道德遵公注意無爲只自知道友請食餅上津生𢇲餅粘中秀氣我新尖抵三餐眞箇别圭滋味自然甜請史四歌啜茶金間隔並無邪正其心趁彩霞段接生雲外物兒迴首得新茶學公擊鐘重言語好相容口教公莫放慵裏猿兒先捉住人歡喜擊金鐘風火水已相忘內靈根降吉祥爾一言眞箇妙年有分白雲堂題淨業寺雲版言擊此眾僧聞內新聲法雨分利天中振教響音誰悟鐵生雲勸崔彥橫葉無風秋氣清天不語甚分明烏月兔長飛走我休爭勸彥橫題韓茂先藥鋪時性不似斯孩午身軀是死灰滅煙消悟眞拙籠便是見蓬萊題木魚根清淨尾尤頳潔身軀别有名內銜珠能會食辰須響腹中聲題温凉扇爲柄子絹爲腮爾勞勞救熱災院已離君莫怪余别有好風來儀作用覺心寬熱招風冷復攢竹柄兒堪執捧君無暖亦無寒贈浴堂見公家澡浴堂埪成就得清涼心便是清涼境要鑿埪作洞房見董知縣會客坐上嘆落花道王三已棄家羊滋味久相趖中貴冑皆春寐肯將心悟落花贈道友從認得便休尋步移來動好音在公家如可見人自處水中金仁法師說三六弟子王嚞小名十八郞遂悟一十八戒三二六不相干八郎來子細看下仁公傳妙語今已得免饑寒五言絕句化馬鈺未肯從欲鎖庵門坐百日示家風以化之鈺問先生寒冷否遂以此贈之莫慮王風冷王風自不寒百朝飈地過出路你咱看述懷寶結三田聚蓮開五葉全蘂珠宫裏看見箇白光圓有錢須得使不使太憨癡莫待荒郊裏臨風咬齒兒攢三拆字并七言引子如要讀時莫要思三言翻作七言詩若交日裏金雞叫須養蟾中玉兔兒三言絕句贈馬鈺馬相見喆相戀處庵中做方便三言律詩王風子總不求分子午旭春秋炎離坎出虎牛鉛與汞結成休重陽子仙豈求恩大洞問中秋槌金虎鋸木牛初午得子時休重陽子詠好吟從有口喆無心千篇就萬首臨出去也臥高岑重陽子分正仙鉛得鎮汞憑泉煦開卦見徹緣神氣出光昇天藏頭詩書紙旗引馬鈺譚處端教化呼知已亦如然滅煙消去覓錢地種成黃器壁峯長就白花蓮連直訪海邊友訪終南山下賢脉嬰兒麥田整邀風月五人圓詞黃鶯兒
