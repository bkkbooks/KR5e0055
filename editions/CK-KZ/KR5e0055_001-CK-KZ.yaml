  text: 重刋道藏輯要
  hash: sha256:972c3c5029b24a17e27f2b03a7e86d4422a7e71d4455eb70dca445dd908b9848
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_CK-KZ_02p001a, image: JY187/CK-KZ_JY187_02p001a.png}
body:
  text: 重陽全眞集終南山重陽子王嚞撰七言律詩結物外親一姪二子一山侗連余五箇一心雄六明齊伴天邊月七爽俱邀海上風眞妙裏頭拈密妙晴空上面躡虛空東西南北皆圓轉到此方知處處通一弟一姪兩箇兒和余五逸做修持結爲物外眞親眷擺脫塵中假合屍週匝種成清靜景遞相傳授紫靈芝山頭並赴龍華會我趁蓬萊先禮師先生於甯海軍裝伴哥街市乞化背紙一大幅上書此二詩以誘馬鈺同去乞覓圈眼王三乞覓時被人呼作害風兒五般彩色於身見一點靈光只自知貼觀一收八句字指期須顯七言詩長街兩面諸豪富不道蠶歸是阿誰白爲骸骨紅爲肌紅白裝成假合屍昨日盡呼重陽子今朝都看伴歌兒别軀異體皆非悟換面更形總不知世上枉鋪千載事百年恰似轉頭時孫公求問於身切莫論賢愚好對三光認太初剔正四門通教化弼端一性便開舒清凉境介逍遙住閑暇光陰自在居奪得仙丹超造化有餘眞樂證無餘答戰公問先釋後道釋道從來是一家兩般形貌理無差識心見性全眞覺知汞通鉛結善芽馬子休令川撥棹猿兒莫似浪淘沙慧燈放出騰霄外照斷繁雲見彩霞吕公欲退吏求問掌條行法每兢兢恰似臨淵履薄冰三逕好歸投侍奉一身從妙做清澄靜中煅鍊開心月得處光明放慧燈自有眞師來度汝玉峰山頂去昇騰王公問五門五藴山頭闡五門氣神交結碧桃渾決令見性靈兼慧定是於眞瑩不昏外物青霄應久聚空中朗月永長存青童捧出金丹妙唯許元初自討論馬公問平等往來須認定盤星出入還應辨斗清見彼過如余口過願人靈似我心靈自通天地神尤爽得睹烏蟾性轉馨便是修行眞妙訣若能依此達天庭張姑求問九葉金花永展舒八渠瓊水任相於七門得得俱通達四象明明總寂虛一粒神丹歸正路二條銀線結元初光輝燦爛知分付果證无餘樂有餘磨鏡磨鏡爭如磨我心我心自照遠還深鑑迴名利眞清淨顯出虛无不委沉一片靈光開火道萬般瑩彩出高岑教公認取玄玄寶掛在明堂射古今和落花韻不謀輕舉望昇飛碧洞無勞閉玉扉久厭世情名與利素嫌人世是和非須知謹謹修心地何必區區衒道衣門外落花任風雨不知誰肯悟希夷題紅白牡丹紅白絞綃剪作團青羅帳上穩排安清香遠噴无差别異質雖殊各正端塵世久遺三島種時人休作兩般看我今折得同歸去步步雲霞代彩鸞遲法師註道德經遵隆太上五千言大道無名妙不傳一氣包含天地髓四時斡運歲辰玄五行方闡陰陽位二耀初分造化權窈默昏冥非有說自然秘密隱神仙劉仙求問悟徹韶華六己通能將一己會飄蓬閑閑不用焚香火得得何須看教風好把靈明開遠近便令性曜出西東投眞換假光輝至步步蓮花接上宫邢公問七十二歲修行可否便如百歲未爲遲只在心中換過時今世不能全了達來生應許做修持臨行一點須搜正收取三光亦復隨只是投新遺舊舍能除新舍得靈芝示學道人修行只被巧心多卻把金剛喚何矬外貌人前誇俊雅內容目下愈蹉跎性中難以開金訣眞理焉能悟玉科枉把妻男空棄捨將來罪業看如何贈柳蔣張夷仲爲受張良講道經便遊勝景得清泠足穿水石通漣路面瞰雲山展畫屏萬戸人家三烏瑩百般花草一般馨我今回首公休怪卻趁中南碧洞庭春雨一澤如膏賀太平天垂廕祐洽民情行雲作蓋三光射和氣呈祥萬彙生滌出慧心尤寂靜洗開道眼愈分明攜笻便踏雲霄路請箇清閑倒玉觥訓愚魯學仙英俊喜逢遭戇魯應當苦煮熬開暗須吹心上火發蒙難淬笑中刀如能省悟從余訓若肯歸依是我曹吉吉吉人王嚞總無思無慮樂陶陶化造鐵罐錢若使於身滅黑烟八都山上認三田靜來便是歸虛寂鬧處那由覓妙玄木上如求金上虎水中須養火中蓮諸公要識刀圭法願助王風鐵罐錢題逍遙軒逍遙逍遙這逍遙笑煞松篁信任敲從此白雲來洞口不須緑水遶山腰溺江才子空嗟濁投閣詞人謾解嘲還識這般知這箇龜毛兔角一齊抛楊公求問七尺堂堂假合親衣餐恰恰比三人莫誇骨格尋常貌便認金容丈六身覺悟四方通妙用曉明東度結圓因化形千尺應無礙好向凡間轉法輪送軍判弟求安樂法欲求要樂禀良因須是心開離垢塵鬧裏莫令縈損氣靜中應許食全神自然認得三光秀決定通和四序春外假瑩明內眞樂凡人不覺做仙人上兄同胞誰悟水中金己卯壬辰各自尋顧我已歸雲水老勸兄休起利名心恩山愛海何時徹火宅凡籠每日侵莫爲土坡牽惹住蓬萊别有好高岑修行助饑寒者唯三事耳乞覓上行符中設藥下空如此無作用亦未是乞覓行符設藥人將爲三事是修眞內無作用難調氣外有勤勞易損神不向本來尋密妙更於何處覓元因此中搜得長春景便是逍遙出六塵王公求放生知公能作自身觀物命於人沒兩般只是形骸分别異便令飛走復全完仁同山嶽橫恩嶺德洽江河注福湍陰理無差皆盡報捧其仙壽在仙壇題麻眞人觀躬參眞聖望崑嵛巒影嵐光鎖太虛秀氣銳招閑客至害風堪與彩雲居黃金鑄就眞靈性白玉裝成舊始初休說終南山色好神仙何處不如如問龍虎交媾莫問龍兒與虎兒心頭一點是明師炁調神定呼交媾心正精虔做煦熙平等常施爲大道淨清不退得眞慈般般顯現圓光就引領金丹採玉芝孫公問三教儒門釋戸道相通三教從來一祖風悟徹便令知出入曉明應許覺寬洪精神炁候誰能比日月星辰自可同達理識文清淨得晴空上面觀虛空任公問本性如金如玉又如珠兀兀騰騰五色鋪萬道光明俱未顯一團塵垢盡皆塗頻頻洗滌分圓相細細磨揩現本初不滅不生閒朗耀方知卻得舊規模木魚無腹無心掛殿庭箇人敲擊響璫玎種成因果能招飯喚起僧尼使念經水難不容垂餌線火災猶未脫身形忽朝月夜清風至吹斷攀緣一任馨詠慵自哂疏慵號可勤夢中因筆記良因與人還禮甯開口見飯懷饑不動唇紙襖麻衣長蓋體蓬頭垢面永全眞一眠九載方迴轉由恐勞勞暗損神鐘取像西風鑄作形空中懸起顯身榮八十一下陽爻數一百八敲陰德名遂使道家分子午亦令釋子辨虛盈傍人若肯長爲力便是能明自己聲麥粥蜜團雲子白於霜雅稱清明别有香寶刃輕輕分玉片銀匙旋旋𤃉瓊漿金童捧出瑤芳瑩仙客嚼開雪彩光五臟盡令更改正從前永永得清凉鼓樓黃昏拂曉角聲哀急鼓同祛疫癘災水滴按時分刻正錚鳴應點定更迴百年光景宵宵逼一世韶華夜夜催奉勸索詩人早悟莫教耳內五更來姜公建鐘樓精藍三寶實心依結構重樓願顯明圖使響音空外響任教清韻世間清徧聞一顆眞金吼擊動十方自己聲大小盡能歸仰處總令一一證圓成問禪道者何禪中見道總无能道裏通禪絕愛憎禪道兩全爲上士道禪一得自眞僧道情濃處澄還淨禪味和時淨復澄咄了禪禪并道道自然到彼便超昇赴登州太守會青白堂青白堂中一水泉清靈澄湛又深淵源源滚處流無竭潑潑來時潤有緣窗外透光穿玉液門飆撒影弄金蓮馨香滿室靈波聚捧出明珠上碧天曉達搜開本有自分明放出眞光滅盡情三寶決然攢正覺一靈何慮不圓成得通妙用通澄湛會認玄微認淨清凡體化爲雲外客長生路上步前程遊興慶池信腳閑遊興慶池元來只是這些兒雨翻荷葉珍珠迸風捲筠梢珮玉枝春綠夏宜紅菡蓞秋澄冬顯碧琉璃琉璃清徹源流處問著源流總不知禪門初洪潤乞無相修行須是辯西東勘破凡軀物物同白雪嶺頭搜正覺紅霞山上弄虛空此般消息春光裏這箇因緣月影中休泥庭前栢樹子自家眞性是家風老僧問生死平生已得正摩訶玉韻金聲總處和正覺途中登迥嶺菩提路上出高坡慧靈俞達白蓮果眞性還超祇樹柯從此不生應不滅定歸般若與波羅善友問耕種助道世間凡冗莫相於清靜精研禮念初慧照時時頻剔撥心田日日細耕鋤增添福炷油休絕勦剪煩苛草盡除登瑩苗豐功行滿登苗攜去獻毗盧蘇公求退吏清閑人人若論識清閑除是蓬萊第一仙無極雲霞爲伴侣半空風月作因緣用通要到飄然到使慧如遷卽便遷公把凡軀仍脫了請來此處話長年夢嬉遊外景日相親每到中宵睡裏眞七魄樂隨魔鬼轉三尸喜逐耗神津心猿緊縛无邪染意馬牢擒不夜巡四假身軀販白晝筭來何異寐時人吕善友索金剛經偈金剛四句首摩訶其次須尋六字歌仗起慧刀開般若能超彼岸證波羅識心見性通眞正知汞明鉛類蜜多依得此中端的義上騰碧落出娑婆于公求自幼不食五穀此因只在玉京山不必盤餐注貌顏養氣每憑眞水潤頤神長似白雲閑行功盈滿超中位鉛汞相投出此間直待外邊滓穢盡甚時光彩始迴環問清閑心中澄湛莫煎熬性上恬然舉慧刀挫碎紅塵搜得得劈開黑洞認陶陶穿峰明月爲吾友過嶺孤雲是我曹作伴爲鄰歸去後任遊三島訪蟠桃人戲言欲盜腳引幸中有幸遇鄉侯豈肯將余腳引偷你等不遭三毒苦我咱已出九幽讎心如朗月天心運性似清風道性流短引再蒙長引在管教東海一靈周閻都監問長生閻公忠顯問長生方是高樓打一更時刻分明全五氣甲庚顛倒鍊三彭願求當日黃金器須出今朝赤火坑認取蓬萊眞正路瑤臺穩坐泛瓊觥宋公問修行剔正心靈事事通便令生出玉花叢三田珍寶迎朝露一粒丹沙滾曉風艷艷紅輝還潔白明明白曜復殷紅自无實相虛應顯空裏依空現本空修行這箇修行總不知元來只是認眞慈赤衣上士遊山水烏帽先生入火池白馬嘶時金亦吼青牛耕處玉無玼衝天柱地霞光照龍罩翁婆最小兒大器修行不厭華玲瓏顛傻屬吾家清風裏面全眞氣明月前頭結寶砂常把舊容常點檢便將新相便拈拏一通擲在青霄上透過虛空顯像芽龍吟引起虎咆哮雪浪兼風旋旋抛滌蕩一靈添到瑩調和二氣便相交烏龜行向海中戲赤鳳飛來頂上巢明月一輪光燦燦玉峯高處照三茅自從一得見天眞今日方知舊日人離俗復爲雲外客脫塵不作土中賓蓋緣往昔擒朱汞全是當初定水銀一點靈明歸靜界圓光裏面轉金輪玄關奪得不追尋鍊就重陽滅盡陰從此頻添木上火由斯再煮水中金萬般神應還誰見一箇眞靈只自欽聚則爲形散爲氣晴空來往永無心胎仙舞出做神仙都爲從來得正端何用丹田金虎繞不須寶鼎玉龍盤叱迴鉛汞應清靜換過陰陽愈喜懽一段紅霞生岳頂迴光明郎照青鸞斷雲飛盡月光明返照神舟傍岸行水火相逢開正路木金間隔定長生黑鉛赤汞分南北白虎青龍換甲庚依此修持眞了了空中結就玉絲棚旣然朗照絕搜尋不必區區論淺深正坐的端通子午迴頭又復見丁壬五般彩色頻頻步一箇玄機每每侵捉住虛空眞妙景應將此景作嘉音吸呼喘息妙非麤養就從來一顆珠子母相隨眞彩結氣神攢聚異光殊倒顛交媾分機密上下沖和得要樞好向深山最高處怡然獨放月輪孤從初更會捏風顛撒向瑤池種玉蓮生出一枝偏皎潔拂開五葉各團圓昔能已見通玄妙今則還知得自然旣沒四時催逼去長春境上不排年修行須用九陽圖認得陽圖事事甦智者便知超造化愚人枉了下功夫得來勘破無中有成後何如有若无无有有无无有相有中无相達天衢能知下手免三塗咄了從前這匹夫入火肯教成熁熾渡河難以溺漂浮日中精艷長生瑩月裏瓊林永不枯此箇大丹歸物外逍遙來往入虛无永學道人虛誇修鍊鍊何曾只向人前衒己能難曉儒門空怯士不通釋路卻嫌僧色財叢裏尋超越酒肉林中覓舉昇在俗本來無一罪蓋緣學道萬重增心中端正莫生邪三教搜來做一家義理顯時何有異妙玄通後更無加般般物物俱休著淨淨清清最好誇亘劫眞人重出現這迴復得跨雲霞果然慕道沒牽纏孤僻身軀獨自眠靜裏靜生唯得妙閑中閑至決投玄恁時放肆知恬談度日清凉禀聖賢休望神仙休說了教公自坐白花蓮去年甯海軍中坐今歲文登縣裏行兩過嵗除寒復暖二經年節暗還明這般顛倒誰同曉此箇陰陽我獨精一兩眞金纔出火不須團打自圓成好相如知莫外持心神便是汝眞師古人公案須搜獲自己家風要騁馳細細得通前覺性盈盈澄正舊慈悲慈悲清淨俱雙立頓悟全無物物縻認得心花便害風玲瓏玄妙汞鉛通三千內用千朝法十載中傳九轉功彩豔萬重鋪潔白明光一點吐殷紅虛空返照虛空影照出眞空空不空幾箇同流會養軀我今獨自衒癡愚饑來糲飯長哺啜寒後麤衣任蓋鋪詩句不能分密妙心間難以認惺甦豈唯得得時須守應是還他父毋租一字至七字詩詠茶茶茶瑤萼瓊芽生空慧出虛華清爽神氣招召雲霞正是吾心事休言世味誇一盃唯李白興七椀屬盧仝家金則獨能烹玉蘂便令傳透放金花酒酒酒惡唇臟口性多昏神不秀損敗眞元消磨眉壽半酣愁腑腸大醉摧心首於己唯恣猖狂對人更沒慚忸不如不飲永醒醒无害无災修九九色色色多禍消福損金精傷玉液摧殘氣神敗壞仁德會使三田空能令五臟惑亡殞一性靈明絕盡四肢筋力不如不做永綿綿无害无災長得得財財財作孽爲媒唯買色會招盃更令德喪便惹殃來積成三界苦難脫九幽災至使增家豐富怎生得免輪迴不如不要常常樂無害無災每恢恢氣氣氣傷神損胃聘猩獰甚滋味七竅仍前二明若沸道情勿能轉王法甯肯畏鬥勝各衒僂儸爭强轉爲亂費不如不作好休休无害无災通貴貴七言長篇詠酒雲朋霞友每相親滑辣清光養氣神滿坐談開三教語一盃傳透四時春如知自在亭中景便是逍遙物外身默默昏昏風作伴冥冥窈窈月爲鄰異香旋旋虛空過翠霧層層上下伸清靜並無生愛念醉來舞袖復尋眞全眞堂堂名名號號全眞寂正逍遙子細陳豈用草茅遮雨露亦非瓦屋度秋春一間閑舍應難得四假凡軀是此因常蓋常修安在地任眠任宿不離身有時覺後尤寬大每到醒來愈愛親氣血轉流渾不漏精神交結永無津慧燈內照通三曜福注長生出六塵自哂堂中心火滅何妨諸寇積柴薪吕公求指訣禮念焚香作福山不干入道道中玄外邊假合開中寶裏面眞人認得賢處處無心爲煆鍊家家有性現精研一條白線堅還潔一粒金丹瑩又鮮兩路相隨成曲調雙關共透顯詩篇蓮花出水騰顏色葉葉分明是箇仙文山程法師問內事從來分得三光秀撲入凡軀土底攢結性不能超造化於身偏會做饑寒如通須是搜元有要見還應只內觀莫泥水升兼火降休推虎遶與龍蟠神精氣住超雙闕日月星旋做一團便是修行眞捷徑碧霞裏面滚金丸修行下關牢固火能然雅氣無侵漸至堅一九住時添秀麗二關通後得完全旣能已結成初有復透中間認始先直要眞清眞寂靜更令沒染沒縈牽須臾溉濟同相見頃刻沖和共自傳穩坐明堂拈寶炷復遊金洞赴瓊筵飢寒脫了堪來往生死捐除會倒顛有箇青童持紫詔請公永永伴神仙述懷慧刀磨快劈迷蒙剉碎家緣割已空火焰高焚端子午水源深決潤西東上中下正開心月精氣神全得祖風旣見舊時親面目更無今日假英雄五重玉戸光生彩一粒金丹色變紅自在眞人歸岳頂手擕芝草步蓮宫茶言湯語是風哥芝草閑談果若何不可人前誇了了須知物外笑呵呵赤龍攪海添離水紫焰安爐養坎河木馬還能從水虎金翁須是娶黃婆汞鉛亘昔交加作兒女今朝嬰姹多坐客同歸迴首度教君也得出高坡和傳長老分茶坐間總是神仙客天上靈芝今日得採時惟我識根源碾處無人知品格塵散瓊瑤分外香湯澆雪浪於中白清懷不論死生分爽氣每嫌天地窄七椀道情通舊因一傳禪味開心特蕩滌方虛寂靜眞從兹更沒凡塵隔和玉長老古調慧觀緣空絕昇沈瑞氣杳裊開遙岑此地常過三山客往來相隨九臯禽重樓清泠灑甘雨洗滌自沒凡塵侵神水撞透紫金窟瑩瑩寶洞尤邃深洞前古柏青且緑狀若月中蟾部林樹下問祖西來意口不言答提裾襟旣已彼此聰明了定中達達那搜尋無身無爲亦無漏勿論實腹并虛心教君一通曉這箇八脈嬰兒纏錦衾有誰能令胎仙舞唯我三疊鳴心琴五言律詩早行正做眞間客前程道路通長途無曉暗促步任西東誰識中宵月獨知半夜風爲行平等會不與利名同詠甯海軍甯海軍中景清虛道富豪依山知飲淺近水覺居高善膳能滋味仁人得遇遭迴光通返照相從喫蟠桃了了修行慧劎空中舉光芒射太虛勦除馬院箒斬斷水鄉蕖兔苑金花綻雞官玉蘂舒黃輝白耀顯此箇是毗盧遊香嚴院鍾韻知金吼魚音聽木聲火靈香炷引水住寶瓶盛四事誰能悟三乘教愈明達斯玄妙理便是證圓成僧淨師求修行依旨念彌陀清凉氣候和要全三曜照須認六波羅般若常令顯菩提每見多眞如應得悟歡喜出娑婆述懷一箇好門兒關關善護持金童齎玉鎖玉女捧金匙閉後無人見開來只自知常常扃與闢出入紫靈芝要見菩提相應當識蜜多結成三藏寶顯現六波羅物物無頭腦般般有腳窠介然通穎脫玉液潤金波氣壯神清爽心閑性逸安重樓傳玉液雙闕鍊金丹了了通三道圓圓做一團不無紅焰迸兼有紫光攢這箇爲根本靈光要至誠搜窮物外景滅盡世間情四序傳中氣三光在上明如通顛倒法何慮不圓成道在性長在身愁心不愁黃芽徧地長白雪滿園收姹女尤歡喜嬰兒最樂優刀圭第一法此外更何求會步修行路應先上寶臺仰瞻超廓落俯看免輪迴清淨眞靈現玲瓏慧眼開須憑顛倒法怎得倒顛來五言長篇上登州知州方面蓬萊路朱旛喜色通車行行德雨扇動動仁風前擁雙旌貴旁馳萬騎雄栽棠齊召伯闡化類文翁政治靈光顯言尊性理融位登槐府後應與我心同述懷功成王四父風害第三孫瞥地迴頭處認得自來惛擘開眞道眼跳出是非門已作空中客那爲地下魂名山三座總好景四時温物物非非是非非是勿論眼暗耳雙聾明聲總不通勸伊休唱喏舉事便和問不去欽賢聖何勞重害風般般俱是妄物物盡皆空妻女千斤鐵兒孫萬秤銅怎知投黑暗尚自騁般紅惡業常穿積良因怎得蒙身邊誇體段心下若飄蓬幾箇知元本何人憶祖宗肯憂歸地府曾話上天宫只會貪財色無非滅視聰如行平等意走入五花叢藏頭七言長篇繼贈王子容都院此華宗字子容風雅頌好相從端錦綉塵凡物馬豬羊世俗蟲是九條蠲出戸爲三箇趕離胸生寶璧開心曜迸丹丸壯腎宗祖若知通造化神稍悟得和邕中莫戀超三境底休尋上二峯舉崑崙山頂現聞林屋洞天封光返照元初路下方堪擊玉鐘
