front:
  text: 重陽全真集卷之七枝七
  hash: sha256:d126cf2b2c21a94f7302ae6c293d7dcb92a900c6c2e4f8a14b79d70d2e6e755b
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_007-001a, image: hfl/0794/0794-056.png}
body:
  text: 終南山重陽子王嚞撰詞解佩令庵中住坐塵勞越大貪米麵看待經過赳杖按刀磁碗五瓦盆箇匙筯杓甑沒堆垛掃田刷釜點燈遏火入門關出門安鎖本要清間被許多日常殃我難為駕五色雲朵轉調醜奴兒苦苦勸愚人被財色投損精神利韁名鎖休貪戀韶華迅速如流箭不可因循早早出迷津樂清間養就天真性圓丹結方知道蓬萊異景元來此處别有長春令贈馬鈺扶風宜甫聽余教旨你從前入道未是終有洪禧舊交朋陸山復至一一須聽他玄理山頭休去此中居止兼乞覓庵糧便利直待盈盈恁時節同將師禮住十洲大家歡喜如論性命須搜夕晝光眀照有甚肥瘦日月西遊當中斡樞機北斗天花綻異香無漏空空皆出虛虛盡透清凉處逍遙交媾自在躋真輕飆外任飄精秀聚雲朋更兼霞友又茶肆茶無絶品至真茶無絶品至真為上相邀命貴賓來往盞熱瓶煎水沸時雲翻雪浪輕輕吸氣清神爽盧同七碗喫來豁暢知滋味趙州和尚解佩新詞王害風新成同唱月明中四人分朗又愛看柳詞遂成平生顛傻心猿輕忽樂章集看無休歇逸性攄靈返認過修行超越仙格調自然開發四旬七上慧光崇兀詞中味與道相謁一句分明便悟徹耆卿言曰楊柳岸曉風殘月菊花天此藥神功别有歡專醫性命完全名唤紫金丹服之一粒永保康安寶結三田搬運過明珠透出泥丸五彩九霞光共至竝攢捧入仙壇又風此藥神功别有華專醫遍體頑麻下事是三家不拘溫酒選甚鹽茶服了便令筋骨换亦教結就丹砂頓覺神清氣爽最嘉最嘉步步雲霞又眼此藥神功别有名專醫兩目多情一點變澄清自然仰面認得前程更用金篦輕掠刮便教换了塵晴觀俗緣空朗照至精至精三輝騰明又嗽此藥神功别有情專醫肺裏謳吟治正水中金教公免了分外聲音傷重寒風并熱冷五般無復重侵節色減財攝養古今古今性命來尋又食此藥神功别有方專醫五臟膏肓一服下隨湯即時傳透便得安康更使真玄推妙訣諸公子細消詳養氣全神保固壽長壽長永處清凉卜算子妙覺寺僧索妙覺證慈悲便入菩提路日日常開方便門慧照生靈炷坐雪釋迦尊面壁達摩悟觀此在緣行果成兜率天堂住前後各帶喝馬一聲信任水雲遊欣放靈猿傻要去隨霞恣害風乘良馬穩坐香羅帕南北與東西選甚高和下處處來回得自如呈弓馬會把明珠射一匹好驊騮精彩渾如畫却被銀鞍縛了身著絆馬怎得逍遙也不若騁顛狂掣斷無挂擺尾搖頭廄櫪違做野馬自在遊冶此箇真真也瑩徹靈靈也出入虛無縹眇間騎風馬信任飄颻也占得惺惺也光輝明明也來往晴空碧落中乘雲馬自在逍遙也趕退日中烏捉取月中兔便著晶光覆了身金馬住方是重陽做交位顯真功换質成真趣到此還知自在遊玉馬去走入雲霞路前後各帶唱馬聲尋知友有箇害風兒海上尋良價只為心頭忒緊圖意馬隘惹出渾身疥款款細搜求日月年時賽遂得中央四寶珠祿馬快走入關西界卜算子開門了化出馬鈺你待堅心走我待堅心守百日扃門化出來方是余開口開取四時花綻取三春柳認取元初這箇人共飲長生酒卜算詞中算卦象分爻彖海島專尋知友來堪把扶風唤莫怪頻磨難只要分明燦决定堅心沒惱愁永結長生伴又雪中作誰識這風狂誰識斯三嘉恰遇炎蒸得清凉正寒也成溫熱因仰至人言遂獲真仙訣九九嚴凝花正開三伏中却下雪又歎世迷堪歎世間人誰肯望天覷北斗南辰日夜移飛走烏和兔恁地被煎催尚自生貪妬忽日酆都勾你來著甚詞因訴修鍊不須忙自有人來遇己與白雲結伴儔常作詞和賦靜裏轉恬然歡喜回光覷一箇青童立面前捧出長生簿漁家傲跳出凡籠尋性命人心常許依清靜便是修行真捷徑親禪定虛中轉轉觀空迥認得祖宗醒復醒紅紅赫赫如金定漸漸圓明光又瑩通賢聖無生路上長端正又兄去後贈姪元弼元佐元弼前來并兄佐尊親遞儹還知麼昨日笑兄心轉破休摧挫後番决定安排我這箇傳來唯這箇輪回生死如何趓棄墓趖墳離枷鎖除灾禍無生路上成因果誰識王三能買賣道心堅處難為退每把三光頻頂戴頻頂戴擘開世網居塵外害得風來風得㬠今朝錢覓人休怪占得逍遙真自在真自在携雲却赴蓬萊會又贈道友這箇王風重拜見珍珠水飯誠堪羡盈腹充腸白氣顯白氣顯今朝專問梨花片有說之時開一遍無言對後馨香善滿樹高高真玉現真玉現月明正照清凉院又贈寧生夫唤三郎妻九姐兩椽合得一間舍骨作檣梁皮做瓦休誇詫父娘成就伊居也兒願室家女願嫁舅姑修葺何時罷日日功錢難答謝聽余話長行孝順酬斯價又京兆道友得得中間尋得得王三默訣惟王六若要清靜如白玉獨自宿余自須要除情欲這箇靈童明似燭惺惺能唱無生曲日住公家公不識休尋覓心澄便是真消息又崑嵛山石門庵入得石門山上住弟兄手腳無安措一日三時長厮覷厨裏去搬柴運水投鍋釜若勸同流疾作做心頭一點休教誤我待分明說一句從開悟天機不敢輕彰露五更出舍郎反會做他出舍郎便風狂成功行到蓬莊奉報那人如惺悟好商量五更裏細消詳一更哩囉出舍郎離家鄉前程路穩排行便把黑飈先捉定入皮囊牢封繫任飄揚二更哩囉出舍郎變銀霜湯燒火火燒湯夫婦二人齊下拜住丹房同眠宿卧牙牀三更哩囉出舍郎最相當神丹就養兒娘一對陰陽真箇好坐車厢金牛子載搬忙四更哩囉出舍郎得清凉重樓上飲瓊漿任舞任歌醒復醉愈堪嘗真滋味萬般香五更哩囉出舍郎沒隄防無遮礙過明堂一顆明珠顛倒衮瑞中祥崑崙上放霞光認得五般出舍郎黑白彰當中赤間青黃哩囉囉㖫哩囉哩妙玄良玲瓏了便玎璫醜奴兒詠棋兩人鬥勝俱誇會路路相違子細挨依劫盡方知解了圍愚迷不曉雙關意各自藏機孰是孰非却被傍觀冷笑微又述懷鄽中有箇修行子火院難離只被推辭恁不回頭候幾恃今朝不保來朝事大限誰知可㬠愚癡直待荒郊咬齒兒昨宵獨卧冰淩道三耀常觀自在心安愈覺清凉不覺寒尾閭過來夾脊上轆轆長搬透入泥丸返老長生别有歡曹溪一路人難悟怎捨妍妻難受孤恓獨自眠時越越迷分明有箇長生路孰是能躋說甚東西誰肯抽身出汙泥凡人若會通三耀便結良緣搜見真玄方信虛空出大仙金丹一粒無為漏得恁精妍明瑩光圓萬道霞光簇上天如夢令寧海人人省悟此别何時再遇唯願重金蓮好把良因作做歸路歸路滿目白雲翠霧又贈縣令日日此中開宴食肉諸公總善唯有害風王莫怪頻來見面知縣知縣正好與人方便又蒙友惠詞明月古今長有怎奈華宗海口黑窟裏頭居黯暗不分夜晝吾友吾友問你如何下手楊柳枝夢悟青霄月正高射蟠桃一枝白筆得逢遭更兼刀應手詩詞隨寫染運風騷玉箋上面起雲濤任陶陶一息來時衮氣毬騁風流不來一息破胞抽這回休若要依前常建販復從頭胞兒裏面氣重收再儸僂誰識天邊一井金紫光侵朝朝日日眼前臨沒人尋惟我靜中知去處自堪任盡斤盡兩入珠林出高岑搗練子猿騎馬呈顛傻難擒難捉怎生捨哩囉㖫哩囉㖫慧刀開齊下殺教君認得根源也哩囉㖫哩囉㖫水兼火坎和離兩般消息怎生知哩囉㖫哩囉㖫休燒鍊莫修持元來只是這些兒哩囉㖫哩囉㖫搗練子害風哥一身躍出死生波哩囉㖫哩囉㖫便是逍遙真自在沒人拘管信吟哦哩囉㖫哩囉㖫用刀圭剖昏迷合和一處怎生携哩囉㖫哩囉㖫人頭落現虹霓白蓮花朵出青泥哩囉㖫哩囉㖫名利海是非河王風出了上高坡哩囉㖫哩囉㖫才候十年功行滿白雲深處笑呵呵哩囉㖫哩囉㖫三丹寶難分剖昏昏默默怎生保哩囉㖫哩囉㖫在虛空長懷抱緋衫裹子新烏帽哩囉㖫哩囉㖫踏莎行莫騁兒群休誇女隊與公便是為身害脂膏刮削苦他人只還兒女從前債悅目亭堂哀心念愛直饒鐵打堅牢㬠多多罪業自家耽一朝合眼如何戴又别家眷妻女休嗟兒孫莫怨我咱别有雲朋願脫離枷鎖自心知清凉境界唯余見步步雲深灣灣水淺香風隨處噴頭面崑崙山上樂逍遙煙霞洞裏成修鍊又自詠人被錢迷錢由人使一來一去何時已頑銅尚自有消磨凡軀著甚逃生死聞早回頭疾搜妙旨細推休道無師指腹中兩路顯然開心頭一點分明是汞裏泉清鉛中火赫倒顛澆溉傳甘澤虎聲震動甲方青龍吟唤出庚方白認正田原分門阡陌金桃親種親收摘玉童掌內任擎來瓊筵會上堪分擘大道無名害風有作踏莎行裏成歡樂因緣腳腳修鍊成蓮花步步相隨著透出清泉上衝碧落成雯結蓋須磅礴外馨接引好輝光內明照耀真丹藥不識慚惶要人津送情生念起般般動心神指引乞為緣三餐飽後休胡用豈許醫看莫交人重行符呪水良因種哩㖫哩囉囉哩㖫長隨走蓬萊玉洞又奉酬人惠氈襪余留木盔分納微誠用表相酬答百般茶飯任經營千般滋味堪嗚咂恬淡真人朴純菩薩都緣此物成超達好將鉛汞裏頭收須教盈滿休拋撒又贈友生前歲麻收去年麥覓一麻一麥傳消息左邊金餅一陽生右傍銀器純陰匿偏黨無私倒顛有則心燈朗徹緣挑剔終南街裏不遊行京東路上知端的又詠燒香身是香爐心同香子香煙一性分明是依時焚爇透崑崙緣空香裊呈祥瑞上徹雲霄高分真異成雯作蓋包玄旨金花院裏得逍遙玉皇几畔常參侍又贈友人一點靈明兩條坦路怎生下手如何做好教稽首上天堂莫令失腳遊陰府日轉金烏月生玉兔森羅萬象同躔度勸君休要泥長生恃恃牢把金精固又崑嵛山團庵做就圈模且休蓋椽諸公怎曉余方便水符不向此中行因緣已到文登縣各謹持修速歸煅鍊內容顯現親頭面如今款款漸投玄恁恃得得頻相見又燒庵數載辛勤謾居劉蔣庵中日日塵勞長豁然真火瞥然開便教燒了歸無上奉勸諸公莫生悒怏我咱别有深深況唯留煨土不重遊蓬萊雲路通來往睡裏搜尋眠中做作目矇認正恆歡樂想成三寶自神靈結成九轉真丹藥攢聚祥雲往來碧落後隨前引唯鸞鶴白光萬道繞園生紅光一點當中鑠重陽全真集卷之七
