front:
  text: 重陽全真集卷之四枝四
  hash: sha256:5d98044f25c05f71f84cde84a9155d82ccea25383f3900bc40934a036f38aabc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_004-001a, image: hfl/0793/0793-150.png}
body:
  text: 終南山重陽子王嘉撰詞南鄉子物物要休休打破般般是徹頭認得本來真面目修修一箇靈芽穩穩求火裏好行舟焰裏白蓮素臉幽馥郁風前通遠迥悠悠透過青霄得自由又誡人禮拜堪歎這頑夫空恁區區用力粗五體相逢投地面休愚尚自勞勞禮假軀大道本虛無玄裏藏玄妙不敷內有元光人不識唯吾日日觀瞻自吸呼物物不追求擺手行來事事休返照回觀親面目無憂自在逍遙豈有愁乘此大神舟玉棹瓊橰渡正流剔出急波俱絶盡機謀超上十洲三島遊又于公索幻化幻化色身繞電腳餘光水面泡忽有忽無遄速甚如飆過隙白駒旋旋飄何不悟虛囂早早回頭養玉苗苗上金丹光潑潑彰昭透過雲衢入碧霄又邵公索要下手修行我命不由天熟耨三田守妙玄甘雨澤深先布種金錢遍地黃芽最色鮮養就玉花蓮葉葉分明水水堅瓊蘂被風吹撒動香傳一道靈光任自然又風琴妙手喜新成十六條絃别有名挂在宫中雲外路風迎便許能招自己聲不入俗入聆占得仙音講道經唯我傍邊全善聽叮嚀携爾蓬萊在玉庭小重山喻牛子堪歎犢兒不唤牛性如湍水急碧波流只知甘乳做膏油長隨母擺尾搖頭漸漸騁無休奔馳山谷路入溪溝未從韁絆恣因由貪香草怎曉虎狼憂堪歎寰中這隻牛龍門角子穩騁風流身如潑墨潤如油貪鬥壯牽拽不回頭苦苦幾時休力筋都使盡卧犁溝被人嫌惡沒來由間水草難免一刀憂刮鼓社刮鼓社這刮鼓本是仙家樂見箇靈童於中俊俏自然能做作長長把玉繩輝霍金花一朵頭邊爍便按定五方跳躍早展起踏雲腳早展起踏雲腳會戲謔正洽真歡樂顯現玲瓏玎璫了了遍體纓絡遂引下滿空鸞鶴迎來接去同盤礴共舞出九光丹藥蓬萊路有期約蓬萊路有期約恨歡遲名哲排三本姓王字知明子號重陽似菊花如要清香吐緩緩等濃霜學易年高便道裝遇淵明語我嘉祥指蓬萊雲路如歸去慢慢地休忙山亭柳急急回頭得得因由物物更不追求見見分明箇把般般打破優遊淨淨自然瑩徹清清至是真修妙妙中間通出入玄玄裏面細尋了了達冥幽穩穩拈銀棹惺惺駕大法神舟速速去超彼岸靈靈現住瀛洲武陵春天地唯尊人亦貴日月與星臨道釋儒經理最深精氣助神愔四箇三般都曉徹丹結變成金衮上明堂透玉岑空外得知音甘草子塵所不肯修行箇箇貪歡聚轉轉戀榮華怎肯將心悟直待陰公教來取便急與相隨去早被兒孫送歸土金玉誰為主迎仙客或曰既是修行因何齒落髮白答云我今年五旬五尚辛苦為收穫耳五旬五過半百諸公把我頻搜索眼如遮耳如聞口中齒豁頦上髭鬚白外容蒼內容黑金花地上真粟麥稈兒釤穗兒樀三車搬過便是迎仙客惜芳時諸公學休胡别且莫放猿顛馬劣間中認得玄機設無言説自然歡悅淨清便把虛空拽待問你不生不滅答言功行須交徹有真師分明來接甲龍入火分明看庚虎在水中遊玩往來相送同為伴自然是兩家拘管善能調養成片段裏外更使成交换空中有箇青童唤恁時節一衝霄漢點絳唇先生鎖門及十旬將啓户又以梨一枚割做十分與馬鈺夫婦二人食之既啓户了唯鈺捨家緣做弟子至此耳又以詞贈之十化分梨我於前歲生機構二人翁母待教作拏雲手用破余心笑破他人口從今後令伊依舊且伴王風走俊蛾兒勸吏人見箇惺惺真脫灑堪比大丈兒莫睎燈下俊蛾兒壞了命兒早早回頭搜密妙營養姹女嬰兒道袍换了皂衫兒與太上做兒做兒南柯子白鷺江心立烏龜水底鑽紅雞翡翠竹間攢四件將來鍋內鍊成丹五味調和美重樓信任餐充盈六腑得寧康養就真神跳躍入仙壇會歎風中燭能嗟水上漚一生一滅幾恃休恰似輪回來往業淪流知有驢和馬非無騾與牛等間撲入怎抽頭幸得人身急急做真修夜遊宫身向深山寄寄步青峰恣情如意冷即草衣慵即睡餐松渴來後飲緑水養就神和氣自不寒不飢不寐占得逍遙清淨地樂真間入紅霞翠霧裏江神子虛中空外認盈盈喜前程看分明占得真堅慧照助新聲五座門開通出入任來回好遊行高峯上便縱橫結雲棚勢崢嶸衮出靈光一點似朱櫻彩色般般籠罩定處清涼永長生賀聖朝修行須是身衣布受寂寥餐素道心不與衆心同絶憂愁思慮內中認取金為聚并開明玉兔赤鸞抱住黑龜精這些兒誰悟長思仙鄒公問識心見性莫哦吟莫追尋這箇玄機奧最深如何識本心好鈐擒好登臨明月孤輪照玉岑方知水裏金蘇幕遮滕奇放龜此神龜深謝放厚德深恩杳杳冥冥廣毛寶當時還岸賞答報於公别有明明相戲金蓮通揖讓千載遐齡就壽增嘉況返顧精神添瑩朗一氣煩公送到雲霞上又秦渡墳院主僧覓善看經能禮懺金面胭脂正好頻頻蘸轉轉殷紅紅不淡色裏全真真裏成清湛仗鉛刀擊汞鏨劈暗鑿昏迸出銀霞艷萬道霞光攢一點般若波羅得得無增減莫端身休打坐擺髓搖筋噓咽稠黏唾外用修持無應和贏得勞神枉了空摧挫要行行如卧卧只把心頭一點須清破返照回光親看過五色霞光覆燾珠明顆五臺峰三耀剎八識俱明四象靈光匝羅漢回頭看菩薩佛杲圓成這裏無言答證虛無騰可恰清淨全扶澄湛尤相洽休衮神珠分等甲彩色傳輝再現黃金塔又寄與談哥唐哥訓人人休碌碌搜尋密妙長修福慧慧明燈參性燭謹謹營軀食食牟平祿拜風風為叔叔兩兩姪賢莫戀余相逐切切依從新格曲了了唐琳達達真談玉又贈京兆藥市銜趙公趙公邀喫水飯顆顆珍珠粒粒靈芝蔓食就圓明生園苑開闡瓊花不作凡軀楦合三光分四憲壯起精神寶鼎童兒健五色霞光同一建此則充盈得得平生願又勸化醴泉人醴泉人都作善急急光陰似水還如箭榮貴虛勞休自羡四假凡軀恰似蠶知緣各縛纏誇做繭裏了真靈直待鍋兒煎這箇王三行方便不信之時不見害風面又勸化諸弟子兄弟悶安腳手擘破微塵跳出三山口月出東方日入酉焜耀明星三箇相隨走氣傳清神運秀兩脈通和真行真功就衝上晴空光猛透方顯無為始見歸無漏又贈京兆府王小六郎這仁人忒伶俐問我修行便出非常意怎奈時間家事纍更有一般妻子應難棄勸明公休出離日爇名香謹把三光貴萬事心懷方便起歲舉時臻也到雲霞裏又勸修行莫行功休打坐如要修持先把心猿鎖黑氣收歸無漏破慢慢升騰保養靈真麼姹娘嬉嬰子卧搬上中田總向明堂過折得白蓮花一朵携去虛空放出珍珠顆又勸同流教門人聽我告清涕稠津喫了成虛耗五穀滓餘難化造恰是隈𨻵惹甚間煩惱會修行知顛倒别有一般滋味天然好神水華池通正道灌溉丹田指日歸蓬島又贈打車木無情生有作都被良下妙手成軀殼黑犢黃犍惟挽索牽入紅塵難免輪回腳靜中忙間裏作怎得逍遙自在真歡樂直待白牛來跳躍一朵蓮花萬道霞光爍又勸世歎人身如草露却被晨暉晞轉還歸土百載光陰難得住只戀塵寰甘受辛中苦告諸公聽我語跳出凡籠好覓長生路早早回頭仍返顧七寶山頭作箇雲霞侣望蓬萊燒了庵作果有二弟子自寧海來復修蓋住重陽子物物不追求雲水間遊真得得茅庵燒了事休休别有好歸頭存基址決有後人修便做玲瓏真決烈怎生學得我風流先已赴瀛洲又醴泉覓錢醴泉好偏愛養貧兒為破殫虛華業余從捉住傻猿兒無女又無兒街兩面願助小錢兒同共買成金麥飯三恃喂飽鐵牛兒耕種老嬰兒真大道能結坎和離認取五行不到處須知父母未生時此理勿難知須速省下手便修持上有三光常照耀中包二氣莫分離採得玉靈芝修鍊者須要覓前程窈窈冥冥除我相昏昏默默絶人情真裏正中貞方曉悟間至淨中清物物般般都打破頭頭腳腳便分明圓曜自然成修鍊事子細好鋪陳外做四肢安樂法內觀五臟倒顛因便是得全真堅守定營殼要申申二氣合和開本性三田搬運助靈神只此唤仙人真大藥要見甚昭然二氣包囊三疊妙雙關封鎖九重玄自曉豈相傳古仙頌兩句最精研凡骨渡河誠用筏聖功到岸不須船越越害風顛猿馬住性命自然知一粒刀辛開四象兩般鎗法殺三尸神水溉華池公看取便是坎和離土馬赳回金虎子鐵牛耕出玉龍兒方見遇明師真鍛鍊驅惑去迷昏踏碎月明通正路劈開風景入玄門方顯道家尊無把捉一點出崑崙復住空中超造化得歸物外越乾坤那論若亡存重陽子飲水得良因洗滌塵勞澄淨至灌澆根本甲芽伸兹養氣精神恬淡好甘露味投真滴滴潤開三教理涓涓傳透四恃春流轉一清新能下手便曉這元元為甚得通三一法都緣悟徹五千言立起本根源重著腳跳入水晶盤唤出那人人不識至今有自自揚掀越越害風虔回首處便要識希夷鍛鍊須將情滅盡修行緊與世相違勘破是歸依蟾玉走認取箇金飛交位東西通地髓沖和上下合天機方得妙中微修鍊者四事倒顛論地水火風應化去色聲香味怎生存方是顯良因全得得窈默與冥昏慧性來回清淨路真靈出入妙玄門空外九光渾真大道滋味不相饒明月光中騰瑩瑩清風飆上出乞乞從此見芝苗無狹闊又豈有迢遼圓現圓成成自在一能一得得逍遙方顯見彰昭鶯啼序鶯啼序時繞紅樹應當做主騁嚶嚶瑩瑩聲音弄晴調舌稱羽潛身在朱林茂處愈綿變百般言語喜新鉛新汞俱齊叫歸宗祖唤覺呼惺頓曉本元初天然規矩定分他甲乙庚辛九宫八卦門户驅四象通推七返用千朝鍊成文武這金丹由此三年漸令堪覩嬰兒跨虎姹女騎龍白雲招翠霧各各擎鋼刀慧劍接刃交鋒隱密藏機兩家無懼為龜赤鳳前來降伏和合罷戰休兵戍被靈童結搆同相聚從兹慢慢搜尋寶貝完全要見便教知數明珠萬顆吐出神光倒顛籠罩住迸一條銀霞裊裊撞透清霄晃耀晴空遍開瓊路中間獨現真妙真玄星冠月帔端嚴具把雙眸高舉頻回顧觀瞻了了清清湛湛澄澄害風得遇啄木兒觀浮世為人貴舍榮華全神氣保養丹田絶滋味便將來免不諱自諳自諱修取長生計自誓自誓今朝説子細且通邊際開靈慧酒色財氣一齊制做深根永固蒂怎生得虎龍交位如何令姹嬰同睡把塵勞事俱捐棄三道合和歸本類想玄玄尋密祕自行自行見性不用命自惺自惺黑飆先捉定使倒顛併唯堪詠兩脈來回皆吉慶辨清清與靜靜烏龜兒從兹警省放眼耀光明焕炳恣水中遊濤間逞望見赫曦山上景轉波恬又浪靜自住自住離宫受坎户自悟自悟汞中建鉛庫好頻頻顧長相覷上下沖和知去處漸漸入雲霞路赤鳳兒飛來振羽飲盡烏江見水府與神為主作宗祖只把刀圭長安撫方能教子伴午自坐自坐木上見真火自哿自哿從前沒災禍雨東方妥誠堪可潤葉滋枝成花朵結團團寶珠顆翠霧騰空外遍鎖白露凝虛上負荷换搆交睡同舒他性命方知無包裹不由天只由我自卧自卧西方憩息麼自佐自佐靈臺聚真火發庚辛課相應和物物拈來都打破元來現此一箇跳出後無小無大敲著後不剛不懦便却如這音聲那響喨玎璫明堂過遇玲瓏共慶賀自知自知只此分明是自此自此得一並無四在虛空裏撒金蘂萬道霞光通表裏復元初見本始要鍊正靈真範軌更不用木金火水把良因壘從心起方寸清涼無憂喜證長生並久視重陽子害風是王哲名知明字説修行旨沒虛詭啄木詞中開真理向諸公取知委重陽全真集卷之四
