front:
  text: 重陽全真集卷之三枝三
  hash: sha256:c7773e8ce3a535070503d626f42275c618c548b83363f6eb75161f91a45977e0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_003-001a, image: hfl/0793/0793-114.png}
body:
  text: 終南山重陽子王嘉撰詞黃鶯兒堪嗟浮世如何度酒色纏綿財氣沈埋人人都緣四般留住因上上起榮華節節生迷誤總誇伶俐惺惺各鬥機關皆結貪妬今古幾箇便回頭肯與神為主任從猿馬每每調和無由得知宗祖唯轉轉入枯崖越越投深土大限直待臨頭難免三塗苦心中真性修行主鍛鍊金丹津液交流澆淋無根有苗瓊樹常灌溉潤瑶枝密葉黃鶯語瑩靈聲韻明眸正覷嬰兒兑方騎虎堪訴姹女跨青龍四箇同歸去本元初得靜裏還輝回光使胎仙舞應出上現崑崙得復蓬萊處我不妄想雲霞鸞鶴天然與花心動緊鎖心猿悟光陰塵凡百年遄速下手頓修元本真靈此日要除骸屋居家坑塹先須跳將身己便令孤宿靜無觸氣財色酒一齊隳逐俗景般般絶欲要捨盡爺娘共妻骨肉自在逍遙落魄清間認取裏頭金玉瓊英瑶蘂花心動放香味滿空馥郁異光簇祥輝結成九曲玉堂春得得修行能令捷徑走子午俱無何須卯酉只用兩珍於余堪厮守鉛汞從教結作毬恁則成丹般般盡總透擺正真風名傳不朽搜出元初那箇為的友到此方知是徹頭又鎖門玉性金真人人皆可化玉液金丹頻頻迎迓玉兔金烏光光相次亞照玉欄干種玉芽瓊蘂金莖長長生不謝玉女金童常常看舍玉鎖金匙門門開闢下賞玉堂春對玉花有箇王風時時頻睡卧無夢無眠無災無禍白虎青龍自然交媾過水火相逢上下和這箇因緣元來真打坐試問諸公應還會麼似我修待交君得功課不在勞形苦已多驀山溪贈文登縣駱守清守清守淨各各開明性兩兩做修持你箇箇心頭修省虛虛實實裏面取炎涼尋自在覓逍遙漸漸歸禪定教言教令一一須當聽急急上高坡便穩穩尋他捷徑玄玄妙妙子細認天衢行得正立來端步步蓮花並又于公索神龜詞洪波浩浪澄湛源流遂此處隱神龜敢吸盡西江大水任眠任睡喘息幾曾聞能服氣會吞霞自在長遊戲異光殊彩迸出真祥瑞火焰正炎炎便走在當中取利任燒任烙旋旋聚清涼能曳尾會搖頭獨上白蓮蘂又歎驢兒驢驢模樣醜惡形容最長耳觜偏大更四隻腳兒輕快肌膚粗僂他處不能留挨車買更馱騎拽遍家家磑任鞭任打肉爛皮毛壞問你為何因緣箇甚於斯受罪忽然垂淚下語向余言為前世忒曉蹊欠負欺瞞債换骨骰歎脫禍不改過昨遇飢年為甚纍增勸教怎奈向人人忒越貪心生狠妬百端姦巧計較騁風流賣俏也兀底忽爾臨頭却被閻王來到問罪過諱無談矯當時間令小鬼將業鏡前照失尿和骨骰軟了也兀底幼慕清間長年間便登道岸上高坡細搜修鍛遇眀師授祕訣分開片段堪讚真性靈燦燦也兀底功行雙全占逍遙出塵看玩覩長天化成仙觀向雲中有一箇青童來叫唤風漢凡骨骳换换也兀底又歎貪婪嘆彼人生百歲七旬已罕皆不悟光陰似箭每日家只造惡何曾作善難勸酒然財氣戀也兀底福謝身危忽爾年齡限滿差小鬼便來追唤當時間領拽到閻王前面憨漢和骨骰軟軟也兀底又贈道友王十四郎一斬紅崖按闊狹方能及丈橫梁架細如稈杖在中間誰做下柴窩圓樣被拉浪裏面把龜兒放也兀底擬欲前行恐失腳怎生敢向退後來全無抵當謾搖頭空擺尾萬般惆悵轉悒怏和殼兒軟脹也兀底水雲遊思算思算四假凡軀干甚厮玩元來是走骨行尸更誇張體段明靈慧性真燦爛這骨骰須换害風子不藉人身與神仙結伴又鎖門且住且住十月小春當宜鎖户一百日鍊就重陽也並無作做渾身要顯唯真素挂靈明紙布信任他走玉飛金自恬然不顧又韓公索歎世且聽且聽汨汨塵勞如何得醒女男是玉杻金枷把身軀縛定百年韶景風燈影怎留他光瑩早悟斯疾速修行永完全性命玉性玉性玉鎖緊嚴金關牢釘玉房深百日清清玉輝光一併玉匙開闡通仙徑玉門中傳令玉童來便許全真玉皇宣已定玉女搖仙佩終南一遇醴邑相逢兩次凡心蒙滌便話修持重談調攝莫使暗魔偷適養氣全神寂稟逍遙自在間間遊歷覽清淨常行穴迪應用刀圭節要開劈三田會明靈結作般般光輝是績先向天涯海畔訪友尋朋得箇知音成閴直待恁恃將相同步處處嬉嬉尋覓暗裏瞷瞷檄覷你為作如何鋒鏑會舉箭張弓對敵百邪千魅戰回純晳無愁戚方堪教可傳端的御街行玉芝一味通賢聖這藥治真靈性虛空臼內穩鋪排金剛杵搗成精瑩摩訶般若蜜多和鍊熟後搓為鋌大悲千手丸來正太陽火烹炮定堪宜下使用黃芽八瓊水共煎清淨從兹服了得長生便永永成功行燭影搖紅燭影搖紅暗垂珠泪如言語無情本不起斯因轉使余頻悟勸汝何須憂慮已當日終南遭遇拂開眸目剔正心神東臨瓊路占真間水雲遊歷成霞步天涯海畔是前期此處堪停住等候明明師父闡玄妙長生門户彩霞光裏現出蓬萊相隨歸去八聲甘州處清涼界迥然間别開一家風得間間間裏真甜美味甘露應同洗滌三焦六腑五臟盡玲瓏流轉無凝滯顛倒皆通白氣充腸盈滿助起初本有唯要深窮待時時分朗來往識西東恁方知惺惺容貌這般形狀出高穹圓成顯放光明照永住晴空紅芍藥這王哲知明見菊花堅操便將重陽子為號正好相倚靠每常却要綴作詩詞筆無停自然來到心香起印出仙經便實通顛倒便實通顛倒早得得良因速推推深奧玄玄妙妙任窮考又更餐芝草白氣致使上下盈盈金丹結鍊成珍寶恁時節永處長生住十洲三島住十洲三島留客住但人做限百年七旬難與奪名爭利強恁徒勞辛苦金飛玉走催逼老死還被兒孫拖入土余今省悟捨攀緣愛念一身無慮歸去雲水長遊清間得遇識汞知鉛氣滿精牢神聚金翁却期黃婆匹配能養嬰兒姹女刀圭足數又蓬萊客至上仙留住酹江月正陽的祖又純陽師父修持深奧更有真尊唯是叔海蟾同居三島弟子重陽侍尊玄妙手內擎芝草歸依至理就中偏許通耗至今自在逍遙金丹傳得一點靈明好皆出幽微俱助正本有清虛顛倒復住晴空還居杳邈此事成須到將來去後恁時公等知道本初面目稟三光精秀分來團聚得得成形唯自在應占逍遙門户一箇靈明因何墮落撲入凡胎處輸回販骨幾時休歇停住搜獲虛幻身軀榮華富貴莫也非堅固頓悟如如緣合後深謝真師垂顧祕訣親傳依從做徹達了憑遭遇雲朋霞友並歸蓬島瓊路摸魚兒嘆骼髏卧斯荒野伶仃白骨瀟灑不知何處遊蕩子難辨女男真假拋棄也是前世無修只放猿兒傻今生墮下被風吹雨浥日晒更遭無緒牧童打余終待搜問因由還有悲傷那得談話口銜泥土沙滿眼堪向此中凋謝長曉夜算論秋冬年代春和夏四時孤寡人家小大早悟便休誇俏騁風雅戚氏凍雲昌出入繚邈遍舒張直上玄凝滿空濃密現嘉祥六花妥瑶芳輕飛緩舞恣飄揚須臾漸漸俱縞物物因迹盡均粧選甚高下那拘遙迥一同不辨偏傍更新鮮潔靜添素加彩增至輝煌唯覩晃養無方應是瑞氣接引在中央成佳致自然盈尺歲稔時康顯青蒼間點碧漢雲歸片段日放晶陽任溶任聚正是流酥獨許仙客堪嘗淡味偏能好渾如這玉液與瓊漿細想雖無馥郁便深宜寂暗藏香别生景趣盈盈再騰妙妙靜裏開真相復作冰為寶玲瓏狀風剪剪聲韻璫璫夜靜來轉覺嚴涼運星斗皓月豈尋常最相當處明明瑩徹返照交光拋毬樂此來玄化塵世搜獲藏善忽長天嘉氣瑞瑞雲浪滔滔暫然敷遍聚靉靆濃結成雯漸淅瀝文橫飛霰廣布列列嚴凝凛凛寒威拋擲真堪羡似玉英瑶萼瓊花璧屑也知都被風刀細剪撒迥遙輕舞任他頒形如鋪練最均平同色寧辨上高下低深淺正比賢聖慈悲盡施救普與行方便奈晴空開日曜返照消殘舊面又還復故元醜般般皆見福薄分微重業目迢遮了重重現勸汝悶急急捨彼就斯回頭總願修持煅鍊功行兩雙全誠遠勝六出時間顯麼則好歸十洲清選沁園春自問從初少年如何每每所為好細尋重想當時做作恐違天地或昧神祇及至如今恁貌顔將耄限盡臨頭著甚醫還知否有聖賢三教莫也堪隨閴中認這慈悲更長爇名香寢見知把淨清靈密耀明顯一齊速鍊下手修持口印金科心傳玉訣舊業除消誠未遲搜前路得歸依玄妙證道無疑王哲惟名自稱知明端正不羈更復呼佳號重陽子做真清真淨相從相隨每鋭仙經長燒心炷水火功夫依次為堪歸一處閴然雅致有得無遺偏宜用坎迎離聚珍寶成丹轉最奇結玉花瓊蘂光瑩透頂碧虛空外捧出靈芝定作雲朋決成霞友自在逍遙詩與詞盈盈處引青鸞彩鳳謹禮吾師玉蝴蝶捉住玉山赤鳳神舟同泛激浪漂浮便使烏龜開口顯出嘉謨吸洪濤枯乾北海吐巨波澆溉西湖自舒敷水紋花面皆是金鋪光珠盈盈照耀恰如明月晃晃方隅普遍騰輝盡成霞彩覆環紆見圓珠深深漸現結寶丹空外超踰得瓊途大羅天上永永惺蘇南鄉子好紙造成鳶占得風來便有緣放出空中雲外路無邊休戀椿兒用線牽端正莫教偏仰面人人指點賢從此逍遙真自在如然斷却絲麻出世纏永遇樂抽文契失笑王三元當幼小典了身體直至如今四十八上方是尋歸計獨擔辛苦為誰歡樂決要撿抽文契這工錢不曾取過從前並無綰繫鋭然走出沒人拘管欣許深根固蒂水畔雲邊風前月下占得真嘉致惺惺了了玲瓏清爽復入爛銀霞際一團兒紅炎炎就中妙細正好回頭堪當下手搜尋密妙此箇圓成無教沈溺須是令分曉火坑休認凡籠莫入兩事鋭然先跳惺來後嬴取三光時時頂戴長照靈明一點常隨五彩九轉便通關要透出崑崙瑩傳清淨朗聽金雞叫月華輝耀星生盈滿此處玉花香裊得玄玄玄裏真宗這翻了了永龍吟若修仙子圓成永真誠做他上士明明了了惺惺灑灑搜尋妙旨決烈回頭是自不肯拖泥帶水便斬釘截鐵塵緣悉屏無罣礙做清泚得長生久視更盈盈行功齊至頻頻囑付一靈耀金光早起五彩同如此相扶助入丹霄裏有青童接引前來迎迓執瓊瑶蘂川撥棹酆都路定置箇凌遲所便安排了鐵牀鑊湯刀山劍樹造惡人有緣覷造惡人有緣覷鬼使勾名持黑簿沒推辭與他去早掉下這尸骸不藉妻兒與女地獄中長受苦地獄中長受苦蓬萊路顯自在逍遙所現長生景瓊花玉葉金枝寶樹作善人得觀覷作善人得觀覷童子青衣掌仙簿行功成上升去結就一粒金丹深謝嬰兒姹女永不遭三界苦水不遭三界苦調笑令調笑説玄妙姹女嬰兒舞跳青龍白虎搖交叫赤鳳烏龜鐇繞驀然鼎汞召性命從兹了了山峭日光照碧漢盈盈圓月耀森羅萬象長圍罩一道清風裊裊真靈空外天皇詔住在蓬萊關要晝夜樂便把户門安鎖鑰內中更藴奇略安爐竈煅鍊金精養元神修完丹藥一粒圓成光灼灼虛空外往來盤礴五彩總扶持也無施無作冥冥杳杳非投託占盈盈赴盟約蓬萊路水結前期定長春瑶英瓊萼等接清涼光遍爍放馨香自然雯作裏面禮明師現真歡真樂又鍾公云鏡能照他人不能照自百鍊青銅圓又小平平正吐靈耀向人前相對相觀别辨容顔分曉好醜媸妍并老少塵凡一齊勘校彼此假中來怎生通內貌别有輝輝親密要焕心鏡主玄妙偏能會顯古騰今又能鑑從前虛矯艷艷光輝宜自效把當初性珠返照裏面得全真永明明了了瑶臺月違終南山携雲放肆投間路清風明月長載回光返照瑩徹澄波青黛髣佛裏遠望嘉山靜至收歸寧海前生約今生在遇明了便明對相愛熙然景致頤然聚會這箇密妙堪賽內外須常常頂戴香煙起盤裊盡成雯蓋每從依仙伴同遊定處看霞軒神憑三曜通三昧論交友交泰無礙靈明一點逍遙自在修行便要尋捷徑心中長是清淨搜摧妙理認取元初瞻聽四象內只用澄鮮湛湛源流端正探深奧觀遙迥戴三曜依三聖功併仍兼行滿俱憑悟省玉潤金鋭光瑩吐彩艷重重永定靈明現圓相一團紅映向虛空冥香騰輝在物外悠悠能整從來性本來命歸雲路出山頂堪慶蓬萊島遣青謹請滿庭芳劉公問貴賤今世豐華此生貧窘算來總是前緣榮枯好醜無黨亦無偏只在靈明布種唯招召善惡相傳花開謝開為福地謝是禍心田英賢如速省時臻命至減勢藏權若能還使盡却復如然好把根源取正休著染也莫孜煎推真妙不論貴賤便是大羅天又劉公索賢智慧皆全癡頑總至雨般自是殊方一能明哲一箇性迷荒盡是靈中分定各分别此理昭彰還知否上人九竅下沒膏肓倣徨思這事暗中積行便得賢良稍胡為做作愚戇來匡奉勸諸公速悟行平等永永清涼真誠顯唯邀本有前路趁仙鄉又於京兆府學正來彥中處覓墨毛穎歸余禇生從我陶泓三事奇塊陳玄不止尚未得相陪日夜搜神定思在何處多隱文才誰堪訪高明上士唯有彥中來渾材如見慧便教磨出雲浪恢恢書靈符寶篆救苦消災願使家家奉道人人悟總免輪回成功行前程路穩同去宴蓬萊又未欲脫家未欲修持先通吉善在家作福堪當晨參夜禮長是爇名香漸漸財疏色減看分寸營養爺娘擒猿馬古來一句柔弱勝剛強從長凡百事先人後己勤認炎涼與六親和睦朋友圓方宗祖靈祠祭饗頻行孝以序思量逢佳節歡欣訪飲齊唱滿庭芳又欲脫家既欲修行終全閴謐出離塵俗相當莫憑外坐朝暮起心香須是損妻捨事違鄉土趖却兒娘常歸一民安國富戰勝又兵強長長瀟灑做搜尋玄妙認取清涼又憑空渺邈大道無方只在圓光自照明來後堪用衡量重陽子迎霜金菊獨許滿庭芳又修行陰盡陽純命停性住先須汞識鉛知白堅黑固土馬木牛隨卯酉常從子午甲庚聚用坎迎離刀圭至震龍兑虎赤鳳鬥烏龜堪宜真水火癸丁爐竈丹結何疑漱瓊漿玉液神水華池滋潤靈芽瑞雪日雞叫月兔推移金翁喜黃婆立便養姹女嬰兒又文登張公邵公要起玉花社王嘉身留玉花社舉此因都為張侯迤而邵氏庵舍不能修後悔人人猛悟兔兒起拋甚甎毬還知否斷弦無續覆水定難收休休各處分我雖眷戀誠沒回頭願諸公心內念憶同流别意離悰已動金蓮子光滿西州當歸去文登勝景不復再重遊西江月養甲爭如養性修身爭似修心從來作做到如今每日勞勞圖甚好把幽微搜索便將玄理思尋交君稍悟水中金不肯荒郊做恁憶王孫人云口是禍之門我道舌為禍本根不語無言沒討論度朝昏便是安間保命存蘇幕遮少煩人稀赴會我自無恩莫把他人怪廉儉溫良身自在莫追陪免得常耽債有錢恃人見愛及至無錢親也全疏待且見世情如此態察盡人心暗想除非外金雞叫警劉公占得虛空呈俊俏玄中玄妙中絶妙自然五彩通靈照一顆明珠萬道霞光罩淨淨清清泠泠曉曉昏昏默默冥冥窈窈森羅萬象輝輝耀月裏蟾鳴日裏金雞叫桃源憶故人琉璃枝上瓊花皓蓓藟間成瑪瑙烏玉葉兒偏好四件誰能討靜中認得真家寶艷彩誠非草草唯有箇人知道共得歸蓬島重陽全真集卷之三
