front:
  text: 重陽全真集卷之十二交二
  hash: sha256:213d57e08f511d0461c6d6f1546a83fe3eefd20b0a5a10b97ab0221d0972a8f7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5e0055_HFL_012-001a, image: hfl/0795/0795-042.png}
body:
  text: 終南山重陽子王嚞撰詞迎仙客做修持須搜索真清真靜真心獲這邊青那邊白一頭烏色上面殷紅赫共同居琉璃宅瓊苞瓊蘂瓊花坼玉童歌金童拍皇天選中正是迎仙客這曲破先入破迎仙客處休言破勘得破識得破看看把我肚皮都鱉破會做麼是恁麼奈何子午貪眠麼説甚麼道甚麼自家暗裏獨自行持麼這害風心己破咄了是非常持課也無災亦無禍不求不覓不肯做墨大大仙唱真人和全真堂裏無煙火無憂子共三箇頓覺清涼自在逍遙坐香山會白光生青艷至紅輝總好騰玄耀妙黃深奧般般彩色把明珠覆燾晴空外來往仙道封成永號便受玉皇宣誥雲霞裏上真惟到香山會聚發瓊言闡道同歸去長住三島紅芍藥唯會做惺惺便能誇可可淨清消息見得那正好孤眠卧這子午致使運轉精神寶瓶宫肯教放過隄防取玉户開時把金關緊鎖把金關緊鎖永不遇淫風也非遭業火六道輪回總趖趓自在逍遙箇上下盡是白氣沖盈一粒丹結成金顆空中早仙樂來迎感天花遍妥感天花遍妥塞孤自家聲唱出誰能測有箇頭青容白正是石娥來應拍身窈窕腰如搦偏柔軟舞婆娑金璧珠都索要皆令盡酬此功格才聞玉蘂香正是瓊花坼兩段蘚蘚同色便使靈童令採摘相合就堪憐惜呈妙妙出玄玄超碧漢分明顧動新音永作仙客雙雁兒奉勸伊家去西州放散誕做雲遊恁時教你永無憂這愁煩漸漸休款款牽回六隻牛認水草便風流渾身白徹得真修上逍遙達岸舟又自述意馬心猿休放劣害風姓王名哲一從心破做顛厥恐怕消些舊業真性真靈有何説恰似曉風殘月楊柳崖頭是清徹我咱恣情攀折憨郭郎清間真道本無事小神仙謹修增些福免黃泉愚迷都不曉只愛幾文錢一朝大限至告蒼天迷神引偶暇追遊無凝礙獨望錦波青岱回頭處忽見荒林外一堆兒骷髏卧緑莎內孤慘誰為主與排賽空衒雙眸闡土塵塞雨灑風吹日曬星光對轉業增添重重載異鄉殊域甚方客何年代牧童來頻頻打欲零碎前世貪財色從戀愛遭遇迷神引怎生奈紅窗迥劉悅道誠有力平等社識來不識便是道德根源為清靜利益願公早把良因積向真道心中尋覓誇則誇稱稈端停且莫令點滴磨著墨木硯瓦窗前竹我看真箇瀟灑試問點茶人人得行行行者慈悲慈悲不可捨作善緣敲盞何須音啞試問自在逍遙教積善得也觀貌好堪我相空提去提來道違家向能藏薄醋菜鹽蔬干成麵醬奉報張公穩收掌切莫令失手撲在地上百雜碎片片分離恁時節掉樣七十三三十七恁時節思量王吉王吉崖畔險也兀底却隄防腳失奉勸回頭休要執戴包巾只在來年元日若依前意馬心猿管終壽九十但為人須仗福莫慢天欺地衣食自足今宵却有箇王三伴父母獨宿也不往來無被褥和衣睡靜中肯教動觸覺來後愈覺清涼唯言詩曲到明年大豐熟這嶮巇心中全然不燭越越底劫劫波波貪名利逯逯地變黃金由未足因何却不種來生好福豈知兩兩三三看五五六六把兄嫂好供養便是我見在父母誰人敢向這裏却有箇王三更朝夕思想哥哥嫂嫂休悒怏休煩惱好把心來滌蕩爇名香三教俱看得善芽增長這王三風得賽便咄了氣財色遊三昧因何却不斷香醪我神仙也愛獨自行來真自在要到處掩然悉除百怪多心經記得分明無罣礙無罣礙王哲我從來有些施設道日日勤持搜祕訣地府不願瞥天堂上自然歡悅蓬仙島如歸修做徹夜行船王哲害風都不管樂清間恣情慵懶紙襖麻衣教人説短我咱自知涼暖一炷名香經十卷三千日行成功滿穩駕祥雲獨通霄漢儘你夜行船趕水雲遊平等平等復過萊州須行救拯害風兒闡化勻均化良歸善肯二儀三耀常為正察人心恰如斗稱若不高更沒於低也神仙有應小重山堪嘆犢兒堪嘆牛若還省我語是同流性如燈燭命如油相滋引明焰出山光照破一齋休前程除險路沒深溝這回與你説根由成功行蓬島永無憂世上人人做有為榮并並富貴衒能為錦衣肉飯鬥多為饒君會一品又奚為王哲不施為麻衫兼紙襖自堪為隨緣糲食日常為唯長久真外認無為一箇麻囊一箇飄我咱三口子過清朝飢來長採玉芝苗克腸腹水向火中燒舞袖拂風飄青鸞前引路躡雲梢蓬萊須訪舊王喬重相約同共上丹霄又述夢夢見街前一隻牛偏能行得穩性溫柔繩來牽拽便回頭高峰上卧月最風流隨我任遨遊調和真逸樂沒憂愁渾身白徹正堪留超靈岸相從入瀛洲失笑迷陰化不來愚頑心鎖硬怎生開直饒富貴沒殃災天年限終久落輪回鬼使早相催兒孫難替得有何推恁時悔恨哭聲哀方知道學道是仙材又道友求問養性休教起怒嗔外身須認正裏頭真日施方便做慈因清涼至只在氣精神財色莫相親自然通大道覺申申金丹結就出迷津登雲路玉洞看長春菊花天肉衒花糕酒衒油肥軀潤己那休兒女共嬉遊金銀財寶壘似山丘何不道前程將不去限終鬼使來勾方悟平生總錯點頭點頭悔恨無由苦勸伊家省自煎須知每每居鄽贏取日高眠賣花天氣别有玄玄這箇元來咨味好自然滅火消煙要入無生路上趙仙趙仙只在心田又是春來虛不空今朝鬥撮和風使我得飄蓬前遊雲水大路長通雖是心慵身莫懶但豫好藥名芎服了身輕體健積功積功須上穹窿臨江仙遊歷都京并府郡更兼縣鎮坊村並無術法沒談論一般真箇好六業鐵聲渾莫怪時時清韻響人人唤出家門磨伊心鏡不教昏滿輪明月瑩光射透昆崘正己修行無怠墮推心上應天機內容整肅吐光輝靈真搜得瑩方可許瞻睎謹謹授持專一守靜中清裏歸依法憑條制不相違九玄并七祖連汝共升飛掌法遵條常謹守饒人藴德尤先孝心自許合神天長長能後己永永瞻家緣便是修行真實路正端無黨無偏放開心月照金蓮馨香衝碧漢堪獻大羅仙又説四象性命陰陽如可論心脾腎肺刀圭更兼南北與東西甲庚丁與癸雀武虎龍齊子午沖和連卯酉春冬秋夏相携白青赤黑吐虹霓坎離并震兌水火木金躋又詠葫蘆一隻葫蘆真箇好朝朝長是隨豫腹中明朗瑩中虛貯瓊漿玉液滋味勝醍醐日日飲來依舊有自然不用錢沽杖頭挑起入雲衢三清前面過參從黍米珠絳帳今朝重到此榴花對景先開坐間誰悟害風來四梧知我意三耀散豫災既得相逢休酩酊洞中别有樽壘才倒一盞免輪回自然雲滿目舉步到蓬萊又道友問修行潔己存心歸大善常行惻隱之端慈悲清靜亦頻觀希夷玄奧旨三教共全完别子休妻為上士悉捐財色真餐長全五臟得康年功成兼行滿直性入仙壇太一混元真法籙清心精鋭行持先擒自己那蟲尸香煙通上界威力暗施為救拔亡魂消舊業見存廣得洪禧鬼驚神駭懼勾追行功惟顯著指日彩雲隨吸取西江金浪水朝朝用此盤纏循環流轉復清泉肌膚偏瑩淨壽算得遷延北斗自然拘姓籍南辰生注長年減財節色是因緣作為依上帝棄世做神仙又目貽為甚風狂偏愛酒非干愚意多輕此般道眼最分明頂門三路顯得伴道人行三教幽玄深遠好仍將妙理經營麒麟先悟仲尼觥青羊言尹喜舍利唤眷鶯又題贈道友杜公尋妙訣道本先求認得急持修恩愛斷便回頭黑煙都去盡出得無愁雲友與霞儔蓬島路哲同遊翁婆成匹配跨虎擒龍結帳作三重夫婦美好相從午前并子後煉就殷紅住在絳房中雲外路到蓬宫昌時須默默清徹名澄總棄總無能軒好景便依登趙州茶味好悟曉如水雲友與霞朋分别得正升騰定風波每日間遊西復東隨緣且過住塵中杳杳冥冥今古在蒙害風風裏得飄蓬蒙公且只知浮蟻動我今偏愛滿堂紅照破當年昏暗事空空靈臺一點透穹窿昔日嘉山第一程今朝臣海載清清重泛瑶池真得得盈盈昂頭堪認自家聲玉浪銀波别景致瓊濤朱溜作高名湧出白蓮花一朵呈呈馨香直入大羅城剔銀燈今與重添惺惺只是那亘初元性急急修持盈盈圓滿子細剔開周正通玄傳令煉煅出自然清靜一顆明珠堪敬就上揩磨精瑩不則本師三真共至更有虛空賢聖齊來俱慶這仙子此中前定風馬令意馬擒來莫容縱長隄備璫滴琉玎被槽頭猢猻相調弄攢蹄舉耳早臨風璫滴琉玎椿上韁兒緊纏鞚這回你璫滴琉玎待馴良牽歸白雲洞逍遙自在更不肯璫滴琉玎卜算子初見青鋼劍尸內曾加點木上安來出一絲乾馬占害後隨風颭得此修行漸日日頻頻撿暗喜歡時只自知天馬瞻與我長生驗又謁友不遇曩者見張公索寫詞中信王哲今朝故故來甚沒箇人相近回首跨清飈隨足雲霞趁却入全真復舊堂把一點靈明認特地新天地人生同來相遇應將甚昭彰顯務道門開釋門闡儒門堪步識元初習元本覩元辰元陽自固日月星辰齊旋躔度唯臨蒞虛空照布精關扃氣關達神關超露稟三才立三教得三光三丹寶聚又勸世騁俏多能身呈體段把衣衫頻頻脫换穿茶坊入酒店總誇好漢驀然遇天高這精神早減了一半奉勸風流惺惺早斷保元陽休教紊亂稍回頭開道眼金蓮長看玉花放異香來吐光明滿空炳焕書堂春雲水王三悟悟甘河鎮祖師遇遇元本靈明便惺惺也真箇詩詞做做丹藥內中頻顧顧逍遙處三光覷覷全得當時害風風真箇神仙去去青玉案上元佳致真堪看更片片行雲散現出天如青玉案放開心月慧燈明照兩曜交光燦毬裝七寶玲瓏焕把性燭當中按一對金童呈手段瓊杵推轉順風歸去衮入那蓬萊觀帶馬行亘初獨許能騎坐這駿駟從牽拖直走盤旋雙慶賀三山骨健力筋偏大馬輔佐萬丈紅崖過謝伊駝出深坑禍衒玉轡金纓嚲喊霧嘶風遊水火月華前面四蹄輕鎖馬負荷與我成因果元初一得從初遇便端正昭彰著轉作重陽晨彩煦晴空來往碧霄堪住瓊馬引入長生步靈光不動神光聚便攢簇銀霞護滿插金花頻返顧青衣鸞鶴共同來赴瑶馬駐般在清涼路既要修持心不曉這火院須先跳猛把家緣都不要元初一點認來真所做箇惺惺了欲要妻男固處妙且只在紅塵罩節色微財應事俏慈悲廣施作均平也決定分分曉又緣化子弟鎖户真成也百朝甚惺灑冰餐非苟且玄妙就中超軃馬眸粘惹恩愛俱齊捨間遊冶教余同幽雅仙子共成修寫馬明星下瑞鷓鴣昨朝今日與來朝飲水無加只自澆醉後恁鋪金蘚甲醒時復採玉芝苗錦衣公子談三島皂帔佳人舞六么一曲合成玄妙處白雲片片恣飄颻我咱别有赤窮窮物物俱無事事通清裏清來全寂𨵙間中間至住虛空能邀迥照堪親日會捉輕飈便害風此際黑雲何處去瑩然衮出一團紅三才剖判做輝華三教分明吐甲芽三寶煉燒紅焰寶三車搬運紫河車三峯影裏觀真宅三耀光中是本家三島十洲堪搗藥三清十極聚青霞今朝細細問朱郎因甚常眠黑鬼房得與青龍為伴侣亦令白虎助清涼便將鉛汞堪成寶好把刀圭更入鋼斫斷烏龜四隻腳爽邀風月上崑岡堪當姹女嫁丁郎認得嬰兒住癸房幸有甲田知出入不無兌地做炎涼鉛刀起處通神妙汞劍開時仗慧鋼殺却三尸陰鬼盡一團紅焰覆瓊岡白靈根蒂長晴空碧緑枝條裊細風葉稟月華添雅翠花憑日氣蘸殷紅四般顔色雖然異一道馨香分外濃透過丹霄歸甚處便教收在蘂珠宫石中火隱怎生昭水裏金藏要却遭石火須憑心火取水金決得肺金淘火教煅煉真鉛汞金要增添快劍刀二件相投成一件大羅天上列仙曹這回捉住四時春奪得溫和養本真跳出世情居異世儘教人道不凡人何須苦苦調精氣不在區區嗽液津瑩處晴空開日月鋭然特放九光新踏莎行東海汪洋西山詳審金鈎釣得歡無恁一頭活樂大鯨魚萬鱗燦爛鋪白錦隨我遨遊水雲信任青山緑水相過甚張公喫酒李公來李公奪了張公飲又干友打斧版斧如求那由選揀良工欲造無錢换今朝專禮我華宗慈悲為首諸公辨若得堅鋼劈開道眼靈臺熠耀持金簡腰間柯爛決忘歸白雲路上成家産又詠钁鐵钁神靈我心有則隨身應手開端的種成大藥稱伊功栽生善果憑君力銼倒恩山打摧愛獄是非煩惱頻頻斸鋭然敲碎碔砆頑便令發出崑崙玉又總詠斧钁堪擎隨緣斫斸鋼全生就令分局一司管刮水中金一司管伐山頭玉竅子方長攀兒圓促頭頭柄柄常相逐劈開金母紫芒攢判通玉祖紅光簇又詠宦途無定名路求高宦途無定一來一去緣心性稍知分守得優遊能通止足參賢聖莫使偏頗須存直正花開須是依時令日輪耀處吐光輝月華朗後添清瑩漁父詠漁家傲北海鯤鯨人不識金風長是傳消息豫把釣車寧費力堪憐憶香鈎擲下離灘側吐出神珠光焰赫化鵬展起垂雲翼日在扶搖無有極能摶陟青霄一舉應端直又詠假俏漢姦點人人常不遜外裝內喜能談論艷色衣裳香遠噴頻整頓重重結裹粗如囤眼去眉來常騁俊前攀後拽誇身分我便去前親去問休風韻遮藏臭腐并堆糞又間題生死輪回何太速改顔换面人難識有箇風狂常自足常自足逍遙處處孤眠宿愁煞諸公歡折哭恰如堂下三間屋屋底你咱煩惱黑煩惱黑堂中我且燃燈燭又贈友人名宦為鹽判室內同公案間心各一半讚分過如何斷好將雲水伴夫婦山頭看清風明月唤玩結就無涯算河傳令竹冠頂按更竹作水瓶至今常將手盥竹杖竹籃竹笠竹車竹鑽竹林中竹笛鳴聲自唤木鞋襯腳真熱暖木做盤兒鏡磨明圓滿木筯木匙木杓木盔木碗木陰間木牛耕田三段營軀手段這飢寒未免上街須當唱唤提箇淨清了了惺惺鐵𤮴覓殘餘聲聲叫道攝亂極承貴府人憫歎唯願諸公心懷常照管選甚冷喫將來腹中煎𤓎煉重陽方堪看害風漢害風落魄便飄蓬信任到處並無籬落遊歷水雲管甚身軀零落覓殘餘傍人家間院落衆皆笑我貧淪落教他骨頭無福長流落看你不知將來何方下落免伊憂恁時節超碧落凡軀莫藉把惺惺了了自然明明構架行住坐卧須要清清間暇氣神和結成珠堪教化張弓舉箭能親射紅心正中趕退周天卦垛貼中間迸出霞光無價五行違脫陰陽超造化惜芳時緣重下手并安腳頓得來真真沒錯金爐立起瓊花作燒煉出這般丹藥三田九轉明光爍八脈上四門開却虛空一點成灼灼無言説自然邀約諸公學道應徒甚細細把玄機苒荏頭邊認取清涼枕當風月瑩然成寢刀圭滋味頻頻飲漸漸放千花似錦馨香如要詳還審惜芳時曲中評品又詠紫燕我觀紫燕泥巢壘便下卵朝朝抱子雛兒喂大辭窠起背父母分飛去離為人養小還如爾明知得攀緣越熾爭如修取長生理樂清間好遊雲水又友索説陰陽未分混沌何方有直待定天高地厚乾坤一判三光秀在身中沖和奔走水中火起頻頻鬥又白虎青龍交媾兒嬰女姹休相守王害風别有朋友拋毬樂扶桑祥瑞生芝草便移在蓬萊島金枝玉葉自然好崑崙上變珍寶霞光四面添玄奧明焰裏通顛倒青童捧詔添嘉號無為處這回到探春令兀然真性杳杳默默無微無大一團瑩寶光明圍繞五彩同隨那逍遙自在堪經過有玉童相賀滿空馥郁盈盈裏面來伴神仙坐南鄉子百載鏡中容仰手為祥覆手凶生死榮華今在目休逢疾速回心認祖宗得得妙相從滅盡三尸九箇蟲一氣浩然調養正沖融免擊精藍過世鍾重陽全真集卷之十二
